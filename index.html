*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{

input,select,button,textarea{font-family:'Alexandria',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:4px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.02);opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}}

.fade{animation:fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;}
.pulse-glow{animation:pulseGlow 3s ease-in-out infinite;}

#splash-screen {
  position: fixed;
  top:0;left:0;width:100vw;height:100vh;
  background: #120500;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease;
}

.glass-card {
  background: rgba(45, 25, 15, 0.65);

  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(214, 175, 55, 0.3);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 18px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0; height: 84px;
  background: rgba(20, 6, 0, 0.98);

.nav-item {

  display: flex; flex-direction: column; align-items: center;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: all 0.3s ease; gap: 6px;
}
.nav-item.active {
  color: #D4AF37; transform: translateY(-2px);
  text-shadow: 0 0 8px rgba(214,175,55,0.4);
}
.nav-icon { font-size: 1.6rem; }

/* تكبير نصوص المدخلات والأزرار */
input, select, button {
  font-size: 1rem !important;

function App() {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [pin, setPin] = useState("");
  const [tab, setTab] = useState("inventory");
  const [ingredients, setIngredients] = useState(INITIAL_MASTER);
  const [recipes, setRecipes] = useState(COMMERCIAL_RECIPES);
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("الكل");
  const [toast, setToast] = useState("");

  // فورم إضافة المادة الجديدة
  const [newName, setNewName] = useState("");
  const [newBrand, setNewBrand] = useState("");
  const [newCat, setNewCat] = useState("عود");
  const [newStock, setNewStock] = useState(100);
  const [newUnit, setNewUnit] = useState("جم");

  // المخبار الرقمي
  const [labMix, setLabMix] = useState([]);
  const [labSelectedIng, setLabSelectedIng] = useState(INITIAL_MASTER[0].id);
  const [labAmount, setLabAmount] = useState(5);
  const [selectedRecipe, setSelectedRecipe] = useState(null);

  const triggerToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 3000);
  };

  const handleLogin = (e) => {
    e.preventDefault();
    if (pin === "2424") {
      setIsLoggedIn(true);
      triggerToast("مرحباً بك يا ضاوي البطل في معملك المطور!");
    } else {
      triggerToast("❌ الرمز السري غير صحيح انقزها!");
    }
  };

  const updateStockValue = (id, delta) => {
    setIngredients(prev => prev.map(item => {
      if (item.id === id) return { ...item, stock: Math.max(0, item.stock + delta) };
      return item;
    }));
  };

  const handleAddNewIngredient = (e) => {
    e.preventDefault();
    if (!newName.trim()) {
      triggerToast("⚠️ أدخل اسم المادة أولاً!");
      return;
    }
    const newItem = {
      id: "custom_" + Date.now(),
      name: newName,
      brand: newBrand.trim() || "تطوير محلي",
      cat: newCat,
      stock: Number(newStock),
      unit: newUnit
    };
    setIngredients(prev => [newItem, ...prev]);
    setNewName(""); setNewBrand("");
    triggerToast(`🏺 تم إضافة ${newName} للمخزن بنجاح!`);
  };

  const filteredIngs = (catFilter === "الكل" ? ingredients : ingredients.filter(i => i.cat === catFilter))
    .filter(i => i.name.toLowerCase().includes(search.toLowerCase()) || i.brand.toLowerCase().includes(search.toLowerCase()));

  const getIng = id => ingredients.find(i => i.id === id);

  // واجهة تسجيل الدخول الخاصة بـ ضاوي
  if (!isLoggedIn) {
    return (
      <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"90vh", padding:"20px"}} className="fade">

          <h2 style={{color:"#D4AF37", fontSize:"1.6rem", fontWeight:"700", marginBottom:"8px"}}>لوحة معمل ضاوي الدهن</h2>
          <p style={{color:"#c8a46a", fontSize:"0.9rem", marginBottom:"25px"}}>من فضلك أدخل الرمز الخاص بك للمتابعة</p>
          
          <form onSubmit={handleLogin} style={{display:"flex", flexDirection:"column", gap:"14px"}}>
            <input 
              type="password" 
              pattern="[0-9]*"
              inputMode="numeric"
              placeholder="••••" 
              value={pin} 
              onChange={e => setPin(e.target.value)} 
              style={{background:"rgba(0,0,0,0.5)", border:"1px solid rgba(214,175,55,0.6)", borderRadius:"12px", padding:"16px", color:"#fff", textAlign:"center", fontSize:"1.4rem", letterSpacing:"8px", outline:"none"}}
            />
            <button type="submit" style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"14px", borderRadius:"12px", fontSize:"1rem", fontWeight:"700", cursor:"pointer"}}>
              دخول للمعمل الآمن ←
            </button>
          </form>
          <p style={{color:"rgba(200,164,106,0.4)", fontSize:"0.7rem", marginTop:"30px"}}>الرمز الافتراضي الحالي للدخول: 2026</p>
        </div>
      </div>

    <div style={{paddingBottom:"110px"}}>

          ✨ {toast}

        <h1 style={{fontSize:"1.9rem", color:"#D4AF37", fontWeight:"700", textShadow:"0 2px 4px rgba(0,0,
