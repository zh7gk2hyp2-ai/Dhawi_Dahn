<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background: linear-gradient(160deg, rgba(26, 8, 0, 0.98), rgba(58, 26, 5, 0.98));
  font-family: 'Alexandria', sans-serif;
  color: #fff8f0;
  overflow-x: hidden;
  min-height: 100vh;
  /* تكبير الخط العام للمنصة بناءً على طلبك */
  font-size: 18px; 
}
input,select,button,textarea{font-family:'Alexandria',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:4px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.02);opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}}

.fade{animation:fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;}
.pulse-glow{animation:pulseGlow 3s ease-in-out infinite;}

#splash-screen {
  position: fixed;
  top:0;left:0;width:100vw;height:100vh;
  background: #120500;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease;
}

.glass-card {
  background: rgba(45, 25, 15, 0.65);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(214, 175, 55, 0.3);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 18px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0; height: 84px;
  background: rgba(20, 6, 0, 0.98);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(214, 175, 55, 0.4);
  display: flex; justify-content: space-around; align-items: center;
  padding-bottom: 14px; z-index: 9999;
}
.nav-item {
  background: none; border: none; color: #c8a46a;
  display: flex; flex-direction: column; align-items: center;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: all 0.3s ease; gap: 6px;
}
.nav-item.active {
  color: #D4AF37; transform: translateY(-2px);
  text-shadow: 0 0 8px rgba(214,175,55,0.4);
}
.nav-icon { font-size: 1.6rem; }

/* تكبير نصوص المدخلات والأزرار */
input, select, button {
  font-size: 1rem !important;
}
</style>
</head>
<body>

<div id="splash-screen">

function App() {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [pin, setPin] = useState("");
  const [tab, setTab] = useState("inventory");
  const [ingredients, setIngredients] = useState(INITIAL_MASTER);
  const [recipes, setRecipes] = useState(COMMERCIAL_RECIPES);
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("الكل");
  const [toast, setToast] = useState("");

  // فورم إضافة المادة الجديدة
  const [newName, setNewName] = useState("");
  const [newBrand, setNewBrand] = useState("");
  const [newCat, setNewCat] = useState("عود");
  const [newStock, setNewStock] = useState(100);
  const [newUnit, setNewUnit] = useState("جم");

  // المخبار الرقمي
  const [labMix, setLabMix] = useState([]);
  const [labSelectedIng, setLabSelectedIng] = useState(INITIAL_MASTER[0].id);
  const [labAmount, setLabAmount] = useState(5);
  const [selectedRecipe, setSelectedRecipe] = useState(null);

  const triggerToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 3000);
  };

  const handleLogin = (e) => {
    e.preventDefault();
    if (pin === "2026") {
      setIsLoggedIn(true);
      triggerToast("مرحباً بك يا ضاوي البطل الحلو في معملك المطور!");
    } else {
      triggerToast("❌ الرمز السري غير صحيح ارفع علومك
    }
  };

  const updateStockValue = (id, delta) => {
    setIngredients(prev => prev.map(item => {
      if (item.id === id) return { ...item, stock: Math.max(0, item.stock + delta) };
      return item;
    }));
  };

  const handleAddNewIngredient = (e) => {
    e.preventDefault();
    if (!newName.trim()) {
      triggerToast("⚠️ أدخل اسم المادة أولاً!");
      return;
    }
    const newItem = {
      id: "custom_" + Date.now(),
      name: newName,
      brand: newBrand.trim() || "تطوير محلي",
      cat: newCat,
      stock: Number(newStock),
      unit: newUnit
    };
    setIngredients(prev => [newItem, ...prev]);
    setNewName(""); setNewBrand("");
    triggerToast(`🏺 تم إضافة ${newName} للمخزن بنجاح!`);
  };

  const filteredIngs = (catFilter === "الكل" ? ingredients : ingredients.filter(i => i.cat === catFilter))
    .filter(i => i.name.toLowerCase().includes(search.toLowerCase()) || i.brand.toLowerCase().includes(search.toLowerCase()));

  const getIng = id => ingredients.find(i => i.id === id);

  // واجهة تسجيل الدخول الخاصة بـ ضاوي
  if (!isLoggedIn) {
    return (
      <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"90vh", padding:"20px"}} className="fade">

          <h2 style={{color:"#D4AF37", fontSize:"1.6rem", fontWeight:"700", marginBottom:"8px"}}>لوحة معمل ضاوي الدهن</h2>

          <form onSubmit={handleLogin} style={{display:"flex", flexDirection:"column", gap:"14px"}}>
            <input 
              type="password" 
              pattern="[0-9]*"
              inputMode="numeric"
              placeholder="••••" 
              value={pin} 
              onChange={e => setPin(e.target.value)} 
              style={{background:"rgba(0,0,0,0.5)", border:"1px solid rgba(214,175,55,0.6)", borderRadius:"12px", padding:"16px", color:"#fff", textAlign:"center", fontSize:"1.4rem", letterSpacing:"8px", outline:"none"}}
            />
            <button type="submit" style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"14px", borderRadius:"12px", fontSize:"1rem", fontWeight:"700", cursor:"pointer"}}>
              دخول للمعمل الآمن ←
            </button>

        <h1 style={{fontSize:"1.9rem", color:"#D4AF37", fontWeight:"700", textShadow:"0 2px 4px rgba(0,0,0,0.6)"}}>ضاوي الدهن</h1>
        <p style={{fontSize:"0.75rem", color:"#c8a46a", letterSpacing:"4px", marginTop:"4px"}}>DHAWI DAHN LAB</p>
      </div>

      <div style={{padding:"0 16px", maxWidth:"480px", margin:"0 auto"}}>
        
        {/* ===== TAB: INVENTORY (المخزون بدون صور وبخط كبير) ===== */}
        {tab === "inventory" && (
          <div className="fade">
            <div className="glass-card" style={{border:"1px solid #D4AF37", background:"rgba(38,18,7,0.9)"}}>
              <h3 style={{fontSize:"1.05rem", color:"#D4AF37", marginBottom:"12px", fontWeight:"700"}}>➕ إضافة مادة جديدة للمخزن</h3>
              <div style={{display:"grid", gap:"10px"}}>
                <input placeholder="اسم المادة العطرية الفاخرة..." value={newName} onChange={e => setNewName(e.target.value)} style={{background:"rgba(0,0,0,0.4)", border:"1px solid rgba(214,175,55,0.5)", borderRadius:"10px", padding:"12px", color:"#fff"}} />

                    <option value="مثبت">مثبت عطور جزيئي</option>
                    <option value="مضخم">مضخم فوحان</option>
                    <option value="براند">زيوت محاكاة براندات</option>
                  </select>
                  
                  <div style={{display:"flex", gap:"4px"}}>
                    <input type="number" value={newStock} onChange={e => setNewStock(e.target.value)} style={{background:"rgba(0,0,0,0.4)", border:"1px solid rgba(214,175,55,0.5)", borderRadius:"10px", padding:"12px", color:"#fff", width:"100%", textAlign:"center", fontWeight:"bold"}} />
                    <select value={newUnit} onChange={e => setNewUnit(e.target.value)} style={{background:"#221105", border:"1px solid rgba(214,175,55,0.5)", borderRadius:"10px", padding:"6px", color:"#fff"}}>
                      <option value="جم">جم</option>
                      <option value="مل">مل</option>
                    </select>
                  </div>
                </div>
                <button type="button" onClick={handleAddNewIngredient} style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"12px", borderRadius:"10px", fontWeight:"700", marginTop:"4px"}}>
                  💾 حفظ الخامة الفورية في الخزانة
                </button>
              </div>
            </div>

            <div style={{height:"2px", background:"rgba(214,175,55,0.2)", margin:"20px 0"}}></div>

            <h2 style={{fontSize:"1.1rem", color:"#D4AF37", marginBottom:"12px", fontWeight:"700"}}>رفوف الخامات الحالية ({ingredients.length})</h2>
            <input placeholder="🔍 ابحث في الخزينة النصية الفورية..." value={search} onChange={e => setSearch(e.target.value)} style={{background:"rgba(255,255,255,0.06)", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"12px", padding:"14px", color:"#fff", width:"100%", marginBottom:"14px", outline:"none", fontSize:"1.05rem"}}/>

            <div style={{display:"flex", gap:"6px", overflowX:"auto", marginBottom:"14px", paddingBottom:"6px"}}>
              {["الكل","عود","تراثي","زهري","صندل","مثبت","مضخم","براند"].map(c => (
                <button key={c} onClick={() => setCatFilter(c)} style={{background: catFilter === c ? "#D4AF37" : "rgba(255,255,255,0.06)", border: "1px solid #D4AF37", color: catFilter === c ? "#1a0800" : "#D4AF37", padding:"6px 16px", borderRadius:"20px", fontSize:"0.8rem", fontWeight:"600", cursor:"pointer", whiteSpace:"nowrap"}}>{c}</button>
              ))}
            </div>

            {/* عرض بطاقات الخامات بنصوص كبيرة وواضحة جداً وبدون أي صور بناءً على طلبك */}
            {filteredIngs.map(ing => (
              <div key={ing.id} className="glass-card" style={{padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"1.1rem", fontWeight:"700", color:"#fff", marginBottom:"4px"}}>{ing.name}</div>
                  <div style={{fontSize:"0.8rem", color:"#c8a46a"}}>المصنع: {ing.brand} • التصنيف: {ing.cat}</div>
                </div>
                <div style={{textAlign:"left", display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"8px", minWidth:"130px"}}>
                  <span style={{fontSize:"1.05rem", color:"#D4AF37", fontWeight:"700"}}>المتاح: {ing.stock} {ing.unit}</span>
                  <div style={{display:"flex", alignItems:"center", gap:"8px"}}>
                    <button type="button" onClick={() => updateStockValue(ing.id, -5)} style={{background:"rgba(255,255,255,0.08)", border:"1px solid rgba(214,175,55,0.4)", color:"#fff", width:"32px", height:"32px", borderRadius:"50%", cursor:"pointer", fontWeight:"bold", fontSize:"1.2rem"}}>−</button>
                    <button type="button" onClick={() => updateStockValue(ing.id, 5)} style={{background:"#D4AF37", border:"none", color:"#1a0800", width:"32px", height:"32px", borderRadius:"50%", cursor:"pointer", fontWeight:"bold", fontSize:"1.2rem"}}>+</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ===== TAB: RECIPES (دليل خلطات النيش) ===== */}
        {tab === "recipes" && !selectedRecipe && (
          <div className="fade">
            <h2 style={{fontSize:"1.15rem", color:"#D4AF37", marginBottom:"6px", fontWeight:"700"}}>👑 خلطات النيش الملكية الصيفية لـ ضاوي</h2>
            <p style={{fontSize:"0.8rem", color:"#c8a46a", marginBottom:"16px"}}>اضغط على أي تركيبة لعرض المقادير المكبرة وطريقة التوليف الفورية</p>
            
            {recipes.map(r => (
              <div key={r.id} onClick={() => setSelectedRecipe(r)} className="glass-card" style={{cursor:"pointer", borderRight:"5px solid #D4AF37", background:"rgba(255,248,240,0.05)", padding:"20px"}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"6px"}}>
                  <span style={{fontSize:"1.1rem", color:"#fff", fontWeight:"700"}}>{r.name}</span>
                  <span style={{fontSize:"1.3rem"}}>{r.seasonIcon}</span>
                </div>
                <p style={{fontSize:"0.85rem", color:"#e5d5be", lineHeight:"1.5", marginBottom:"10px"}}>{r.description}</p>
                <div style={{display:"flex", gap:"8px"}}>
                  <span style={{background:"rgba(214,175,55,0.15)", color:"#D4AF37", fontSize:"0.75rem", padding:"4px 10px", borderRadius:"12px", fontWeight:"600"}}>⏱ {r.stability}</span>
                  <span style={{background:"rgba(255,255,255,0.1)", color:"#fff", fontSize:"0.75rem", padding:"4px 10px", borderRadius:"12px", fontWeight:"600"}}>👥 {r.gender}</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "recipes" && selectedRecipe && (
          <div className="fade">
            <button onClick={() => setSelectedRecipe(null)} style={{background:"none", border:"1px solid #D4AF37", color:"#D4AF37", padding:"6px 18px", borderRadius:"20px", fontSize:"0.85rem", marginBottom:"14px", cursor:"pointer", fontWeight:"600"}}>← العودة لدليل النيش المقترح</button>
            
            <div className="glass-card" style={{textAlign:"center", background:"rgba(214,175,55,0.08)", padding:"24px"}}>
              <span style={{fontSize:"2rem"}}>{selectedRecipe.seasonIcon}</span>
              <h2 style={{fontSize:"1.25rem", color:"#D4AF37", fontWeight:"700", marginTop:"6px"}}>{selectedRecipe.name}</h2>
              <p style={{fontSize:"0.9rem", color:"#fff", marginTop:"6px", lineHeight:"1.6"}}>{selectedRecipe.description}</p>
            </div>

            <h3 style={{fontSize:"1rem", color:"#D4AF37", marginBottom:"8px", fontWeight:"700"}}>🏺 النسب الجرامية المكبرة والدقيقة للتركيبة:</h3>
            {selectedRecipe.ingredients.map(ri => {
              const ing = getIng(ri.id);
              return (
                <div key={ri.id} style={{display:"flex", justifyContent:"space-between", background:"rgba(255,255,255,0.04)", padding:"12px 16px", borderRadius:"12px", marginBottom:"6px"}}>
                  <span style={{fontSize:"0.95rem", fontWeight:"600"}}>{ing?.name || ri.name}</span>
                  <span style={{fontSize:"1.05rem", fontWeight:"700", color:"#D4AF37"}}>{ri.amount} جم/مل</span>
                </div>
              );
            })}

            <div className="glass-card" style={{marginTop:"16px", background:"rgba(0,0,0,0.3)"}}>
              <h4 style={{fontSize:"0.95rem", color:"#D4AF37", marginBottom:"8px", fontWeight:"700"}}>🛠️ خطوات التصنيع المعملي الفاخر:</h4>
              {selectedRecipe.steps.map((step, idx) => (
                <p key={idx} style={{fontSize:"0.85rem", color:"#e5d5be", marginBottom:"6px", lineHeight:"1.5"}}>{idx+1}. {step}</p>
              ))}
            </div>
          </div>
        )}

        {/* ===== TAB: LAB (محاكي المخبار الرقمي المعقم) ===== */}
        {tab === "lab" && (
          <div className="fade">
            <div style={{textAlign:"center", marginBottom:"16px"}}>
              <span style={{fontSize:"2rem"}}>🧪</span>
              <h2 style={{fontSize:"1.15rem", color:"#D4AF37", fontWeight:"700"}}>مُحاكي المخبار الرقمي الفوري للخلط</h2>
            </div>

            <div className="glass-card" style={{padding:"20px"}}>
              <span style={{fontSize:"0.85rem", color:"#D4AF37", display:"block", marginBottom:"6px", fontWeight:"600"}}>اختر مادة عطرية لصبها بالمخبار الحسابي:</span>
              <div style={{display:"grid", gridTemplateColumns:"2fr 1fr auto", gap:"8px"}}>
                <select value={labSelectedIng} onChange={e => setLabSelectedIng(e.target.value)} style={{background:"#221105", border:"1px solid rgba(214,175,55,0.5)", borderRadius:"10px", padding:"12px", color:"#fff", fontWeight:"600"}}>
                  {ingredients.map(i => <option key={i.id} value={i.id}>{i.name} ({i.brand})</option>)}
                </select>
                <input type="number" value={labAmount} onChange={e => setLabAmount(Math.max(0, +e.target.value))} style={{background:"rgba(0,0,0,0.4)", border:"1px solid rgba(214,175,55,0.5)", borderRadius:"10px", padding:"12px", color:"#fff", textAlign:"center", fontWeight:"bold"}}/>
                <button onClick={() => {
                  const target = ingredients.find(x => x.id === labSelectedIng);
                  if(!target) return;
                  if(labMix.find(i => i.id === labSelectedIng)) {
                    setLabMix(p => p.map(i => i.id === labSelectedIng ? {...i, amount: i.amount + labAmount} : i));
                  } else {
                    setLabMix(p => [...p, {id: labSelectedIng, amount: labAmount}]);
                  }
                  triggerToast("تم صب المادة داخل المخبار المخبري!");
                }} style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"0 18px", borderRadius:"10px", cursor:"pointer", fontWeight:"700", fontSize:"1.2rem"}}>+</button>
              </div>
            </div>

            <div style={{background:"linear-gradient(135deg, #241207, #120500)", border:"2px solid #D4AF37", borderRadius:"14px", padding:"16px", marginBottom:"16px"}}>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:"0.95rem"}}>
                <span>الحجم الإجمالي الكلي بالمخبار:</span>
                <span style={{color:"#D4AF37", fontWeight:"700", fontSize:"1.1rem"}}>{labMix.reduce((s, i) => s + i.amount, 0)} مل/جم</span>
              </div>
            </div>

            {labMix.length > 0 && (
              <div className="glass-card" style={{padding:"16px"}}>
                <div style={{display:"flex", justifyContent:"space-between", fontSize:"0.8rem", color:"#c8a46a", marginBottom:"8px", fontWeight:"600"}}>
                  <span>المواد المصبوبة حالياً:</span>
                  <span onClick={() => setLabMix([])} style={{color:"#ff8585", cursor:"pointer"}}>✕ تصفير وإعادة البدء</span>
                </div>
                {labMix.map(lm => {
                  const xinf = ingredients.find(i => i.id === lm.id);
                  return (
                    <div key={lm.id} style={{display:"flex", justifyContent:"space-between", fontSize:"0.95rem", padding:"6px 0", borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <span>• {xinf?.name}</span>
                      <span style={{fontWeight:"700", color:"#D4AF37"}}>{lm.amount} {xinf?.unit}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>

      {/* شريط التنقل السفلي المكبر والواضح */}
      <div className="bottom-nav">
        <button onClick={() => setTab("inventory")} className={`nav-item ${tab === "inventory" ? "active" : ""}`}><span className="nav-icon">🏺</span>المخزون</button>
        <button onClick={() => setTab("recipes")} className={`nav-item ${tab === "recipes" ? "active" : ""}`}><span className="nav-icon">📋</span>الوصفات النيش</button>
        <button onClick={() => setTab("lab")} className={`nav-item ${tab === "lab" ? "active" : ""}`}><span className="nav-icon">🧪</span>المختبر</button>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
