<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background: linear-gradient(160deg, rgba(26, 8, 0, 0.97), rgba(58, 26, 5, 0.97)), url('https://images.unsplash.com/photo-1515377905703-c4788e51af15');
  background-size: cover;
  background-attachment: fixed;
  font-family: 'Alexandria', sans-serif;
  color: #fff8f0;
  overflow-x: hidden;
}
input,select,button,textarea{font-family:'Alexandria',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:4px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.02);opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}}

.fade{animation:fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;}
.pulse-glow{animation:pulseGlow 3s ease-in-out infinite;}

#splash-screen {
  position: fixed;
  top:0;left:0;width:100vw;height:100vh;
  background: #120500;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease;
}

.glass-card {
  background: rgba(45, 25, 15, 0.6);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(214, 175, 55, 0.25);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0; height: 76px;
  background: rgba(20, 6, 0, 0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(214, 175, 55, 0.3);
  display: flex; justify-content: space-around; align-items: center;
  padding-bottom: 14px; z-index: 9999;
}
.nav-item {
  background: none; border: none; color: #c8a46a;
  display: flex; flex-direction: column; align-items: center;
  font-size: 0.68rem; font-weight: 400; cursor: pointer;
  transition: all 0.3s ease; gap: 4px;
}
.nav-item.active {
  color: #D4AF37; transform: translateY(-2px);
  text-shadow: 0 0 8px rgba(214,175,55,0.4);
}
.nav-icon { font-size: 1.3rem; }
</style>

</div>

    if(splash) {
      splash.style.opacity = "0";
      setTimeout(() => splash.remove(), 600);
    }
  }, 1200);
});
