function App() {
  const [tab, setTab] = useState("inventory");
  const [ingredients, setIngredients] = useState([]);
  const [recipes, setRecipes] = useState(COMMERCIAL_RECIPES);
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("الكل");
  const [toast, setToast] = useState("");

  // فورم إضافة المادة الجديدة الثابت في الأعلى
  const [newName, setNewName] = useState("");
  const [newBrand, setNewBrand] = useState("");
  const [newCat, setNewCat] = useState("عود");
  const [newStock, setNewStock] = useState(100);
  const [newUnit, setNewUnit] = useState("جم");

  // المخبار
  const [labMix, setLabMix] = useState([]);
  const [labSelectedIng, setLabSelectedIng] = useState("");
  const [labAmount, setLabAmount] = useState(5);
  const [selectedRecipe, setSelectedRecipe] = useState(null);

  const triggerToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 3500);
  };

  useEffect(() => {
    const saved = localStorage.getItem("dahr_dehn_v6_pro");
    if (saved) {
      try {
        const d = JSON.parse(saved);
        if (d.ingredients && d.ingredients.length >= INITIAL_MASTER.length) {
          setIngredients(d.ingredients);
        } else {
          setIngredients(INITIAL_MASTER);
        }
      } catch (e) { setIngredients(INITIAL_MASTER); }
    } else {
      setIngredients(INITIAL_MASTER);
    }
  }, []);

  useEffect(() => {
    if (ingredients.length > 0) {
      localStorage.setItem("dahr_dehn_v6_pro", JSON.stringify({ ingredients }));
    }
  }, [ingredients]);

  useEffect(() => {
    if (ingredients.length > 0 && !labSelectedIng) {
      setLabSelectedIng(ingredients[0].id);
    }
  }, [ingredients]);

  const updateStockValue = (id, delta) => {
    setIngredients(prev => prev.map(item => {
      if (item.id === id) return { ...item, stock: Math.max(0, item.stock + delta) };
      return item;
    }));
  };

  const handleAddNewIngredient = (e) => {
    e.preventDefault();
    if (!newName.trim()) {
      triggerToast("⚠️ فضلاً أدخل اسم الخامة العطرية أولاً!");
      return;
    }
    const newItem = {
      id: "custom_" + Date.now(),
      name: newName,
      brand: newBrand.trim() || "تطوير محلي",
      cat: newCat,
      stock: Number(newStock),
      unit: newUnit,
      img: "https://images.unsplash.com/photo-1616949755610-8c9bbc08f138?auto=format&fit=crop&w=150&q=80"
    };

    setIngredients(prev => [newItem, ...prev]);
    setNewName(""); setNewBrand("");
    triggerToast(`🏺 تم بنجاح تثبيت ${newName} على رفوف مستودعك!`);
  };

  const filteredIngs = (catFilter === "الكل" ? ingredients : ingredients.filter(i => i.cat === catFilter))
    .filter(i => i.name.toLowerCase().includes(search.toLowerCase()) || i.brand.toLowerCase().includes(search.toLowerCase()));

  const getIng = id => ingredients.find(i => i.id === id);

  return (
    <div style={{minHeight:"100vh", paddingBottom:"95px"}}>
      
      {toast && (
        <div style={{position:"fixed", bottom:"100px", left:"50%", transform:"translateX(-50%)", background:"#D4AF37", color:"#1a0800", padding:"12px 24px", borderRadius:"30px", fontSize:"0.8rem", fontWeight:"700", zIndex:999999, boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}} className="fade">
          ✨ {toast}
        </div>
      )}

      <div style={{textAlign:"center", padding:"24px 10px 10px"}}>
        <h1 style={{fontSize:"1.5rem", color:"#D4AF37", fontWeight:"700", textShadow:"0 2px 4px rgba(0,0,0,0.5)"}}>دار الدهن</h1>
        <p style={{fontSize:"0.65rem", color:"#c8a46a", letterSpacing:"3px", marginTop:"2px"}}>MUSHAF AL-DEHN LAB</p>
      </div>

      <div style={{padding:"0 16px", maxWidth:"460px", margin:"0 auto"}}>
        
        {/* ===== TAB: INVENTORY ===== */}
        {tab === "inventory" && (
          <div className="fade">
            
            <div className="glass-card" style={{border:"1px solid #D4AF37", background:"rgba(38,18,7,0.85)"}}>
              <h3 style={{fontSize:"0.85rem", color:"#D4AF37", marginBottom:"10px"}}>➕ لوحة إدخال وإضافة مخزون جديد فوراً</h3>
              <div style={{display:"grid", gap:"8px"}}>
                <input placeholder="اسم الزيت أو المادة العطرية الجديدة..." value={newName} onChange={e => setNewName(e.target.value)} style={{background:"rgba(0,0,0,0.3)", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"10px", color:"#fff", fontSize:"0.8rem"}} />
                <input placeholder="المصدر أو الشركة المصنعة (اختياري)..." value={newBrand} onChange={e => setNewBrand(e.target.value)} style={{background:"rgba(0,0,0,0.3)", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"10px", color:"#fff", fontSize:"0.8rem"} } />
                
                <div style={{display:"grid", gridTemplateColumns:"1.2fr 1fr", gap:"6px"}}>
                  <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{background:"#221105", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"10px", color:"#fff", fontSize:"0.75rem"}}>
                    <option value="عود">عود</option>
                    <option value="تراثي">تراثي / مسك وعنبر</option>
                    <option value="زهري">زهري / ورد طائفي</option>
                    <option value="صندل">صندل</option>
                    <option value="مثبت">مثبت عطور</option>
                    <option value="مضخم">مضخم فوحان (ISO E)</option>
                    <option value="براند">زيوت محاكاة براندات</option>
                  </select>
                  
                  <div style={{display:"flex", gap:"4px"}}>
                    <input type="number" placeholder="الكمية" value={newStock} onChange={e => setNewStock(e.target.value)} style={{background:"rgba(0,0,0,0.3)", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"10px", color:"#fff", fontSize:"0.8rem", width:"100%", textAlign:"center"}} />
                    <select value={newUnit} onChange={e => setNewUnit(e.target.value)} style={{background:"#221105", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"4px", color:"#fff", fontSize:"0.75rem"}}>
                      <option value="جم">جم</option>
                      <option value="مل">مل</option>
                    </select>
                  </div>
                </div>
                
                <button type="button" onClick={handleAddNewIngredient} style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"10px", borderRadius:"8px", fontSize:"0.78rem", fontWeight:"700", cursor:"pointer", marginTop:"4px"}}>
                  💾 حفظ الخامة وتحديث الرفوف تلقائياً
                </button>
              </div>
            </div>

            <div style={{height:"1px", background:"rgba(214,175,55,0.2)", margin:"16px 0"}}></div>

            <h2 style={{fontSize:"0.9rem", color:"#D4AF37", marginBottom:"10px"}}>قائمة الخامات الحالية في الخزانة ({ingredients.length})</h2>
            <input placeholder="🔍 ابحث في الرفوف الفورية..." value={search} onChange={e => setSearch(e.target.value)} style={{background:"rgba(255,255,255,0.05)", border:"1px solid rgba(214,175,55,0.3)", borderRadius:"10px", padding:"10px", color:"#fff", width:"100%", marginBottom:"12px", outline:"none"}}/>

            <div style={{display:"flex", gap:"4px", overflowX:"auto", marginBottom:"12px", paddingBottom:"4px"}}>
              {["الكل","عود","تراثي","زهري","صندل","مثبت","مضخم","براند"].map(c => (
                <button key={c} onClick={() => setCatFilter(c)} style={{background: catFilter === c ? "#D4AF37" : "rgba(255,255,255,0.05)", border: "1px solid #D4AF37", color: catFilter === c ? "#1a0800" : "#D4AF37", padding:"4px 12px", borderRadius:"20px", fontSize:"0.65rem", cursor:"pointer", whiteSpace:"nowrap"}}>{c}</button>
              ))}
            </div>

            {filteredIngs.map(ing => (
              <div key={ing.id} className="glass-card" style={{padding:"10px", display:"flex", gap:"10px", alignItems:"center"}}>
                <img src={ing.img} alt={ing.name} style={{width:"44px", height:"44px", borderRadius:"10px", objectFit:"cover", border:"1px solid rgba(214,175,55,0.2)"}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.78rem", fontWeight:"600", color:"#fff"}}>{ing.name}</div>
                  <div style={{fontSize:"0.6rem", color:"#c8a46a"}}>المصنع: {ing.brand} • التصنيف: {ing.cat}</div>
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:"6px"}}>
                    <span style={{fontSize:"0.72rem", color:"#D4AF37", fontWeight:"600"}}>المتاح: {ing.stock} {ing.unit}</span>
                    <div style={{display:"flex", alignItems:"center", gap:"4px"}}>
                      <button type="button" onClick={() => updateStockValue(ing.id, -5)} style={{background:"rgba(255,255,255,0.05)", border:"1px solid rgba(214,175,55,0.3)", color:"#fff", width:"24px", height:"24px", borderRadius:"50%", cursor:"pointer"}}>−</button>
                      <button type="button" onClick={() => updateStockValue(ing.id, 5)} style={{background:"#D4AF37", border:"none", color:"#1a0800", width:"24px", height:"24px", borderRadius:"50%", cursor:"pointer", fontWeight:"bold"}}>+</button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ===== TAB: RECIPES (مجموعات النيش الفخمة لـ بو عيسى) ===== */}
        {tab === "recipes" && !selectedRecipe && (
          <div className="fade">
            <h2 style={{fontSize:"0.95rem", color:"#D4AF37", marginBottom:"4px", fontWeight:"600"}}>👑 خلطات النيش الملكية الصيفية (حسب مخزونك)</h2>
            <p style={{fontSize:"0.65rem", color:"#c8a46a", marginBottom:"12px"}}>اضغط على أي تركيبة لعرض مقادير الجرامات الدقيقة وطريقة التوليف المعملي الفوري</p>
            
            {recipes.map(r => (
              <div key={r.id} onClick={() => setSelectedRecipe(r)} className="glass-card" style={{cursor:"pointer", borderRight:"4px solid #D4AF37", background:"rgba(255,248,240,0.05)"}}>
                <div style={{display:"flex", justifyValue:"space-between", justifyContent:"space-between", alignItems:"center", marginBottom:"4px"}}>
                  <span style={{fontSize:"0.82rem", color:"#fff", fontWeight:"600"}}>{r.name}</span>
                  <span style={{fontSize:"0.85rem"}}>{r.seasonIcon}</span>
                </div>
                <p style={{fontSize:"0.68rem", color:"#e5d5be", lineHeight:"1.4", marginBottom:"8px"}}>{r.description}</p>
                <div style={{display:"flex", gap:"6px"}}>
                  <span style={{background:"rgba(214,175,55,0.12)", color:"#D4AF37", fontSize:"0.6rem", padding:"2px 8px", borderRadius:"12px"}}>⏱ {r.stability}</span>
                  <span style={{background:"rgba(255,255,255,0.08)", color:"#fff", fontSize:"0.6rem", padding:"2px 8px", borderRadius:"12px"}}>👥 {r.gender}</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "recipes" && selectedRecipe && (
          <div className="fade">
            <button onClick={() => setSelectedRecipe(null)} style={{background:"none", border:"1px solid #D4AF37", color:"#D4AF37", padding:"4px 14px", borderRadius:"20px", fontSize:"0.7rem", marginBottom:"12px", cursor:"pointer"}}>← العودة لدليل النيش المقترح</button>
            
            <div className="glass-card" style={{textAlign:"center", background:"rgba(214,175,55,0.07)"}}>
              <span style={{fontSize:"1.4rem"}}>{selectedRecipe.seasonIcon}</span>
              <h2 style={{fontSize:"1.05rem", color:"#D4AF37", fontWeight:"600", marginTop:"4px"}}>{selectedRecipe.name}</h2>
              <p style={{fontSize:"0.7rem", color:"#fff", marginTop:"4px", lineHeight:"1.5"}}>{selectedRecipe.description}</p>
            </div>

            <h3 style={{fontSize:"0.8rem", color:"#D4AF37", marginBottom:"6px"}}>🏺 النسب الدقيقة لتركيب العينة (بالجرام / الملي):</h3>
            {selectedRecipe.ingredients.map(ri => {
              const ing = getIng(ri.id);
              return (
                <div key={ri.id} style={{display:"flex", justifyContent:"space-between", background:"rgba(255,255,255,0.03)", padding:"8px 12px", borderRadius:"10px", marginBottom:"4px"}}>
                  <span style={{fontSize:"0.75rem"}}>{ing?.name || ri.name}</span>
                  <span style={{fontSize:"0.78rem", fontWeight:"600", color:"#D4AF37"}}>{ri.amount} جم/مل</span>
                </div>
              );
            })}

            <div className="glass-card" style={{marginTop:"12px", background:"rgba(0,0,0,0.25)"}}>
              <h4 style={{fontSize:"0.75rem", color:"#D4AF37", marginBottom:"6px"}}>🛠️ خطوات التصنيع المعملي الفاخر:</h4>
              {selectedRecipe.steps.map((step, idx) => (
                <p key={idx} style={{fontSize:"0.68rem", color:"#e5d5be", marginBottom:"4px"}}>{idx+1}. {step}</p>
              ))}
            </div>
          </div>
        )}

        {/* ===== TAB: LAB ===== */}
        {tab === "lab" && (
          <div className="fade">
            <div style={{textAlign:"center", marginBottom:"12px"}}>
              <span style={{fontSize:"1.6rem"}}>🧪</span>
              <h2 style={{fontSize:"1rem", color:"#D4AF37", fontWeight:"600"}}>مُحاكي المخبار الرقمي الفوري</h2>
            </div>

            <div className="glass-card">
              <span style={{fontSize:"0.7rem", color:"#D4AF37", display:"block", marginBottom:"4px"}}>اختر مادة من الرف لصبها بالمخبار:</span>
              <div style={{display:"grid", gridTemplateColumns:"2fr 1fr auto", gap:"6px"}}>
                <select value={labSelectedIng} onChange={e => setLabSelectedIng(e.target.value)} style={{background:"#221105", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"10px", color:"#fff", fontSize:"0.75rem"}}>
                  {ingredients.map(i => <option key={i.id} value={i.id}>{i.name} ({i.brand})</option>)}
                </select>
                <input type="number" value={labAmount} onChange={e => setLabAmount(Math.max(0, +e.target.value))} style={{background:"rgba(0,0,0,0.3)", border:"1px solid rgba(214,175,55,0.4)", borderRadius:"8px", padding:"10px", color:"#fff", fontSize:"0.8rem", textAlign:"center"}}/>
                <button onClick={() => {
                  const target = ingredients.find(x => x.id === labSelectedIng);
                  if(!target) return;
                  if(labMix.find(i => i.id === labSelectedIng)) {
                    setLabMix(p => p.map(i => i.id === labSelectedIng ? {...i, amount: i.amount + labAmount} : i));
                  } else {
                    setLabMix(p => [...p, {id: labSelectedIng, amount: labAmount}]);
                  }
                }} style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"0 14px", borderRadius:"10px", cursor:"pointer", fontWeight:"600"}}>+</button>
              </div>
            </div>

            <div style={{background:"linear-gradient(135deg, #241207, #120500)", border:"1px solid #D4AF37", borderRadius:"14px", padding:"14px", marginBottom:"12px"}}>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:"0.72rem", marginBottom:"4px"}}><span>الحجم الكلي بالتوليفة التجريبية:</span><span style={{color:"#D4AF37", fontWeight:"600"}}>{labMix.reduce((s, i) => s + i.amount, 0)} مل/جم</span></div>
            </div>

            {labMix.length > 0 && (
              <div className="glass-card" style={{padding:"10px"}}>
                <div style={{display:"flex", justifyContent:"space-between", fontSize:"0.68rem", color:"#c8a46a", marginBottom:"6px"}}>
                  <span>العناصر النشطة بالمخبار:</span>
                  <span onClick={() => setLabMix([])} style={{color:"#ff8585", cursor:"pointer"}}>✕ تصفير الخلطة</span>
                </div>
                {labMix.map(lm => {
                  const xinf = ingredients.find(i => i.id === lm.id);
                  return (
                    <div key={lm.id} style={{display:"flex", justifyContent:"space-between", fontSize:"0.72rem", padding:"3px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                      <span>• {xinf?.name}</span>
                      <span style={{fontWeight:"600"}}>{lm.amount} {xinf?.unit}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>

      <div className="bottom-nav no-print">
        <button onClick={() => setTab("inventory")} className={`nav-item ${tab === "inventory" ? "active" : ""}`}><span className="nav-icon">🏺</span>المخزون</button>
        <button onClick={() => setTab("recipes")} className={`nav-item ${tab === "recipes" ? "active" : ""}`}><span className="nav-icon">📋</span>الوصفات الملكية</button>
        <button onClick={() => setTab("lab")} className={`nav-item ${tab === "lab" ? "active" : ""}`}><span className="nav-icon">🧪</span>المختبر</button>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
