<style>
/* ═══════════ ATELIER DHAWI — Obsidian Edition ═══════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  font-family:'Alexandria',sans-serif;
  color:#1A1208;
  overflow-x:hidden;min-height:100vh;font-size:15px;
  background:#FAF8F3;
  background-image:
    radial-gradient(ellipse 140% 60% at 50% -10%, rgba(180,100,15,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 95% 110%, rgba(140,40,100,0.09) 0%, transparent 50%),
    radial-gradient(ellipse 60% 45% at 5% 65%, rgba(40,20,90,0.08) 0%, transparent 55%);
  background-attachment:fixed;
}
/* noise grain overlay via pseudo */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:180px;opacity:0.6;
}
:root{
  --c-deep-oud:#2C1A0E;
  --c-rose-arabic:#8B3A5A;
  --c-sage:#4A6741;
  --c-gold:#C9A84C;
  --c-gold-dark:#8A6A1E;
  --c-ivory:#FAF8F3;
}
/* ── Dark Mode ── */
body.dark-mode{
  background:#0D0A06;color:#E8D9B8;
  background-image:radial-gradient(ellipse 140% 60% at 50% -10%,rgba(180,100,15,0.18) 0%,transparent 55%),radial-gradient(ellipse 80% 50% at 95% 110%,rgba(140,40,100,0.12) 0%,transparent 50%);
}
body.dark-mode .glass{background:rgba(20,12,5,0.88);border-color:rgba(201,168,76,0.14);color:#E8D9B8;}
body.dark-mode .glass-gold{background:linear-gradient(135deg,rgba(30,18,6,0.96),rgba(20,12,4,0.94));border-color:rgba(201,168,76,0.28);}
body.dark-mode .inp{background:rgba(255,255,255,0.06);border-color:rgba(201,168,76,0.18);color:#E8D9B8;}
body.dark-mode .inp::placeholder{color:rgba(232,217,184,0.30);}
body.dark-mode .bottom-nav{background:rgba(10,7,3,0.97);}
body.dark-mode .modal-sheet{background:rgba(15,10,4,0.98);color:#E8D9B8;}
body.dark-mode .recipe-card{background:rgba(22,14,6,0.90);color:#E8D9B8;}
body.dark-mode .quick-action{background:rgba(22,14,6,0.85);border-color:rgba(201,168,76,0.14);}
/* ── New Animations ── */
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(104,176,104,0.45)}70%{box-shadow:0 0 0 9px rgba(104,176,104,0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* ── Quick Action Grid ── */
.quick-action{
  background:rgba(255,255,255,0.85);border:1px solid rgba(26,18,8,0.08);
  border-radius:18px;padding:14px 8px;text-align:center;cursor:pointer;
  transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1),border-color 0.22s,background 0.22s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.quick-action:active{transform:scale(0.92);}
.quick-action-icon{font-size:1.5rem;line-height:1;}
.quick-action-label{font-size:0.58rem;font-weight:700;color:#8A6A1E;letter-spacing:0.3px;text-align:center;}
/* ── Stat Chip ── */
.stat-chip{
  display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:18px;
  font-size:0.68rem;font-weight:700;
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.18);color:#8A6A1E;
}
/* ── Product Card (Store) ── */
.product-card{
  border-radius:18px;overflow:hidden;border:1px solid rgba(26,18,8,0.10);
  background:rgba(255,255,255,0.90);
  transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.22s;
  position:relative;box-shadow:0 4px 16px rgba(0,0,0,0.06);
}
.product-card:active{transform:scale(0.97);}
.product-card-banner{height:80px;background:linear-gradient(135deg,#1A1208,#3A2010,#8A6A1E);display:flex;align-items:center;justify-content:center;font-size:2.4rem;position:relative;overflow:hidden;}
.product-card-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(201,168,76,0.15));}
/* ── Lab Timer ── */
.lab-timer{font-family:'IBM Plex Mono',monospace;font-size:1.9rem;font-weight:300;color:#C9A84C;letter-spacing:0.12em;text-align:center;}
/* ── Revenue Hero ── */
.rev-hero{
  background:linear-gradient(135deg,#1A1208 0%,#2C1A0E 60%,#1A0E06 100%);
  border-radius:24px;padding:22px 20px 18px;position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.22);
}
.rev-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.65),transparent);}
/* ── Inventory Stock Bar ── */
.stock-bar{height:3px;background:rgba(26,18,8,0.08);border-radius:3px;margin-top:4px;overflow:hidden;}
.stock-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
/* ── KPI Mini Card ── */
.kpi-mini{background:rgba(255,255,255,0.80);border:1px solid rgba(26,18,8,0.10);border-radius:14px;padding:12px 10px;text-align:center;}
.kpi-mini-val{font-family:'IBM Plex Mono',monospace;font-size:1.15rem;font-weight:600;line-height:1;margin-bottom:4px;}
.kpi-mini-lbl{font-size:0.55rem;color:rgba(26,18,8,0.45);letter-spacing:0.2px;}
/* ── Enhanced Recipe Card ── */
.recipe-card-top{height:4px;margin:-18px -18px 14px;border-radius:20px 20px 0 0;}
/* ── Recipe DNA strip (dynamic per card — set via inline) ── */
/* ── Scent Pyramid ── */
.scent-pyramid{display:flex;flex-direction:column;align-items:center;gap:3px;margin:10px 0;}
.pyramid-row{border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:width 0.5s cubic-bezier(0.22,1,0.36,1);}
/* ── Recipe stat badge ── */
.rec-stat{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,0.85);border:1px solid rgba(26,18,8,0.09);border-radius:12px;padding:8px 10px;flex:1;}
.rec-stat-val{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600;color:#1A1208;line-height:1;}
.rec-stat-lbl{font-size:0.52rem;color:rgba(26,18,8,0.40);text-align:center;}
/* ── Sort chips ── */
.sort-chip{padding:4px 10px;border-radius:16px;font-size:0.65rem;font-weight:700;cursor:pointer;transition:all 0.18s;border:1px solid rgba(26,18,8,0.10);background:rgba(26,18,8,0.04);color:rgba(26,18,8,0.40);white-space:nowrap;}
.sort-chip.active{background:rgba(201,168,76,0.14);border-color:rgba(201,168,76,0.40);color:#8A6A1E;}
/* ── Filter scroll row ── */
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{padding:5px 12px;border-radius:20px;border:1px solid rgba(26,18,8,0.10);background:rgba(26,18,8,0.04);color:rgba(26,18,8,0.45);font-size:0.70rem;cursor:pointer;font-weight:500;white-space:nowrap;transition:all 0.18s;}
.fchip.on{background:rgba(201,168,76,0.12);border-color:rgba(138,106,30,0.50);color:#8A6A1E;font-weight:700;}
.fchip.gender.on{background:rgba(160,130,210,0.12);border-color:rgba(160,130,210,0.45);color:#c8a0f0;}
/* ── Similar recipe chip ── */
.similar-chip{background:rgba(255,255,255,0.85);border:1px solid rgba(26,18,8,0.10);border-radius:14px;padding:10px 12px;cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;gap:8px;}
.similar-chip:active{transform:scale(0.97);}

/* ── Batch Activity Row ── */
.activity-row{display:flex;gap:12px;align-items:center;padding:9px 0;}
.activity-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
#root{position:relative;z-index:1;}
input,select,button,textarea{font-family:'Alexandria',sans-serif;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:2px;}
::-webkit-scrollbar-track{background:transparent;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmerSweep{0%{left:-100%}100%{left:120%}}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes splashOut{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
@keyframes navPop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes borderGlow{0%,100%{border-color:rgba(201,168,76,0.20)}50%{border-color:rgba(201,168,76,0.50)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── Luxury Additions ── */
@keyframes cardRise{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes goldPulseCard{0%,100%{box-shadow:0 2px 0 rgba(26,18,8,0.08) inset,0 20px 48px rgba(180,140,40,0.10),0 4px 12px rgba(0,0,0,0.05)}50%{box-shadow:0 2px 0 rgba(26,18,8,0.08) inset,0 20px 48px rgba(180,140,40,0.10),0 4px 12px rgba(0,0,0,0.05),0 0 24px rgba(201,168,76,0.10)}}
@keyframes shimmerPass{0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(250%) skewX(-15deg)}}
@keyframes ingAdd{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes glowLine{0%,100%{opacity:0.4}50%{opacity:1;filter:brightness(1.6)}}
@keyframes scanPulse{0%{top:0;opacity:0.6}90%{opacity:0.6}100%{top:100%;opacity:0}}

.fade{animation:fadeUp 0.38s cubic-bezier(0.22,1,0.36,1) both;}
.tab-fade{animation:slideUp 0.32s cubic-bezier(0.22,1,0.36,1) both;}
.alert-pulse{animation:alertPulse 2s ease-in-out infinite;}

/* ── Splash ── */
#splash{
  position:fixed;inset:0;
  background:#FAF8F3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  z-index:99999;
  animation:splashOut 1.8s 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
  pointer-events:none;
}
#splash::after{content:none;}

/* ── Card System ── */
.glass{
  background:rgba(255,255,255,0.82);
  border:1px solid rgba(26,18,8,0.10);
  border-radius:20px;padding:18px;margin-bottom:12px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 0 rgba(26,18,8,0.08) inset,0 20px 48px rgba(180,140,40,0.10),0 4px 12px rgba(0,0,0,0.05);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:border-color 0.3s,box-shadow 0.3s;
}
.glass:hover{
  box-shadow: 0 8px 32px rgba(201,168,76,0.15), 0 2px 8px rgba(0,0,0,0.10), inset 0 1px 0 rgba(26,18,8,0.08);
}
.glass::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.25) 40%,rgba(201,168,76,0.40) 50%,rgba(201,168,76,0.25) 60%,transparent);
  pointer-events:none;
}
.glass-gold{
  background:rgba(255,252,245,0.90);
  border:1px solid rgba(201,168,76,0.22);
  border-radius:20px;padding:18px;margin-bottom:12px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 0 rgba(201,168,76,0.07) inset,0 20px 48px rgba(0,0,0,0.08),0 0 30px rgba(201,168,76,0.10);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.glass-gold::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.35) 25%,rgba(232,196,96,0.65) 50%,rgba(201,168,76,0.35) 75%,transparent);
  pointer-events:none;
}

/* ── Floating Bottom Nav ── */
.bottom-nav{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  width:calc(100% - 28px);max-width:420px;height:64px;
  background:rgba(250,248,243,0.95);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid rgba(201,168,76,0.18);
  border-radius:36px;
  display:flex;justify-content:space-around;align-items:center;
  padding:0 6px;z-index:9999;
  box-shadow:0 24px 64px rgba(0,0,0,0.12),0 0 0 1px rgba(26,18,8,0.08),inset 0 1px 0 rgba(26,18,8,0.08);
}
.nav-btn{
  background:none;border:none;color:rgba(26,18,8,0.26);
  display:flex;flex-direction:column;align-items:center;
  font-size:0.44rem;font-weight:700;cursor:pointer;
  transition:all 0.24s cubic-bezier(0.34,1.56,0.64,1);
  gap:3px;padding:6px 4px;min-width:48px;
  letter-spacing:0.4px;text-transform:uppercase;
  position:relative;border-radius:28px;
}
.nav-btn.active{
  color:#8A6A1E;
  text-shadow:none;
}
.nav-btn.active::before{
  content:'';position:absolute;inset:-2px -4px;
  background:linear-gradient(135deg,rgba(201,168,76,0.14),rgba(201,168,76,0.05));
  border:1px solid rgba(201,168,76,0.28);
  border-radius:28px;
  animation:navPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.nav-btn.active .nav-icon{
  filter:drop-shadow(0 2px 4px rgba(138,106,30,0.35));
}
.nav-icon{font-size:1.22rem;position:relative;z-index:1;transition:filter 0.24s;}

/* ── Input ── */
.inp{
  background:rgba(255,255,255,0.80);
  border:1px solid rgba(26,18,8,0.12);
  border-radius:14px;padding:13px 16px;
  color:#1A1208;outline:none;
  font-family:'Alexandria',sans-serif;font-size:0.9rem;width:100%;
  transition:border-color 0.22s,background 0.22s,box-shadow 0.22s;
  line-height:1.7;-webkit-appearance:none;
}
.inp:focus{border-color:rgba(201,168,76,0.50);background:rgba(26,18,8,0.10);box-shadow:0 0 0 4px rgba(201,168,76,0.06);}
.inp::placeholder{color:rgba(26,18,8,0.12);}

/* ── Buttons ── */
.btn-gold{
  background:linear-gradient(135deg,#C9A030,#8B6010);
  color:#07050E;border:none;
  padding:14px 24px;border-radius:32px;
  font-weight:800;font-size:0.9rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(201,168,76,0.30),0 1px 3px rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.25);
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing:0.3px;position:relative;overflow:hidden;
  font-family:'Alexandria',sans-serif;
}
.btn-gold:active{transform:scale(0.97);box-shadow:0 2px 10px rgba(180,140,36,0.20);}
.btn-gold::after{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  transform:skewX(-20deg);
  animation:shimmerSweep 3.5s 1s infinite;
}
.btn-ghost{
  background:transparent;
  border:1px solid rgba(201,168,76,0.28);
  color:#C9A84C;padding:9px 18px;border-radius:28px;
  font-size:0.75rem;cursor:pointer;font-weight:700;
  transition:all 0.18s;font-family:'Alexandria',sans-serif;letter-spacing:0.2px;
}
.btn-ghost:active{background:rgba(201,168,76,0.10);border-color:rgba(201,168,76,0.45);}
.btn-danger{
  background:transparent;
  border:1px solid rgba(139,58,90,0.32);
  color:var(--c-rose-arabic);padding:9px 16px;border-radius:28px;
  font-size:0.75rem;cursor:pointer;font-weight:600;
  font-family:'Alexandria',sans-serif;
}
.btn-danger:active{background:rgba(139,58,90,0.10);}

/* ── Tags ── */
.tag{padding:3px 10px;border-radius:20px;font-size:0.62rem;font-weight:700;letter-spacing:0.2px;display:inline-block;}
.tag-gold{background:rgba(201,168,76,0.08);color:#C9A84C;border:1px solid rgba(201,168,76,0.20);}
.tag-green{background:rgba(74,103,65,0.08);color:var(--c-sage);border:1px solid rgba(74,103,65,0.18);}
.tag-red{background:rgba(160,40,40,0.08);color:#B06060;border:1px solid rgba(160,40,40,0.18);}
.tag-blue{background:rgba(60,100,180,0.08);color:#7090C8;border:1px solid rgba(60,100,180,0.18);}
.tag-top{background:rgba(201,168,76,0.10);color:#D4AF37;border:1px solid rgba(201,168,76,0.24);}
.tag-mid{background:rgba(160,100,30,0.09);color:#B08040;border:1px solid rgba(160,100,30,0.20);}
.tag-base{background:rgba(100,70,30,0.09);color:#907050;border:1px solid rgba(100,70,30,0.20);}

input[type=number]{-moz-appearance:textfield;}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

/* ── Stat Cards ── */
.stat-card{
  background:rgba(255,255,255,0.75);border-radius:16px;padding:16px 14px;text-align:center;
  border:1px solid rgba(26,18,8,0.10);
  box-shadow:inset 0 1px 0 rgba(26,18,8,0.08);
}

/* ── KPI Card (premium) ── */
.kpi-card{
  background:rgba(26,18,8,0.08);
  border:1px solid rgba(26,18,8,0.10);
  border-radius:18px;padding:16px 14px;
  position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(26,18,8,0.12) 50%,transparent);
  pointer-events:none;
}

/* ── Recipe Card ── */
.recipe-card{
  border-radius:20px;padding:16px;margin-bottom:10px;
  position:relative;overflow:hidden;
  border:1px solid rgba(26,18,8,0.10);
  background:rgba(255,255,255,0.85);
  transition:border-color 0.25s,box-shadow 0.25s;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.recipe-card.ready-card{
  border-color:rgba(201,168,76,0.28);
  box-shadow:0 0 0 0.5px rgba(201,168,76,0.10),0 8px 32px rgba(0,0,0,0.10);
}
.recipe-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;

}
.recipe-card.fav-card{border-color:rgba(228,196,96,0.45);}
.recipe-card.compare-card{border-color:rgba(100,130,210,0.55);}

/* ── Ingredient Card ── */
.ing-card{
  background:rgba(255,255,255,0.80);
  border:1px solid rgba(26,18,8,0.10);

}
.ing-card.low-card{border-inline-start:3px solid rgba(185,45,45,0.75);}
.ing-card.expiry-card{border-inline-start:3px solid rgba(190,125,25,0.65);}

/* ── Customer Avatar ── */
.cust-avatar{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));
  border:1px solid rgba(201,168,76,0.22);
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;font-weight:800;color:#D4AF37;
  flex-shrink:0;font-family:'Alexandria',sans-serif;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

/* ── Fancy Section Divider ── */
.fancy-div{display:flex;align-items:center;gap:10px;margin:16px 0 12px;}
.fancy-div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.22));}
.fancy-div-line-rev{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.22),transparent);}
.fancy-div-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:0.50rem;color:rgba(201,168,76,0.45);
  letter-spacing:0.48em;text-transform:uppercase;white-space:nowrap;
}

/* ── Tab Slide Transition ── */
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.tab-fade{animation:slideUp 0.32s cubic-bezier(0.22,1,0.36,1) both;}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,18,8,0.65);z-index:9998;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal-sheet{
  background:#FAF8F3;
  border-radius:28px 28px 0 0;padding:22px 20px 44px;
  width:100%;max-width:480px;
  border-top:1px solid rgba(201,168,76,0.35);
  max-height:88vh;overflow-y:auto;
  box-shadow:0 -28px 80px rgba(0,0,0,0.12),inset 0 1px 0 rgba(26,18,8,0.08);
}
.modal-sheet::before{
  content:'';display:block;width:36px;height:4px;
  background:rgba(201,168,76,0.28);border-radius:2px;margin:0 auto 20px;
}

/* ── Misc ── */
.star-btn{background:none;border:none;cursor:pointer;font-size:1.7rem;padding:4px;transition:transform 0.15s;}
.star-btn:active{transform:scale(1.32);}
.suggest-card{
  background:linear-gradient(135deg,rgba(50,130,52,0.08),rgba(250,248,243,0.96));
  border:1px solid rgba(50,130,52,0.28);border-radius:18px;padding:16px;margin-bottom:12px;
  animation:fadeUp 0.4s ease both;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
/* ── Customer Store ── */
.pkg-card{
  transition:transform 0.38s cubic-bezier(0.22,1,0.36,1),box-shadow 0.38s ease;
  cursor:pointer;
  background:linear-gradient(160deg,rgba(255,252,240,0.95),rgba(250,248,235,0.98)) padding-box,
             linear-gradient(135deg,rgba(201,168,76,0.42),rgba(60,35,5,0.18),rgba(201,168,76,0.42)) border-box;
  border:1.5px solid transparent;border-radius:20px;overflow:hidden;position:relative;
}
.pkg-card:hover{
  transform:perspective(640px) rotateY(10deg) rotateX(-4deg) translateY(-6px);
  box-shadow:18px 14px 48px rgba(0,0,0,0.10),-3px -2px 20px rgba(201,168,76,0.10);
}
.pkg-top-bar{height:6px;background:linear-gradient(90deg,rgba(201,168,76,0.0),rgba(201,168,76,0.55),rgba(201,168,76,0.0));}
.pkg-badge{position:absolute;top:10px;right:10px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.28);border-radius:20px;padding:2px 8px;font-size:0.52rem;color:rgba(201,168,76,0.70);letter-spacing:0.4px;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-style:italic;}
/* ── Cart Overlay ── */
.cart-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,18,8,0.55);backdrop-filter:blur(10px);}
.cart-sheet{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:#FAF8F3;border-top:1px solid rgba(201,168,76,0.22);border-radius:24px 24px 0 0;
  padding:20px 18px 40px;max-height:82vh;overflow-y:auto;}
.cart-sheet-handle{width:36px;height:4px;background:rgba(26,18,8,0.12);border-radius:2px;margin:0 auto 18px;}
.cart-item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(26,18,8,0.08);}
/* Barcode */
.barcode{display:flex;align-items:flex-end;gap:0;height:28px;}
.expiry-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(26,18,8,0.08);font-size:0.78rem;
}

/* ── Typography System ── */
.g-line{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.28),transparent);margin:14px 0;}
.brand-sub{
  font-family:'Cormorant Garamond','Georgia',serif;font-style:italic;
  font-size:0.50rem;font-weight:300;
  color:rgba(201,168,76,0.50);letter-spacing:0.38em;text-transform:uppercase;
  margin-top:2px;display:block;
}
.data-label{
  font-size:0.50rem;color:rgba(26,18,8,0.32);
  letter-spacing:0.65px;text-transform:uppercase;font-weight:700;
}
.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.section-hdr-bar{width:3px;height:18px;background:linear-gradient(180deg,#E8C870,#7A5820);border-radius:2px;flex-shrink:0;}
.mono{font-family:'IBM Plex Mono','Courier New',monospace;letter-spacing:-0.02em;}

/* ── Premium Number Classes (gradient text in CSS — no inline webkit) ── */
.p-num{

  background:linear-gradient(135deg,#F0D878 0%,#C9A84C 55%,#9A7828 100%);

}
.p-num-hero{

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;

}

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.p-num-green{
  font-family:'IBM Plex Mono','Courier New',monospace;
  font-size:1.4rem;font-weight:600;letter-spacing:-0.04em;line-height:1;
  background:linear-gradient(135deg,#90D870,#50A838);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.p-num-blue{
  font-family:'IBM Plex Mono','Courier New',monospace;
  font-size:1.4rem;font-weight:600;letter-spacing:-0.04em;line-height:1;
  background:linear-gradient(135deg,#90B8F8,#5070C8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.p-num-amber{
  font-family:'IBM Plex Mono','Courier New',monospace;
  font-size:1.4rem;font-weight:600;letter-spacing:-0.04em;line-height:1;

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ══ LUXURY LAB ENHANCEMENTS ══ */
/* Glass card shimmer on hover */
.glass::after{
  content:'';position:absolute;top:0;left:0;width:50%;height:100%;
  background:linear-gradient(105deg,transparent 30%,rgba(26,18,8,0.08) 50%,transparent 70%);
  transform:translateX(-100%) skewX(-15deg);
  pointer-events:none;transition:none;
}
.glass:hover::after{animation:shimmerPass 0.65s ease forwards;}
.glass:hover{
  border-color:rgba(201,168,76,0.22);
  box-shadow:0 12px 40px rgba(0,0,0,0.10),0 0 32px rgba(201,168,76,0.08),inset 0 1px 0 rgba(26,18,8,0.08);
}
/* Gold glass shimmer */
.glass-gold::after{
  content:'';position:absolute;top:0;left:0;width:50%;height:100%;
  background:linear-gradient(105deg,transparent 30%,rgba(201,168,76,0.08) 50%,transparent 70%);
  transform:translateX(-100%) skewX(-15deg);
  pointer-events:none;
}
.glass-gold:hover::after{animation:shimmerPass 0.65s ease forwards;}
/* Gradient top line animation */
.glass-gold::before{animation:glowLine 3s ease-in-out infinite;}

/* Recipe/product cards rise in */
.lux-card-in{animation:cardRise 0.5s cubic-bezier(0.22,1,0.36,1) both;}

/* Ingredient row add highlight */
.lux-ing-add{animation:ingAdd 0.35s cubic-bezier(0.22,1,0.36,1);}

/* Bottom nav scan line */
.bottom-nav::after{
  content:'';position:absolute;right:0;left:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.45),transparent);
  animation:scanPulse 4s ease-in-out infinite;
  pointer-events:none;
}

/* Stat numbers glow */
.p-num-gold{animation:borderGlow 3s ease-in-out infinite;}
.p-num-green,.p-num-blue,.p-num-amber{
  filter:drop-shadow(0 0 6px currentColor);
}

/* Ambient particles canvas */
#lab-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.40;}

/* Smooth scroll */
html{scroll-behavior:smooth;}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,::before,::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
}

/* ══════════ DESIGN v3 — ATELIER UPGRADE ══════════ */

/* ── Splash: full black luxury ── */
#splash{background:#0D0A06 !important;}
@keyframes splashRingPulse{0%,100%{opacity:0.25;transform:scale(1)}50%{opacity:0.55;transform:scale(1.04)}}
@keyframes splashLineGlow{0%,100%{opacity:0.3;width:40px}50%{opacity:0.8;width:100px}}
#splash-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(201,168,76,0.18);
  animation:splashRingPulse 2.2s ease-in-out infinite;
}
#splash-line{
  height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.65),transparent);
  margin:12px auto 16px;
  animation:splashLineGlow 2s ease-in-out 0.3s infinite;
}

/* ── Bottom Nav active gold dot ── */
.nav-dot{
  position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  width:0;height:3px;border-radius:3px;
  background:linear-gradient(90deg,#C9A84C,#F0D870);
  transition:width 0.30s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 0 6px rgba(201,168,76,0.50);
}
.nav-btn{position:relative;}
.nav-btn.active .nav-dot{width:24px;}
.nav-btn.active .nav-icon{
  transform:translateY(-2px) scale(1.10);
  filter:drop-shadow(0 2px 6px rgba(138,106,30,0.40));
}
.nav-icon{transition:transform 0.24s cubic-bezier(0.34,1.56,0.64,1),filter 0.24s;}

/* ── Context Header bar (colored per tab) ── */
.tab-ctx-bar{
  height:2px;border-radius:2px;
  transition:background 0.35s ease;
  margin-bottom:0;
}

/* ── Section title micro label ── */
.sec-micro{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:0.46rem;letter-spacing:0.48em;text-transform:uppercase;
  color:rgba(201,168,76,0.42);
  margin-bottom:5px;display:block;
}

/* ── Vertical Bar Chart ── */
.v-bar-wrap{display:flex;align-items:flex-end;gap:5px;height:78px;padding-top:8px;}
.v-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0;}
.v-bar{
  width:100%;border-radius:5px 5px 2px 2px;
  background:linear-gradient(180deg,#E8C460 0%,#9A7828 100%);
  min-height:4px;transition:height 0.6s cubic-bezier(0.22,1,0.36,1);
  position:relative;overflow:hidden;
  box-shadow:0 2px 8px rgba(201,168,76,0.20);
}
.v-bar.neg{background:linear-gradient(180deg,#E07070 0%,#9A2828 100%);}
.v-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:35%;background:rgba(255,255,255,0.14);border-radius:5px 5px 0 0;}
.v-bar-lbl{font-size:0.43rem;color:rgba(26,18,8,0.32);font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
.v-bar-val{font-size:0.48rem;color:#8A6A1E;font-family:'IBM Plex Mono',monospace;font-weight:700;white-space:nowrap;}

/* ── Category filter chips ── */
.cat-chip{padding:5px 14px;border-radius:20px;border:1px solid rgba(201,168,76,0.18);background:rgba(26,18,8,0.04);color:rgba(26,18,8,0.38);font-size:0.68rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.18s;font-family:'Alexandria',sans-serif;}
.cat-chip.on{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.42);color:#8A6A1E;font-weight:700;}

/* ── Ingredient card hover ── */
.ing-card{transition:border-color 0.22s,box-shadow 0.22s,background 0.22s;}

/* ── Premium Step Number ── */
.step-num{
  min-width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,rgba(201,168,76,0.80),rgba(138,106,30,0.80));
  color:#07050E;display:flex;align-items:center;justify-content:center;
  font-size:0.62rem;font-weight:800;flex-shrink:0;
  box-shadow:0 1px 4px rgba(201,168,76,0.25);
}

/* ── Dark mode extras ── */
body.dark-mode .kpi-mini{background:rgba(22,14,6,0.85);border-color:rgba(201,168,76,0.10);}
body.dark-mode .kpi-mini-lbl{color:rgba(232,217,184,0.32);}
body.dark-mode .rec-stat{background:rgba(22,14,6,0.80);border-color:rgba(201,168,76,0.10);color:#E8D9B8;}
body.dark-mode .rec-stat-val{color:#E8D9B8;}
body.dark-mode .rec-stat-lbl{color:rgba(232,217,184,0.32);}
body.dark-mode .ing-card{background:rgba(22,14,6,0.88);border-color:rgba(201,168,76,0.10);color:#E8D9B8;}

body.dark-mode .ing-card.expiry-card{border-inline-start-color:rgba(190,125,25,0.50);}
body.dark-mode .sort-chip{background:rgba(22,14,6,0.65);border-color:rgba(201,168,76,0.10);color:rgba(232,217,184,0.35);}
body.dark-mode .sort-chip.active{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.28);color:#C9A84C;}
body.dark-mode .fchip{background:rgba(22,14,6,0.65);border-color:rgba(201,168,76,0.10);color:rgba(232,217,184,0.35);}
body.dark-mode .fchip.on{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.28);color:#C9A84C;}
body.dark-mode .cat-chip{background:rgba(22,14,6,0.65);border-color:rgba(201,168,76,0.10);color:rgba(232,217,184,0.35);}
body.dark-mode .cat-chip.on{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.28);color:#C9A84C;}
body.dark-mode .stat-card{background:rgba(22,14,6,0.80);border-color:rgba(201,168,76,0.10);}
body.dark-mode .suggest-card{background:linear-gradient(135deg,rgba(30,60,30,0.15),rgba(15,25,12,0.90));border-color:rgba(74,103,65,0.20);}
body.dark-mode .similar-chip{background:rgba(22,14,6,0.85);border-color:rgba(201,168,76,0.10);}
body.dark-mode .product-card{background:rgba(22,14,6,0.90);}
body.dark-mode #splash{background:#0D0A06 !important;}

/* ═══════════════════════════════════════════════════════════
   DHAWI MAISON — Quiet-Luxury Redesign Layer (Lab)
   cream studio · matte gold · burgundy silk — light mode only,
   dark mode untouched. Visual overrides only, no logic.
   ═══════════════════════════════════════════════════════════ */
:root{
  --mz-burg:#6E2B39; --mz-burg-deep:#54202B;
  --mz-gold:#B8934A; --mz-gold-deep:#8A6A1E;
  --mz-cream:#F7F1E6; --mz-card:#FFFDF8; --mz-ink:#2B1D12;
  --c-rose-arabic:#6E2B39;
}
body:not(.dark-mode){
  background:var(--mz-cream);
  background-image:
    radial-gradient(ellipse 140% 60% at 50% -10%, rgba(184,147,74,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 95% 110%, rgba(110,43,57,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 45% at 5% 65%, rgba(184,147,74,0.06) 0%, transparent 55%);
  background-attachment:fixed;
}
body:not(.dark-mode) .glass{
  background:var(--mz-card);
  border:1px solid rgba(138,106,30,0.16);
  box-shadow:0 10px 30px rgba(43,29,18,0.06),0 2px 8px rgba(43,29,18,0.04);
  backdrop-filter:none;-webkit-backdrop-filter:none;
}
body:not(.dark-mode) .glass-gold{
  background:linear-gradient(160deg,#FFFDF8,#FBF5E8);
  border:1px solid rgba(138,106,30,0.26);
  box-shadow:0 12px 34px rgba(43,29,18,0.08),0 0 24px rgba(184,147,74,0.08);
}
body:not(.dark-mode) .recipe-card{
  background:var(--mz-card);
  border:1px solid rgba(138,106,30,0.15);
  box-shadow:0 8px 26px rgba(43,29,18,0.06);
}
body:not(.dark-mode) .recipe-card.ready-card{border-color:rgba(138,106,30,0.32);}
body:not(.dark-mode) .quick-action{background:var(--mz-card);border:1px solid rgba(138,106,30,0.14);}
body:not(.dark-mode) .ing-card{background:var(--mz-card);border:1px solid rgba(138,106,30,0.13);}
body:not(.dark-mode) .stat-card,
body:not(.dark-mode) .kpi-mini,
body:not(.dark-mode) .rec-stat{background:var(--mz-card);border:1px solid rgba(138,106,30,0.13);}
body:not(.dark-mode) .inp{background:#FFFEFB;border:1px solid rgba(138,106,30,0.20);}
body:not(.dark-mode) .inp:focus{border-color:rgba(110,43,57,0.45);background:#FFFEFB;box-shadow:0 0 0 4px rgba(110,43,57,0.05);}
body:not(.dark-mode) .bottom-nav{
  background:rgba(250,246,238,0.96);
  border:1px solid rgba(138,106,30,0.20);
  box-shadow:0 24px 64px rgba(43,29,18,0.14),inset 0 1px 0 rgba(255,255,255,0.7);
}
body:not(.dark-mode) .modal-sheet{background:#FBF7EE;}
body:not(.dark-mode) .product-card{background:var(--mz-card);border:1px solid rgba(138,106,30,0.15);}
body:not(.dark-mode) .similar-chip{background:var(--mz-card);border:1px solid rgba(138,106,30,0.13);}
body:not(.dark-mode) #splash{background:var(--mz-cream);}
/* buttons & accents — all modes */
.btn-gold{
  background:linear-gradient(135deg,#C2A055,#8A6A1E);
  color:#FFFDF8;
  box-shadow:0 4px 16px rgba(138,106,30,0.26),inset 0 1px 0 rgba(255,255,255,0.22);
}
.btn-danger{border-color:rgba(110,43,57,0.34);color:var(--mz-burg);}
.btn-danger:active{background:rgba(110,43,57,0.08);}
.nav-btn.active{color:var(--mz-gold-deep);}
.rev-hero{background:linear-gradient(135deg,#241109 0%,#2C1A0E 55%,#3A1620 100%);}
.rev-hero::before{background:linear-gradient(90deg,transparent,rgba(184,147,74,0.60),rgba(110,43,57,0.45),transparent);}

function lsGet(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
function applyPendingPurchases(inv){
  if(lsGet("dw_pp_ver","")===PENDING_PURCHASES_VERSION)return inv;
  const map=new Map(inv.map(i=>[i.id,{...i}]));
  PENDING_PURCHASES.forEach(p=>{
    if(map.has(p.id)){
      const i=map.get(p.id);
      const nQty=i.qty+p.qty;const nPrice=i.price+p.cost;
      map.set(p.id,{...i,qty:nQty,price:nPrice,stock:i.stock+p.qty,unitCost:nQty>0?nPrice/nQty:0});
    } else if(p.newItem){
      map.set(p.id,{id:p.id,...p.newItem,price:p.cost,qty:p.qty,stock:p.qty,ship:0,unitCost:p.qty>0?p.cost/p.qty:0});
    }
  });
  lsSet("dw_pp_ver",PENDING_PURCHASES_VERSION);
  return [...map.values()];
}

// ─── aging: parse stability ("7 أيام"→7, "24 ساعة"→1) ───────────
function agingDaysOf(stability){
  if(!stability)return 0;
  const n=parseInt(stability,10)||0;
  if(stability.includes("ساعة")||stability.includes("ساعات"))return Math.max(1,Math.ceil(n/24));
  return n;
}
function daysLeft(readyDate){
  if(!readyDate)return 0;
  return Math.ceil((new Date(readyDate)-new Date())/86400000);
}
function hasActiveBatch(prodLog,recipeId){
  return prodLog.some(e=>e.recipeId===recipeId&&!e.sold&&e.readyDate);
}

            {/* ── Backup Reminder ── */}

                  <button onClick={()=>{goTab("inventory");setShowShopList(true);}} style={{background:"none",border:"none",color:"#A05050",fontSize:"0.63rem",cursor:"pointer",fontWeight:700}}>تسوق ←</button>
                </div>
                {lowStockItems.slice(0,3).map(i=><div key={i.id} style={{fontSize:"0.68rem",color:"#7A4040",padding:"2px 0",display:"flex",justifyContent:"space-between"}}>

                  <span style={{fontFamily:"'IBM Plex Mono',monospace",color:"#C86060"}}>{i.stock}{i.unit}</span>
                </div>)}
              </div>}
              {totalExpiryAlerts>0&&<div style={{background:"rgba(160,100,10,0.05)",border:"1px solid rgba(200,140,20,0.28)",borderRadius:"16px",padding:"12px 13px"}}>

            {/* ── Suggested Recipe ── */}
            {suggestedRecipe&&<div style={{background:"linear-gradient(135deg,rgba(74,103,65,0.10),rgba(74,103,65,0.04))",border:"1.5px solid rgba(74,103,65,0.22)",borderRadius:"20px",padding:"16px 18px",marginBottom:"12px",position:"relative",overflow:"hidden"}}>

                  </div>
                ))}
              </div>;
            })()}

            {/* ── Top Recipes ── */}
            {topByProfit&&topByProfit.length>0&&<div className="glass" style={{marginBottom:"12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                <div className="section-hdr-bar"/>
                <h3 style={{color:"#D4AF37",fontSize:"0.85rem",fontWeight:700}}>الأعلى ربحاً</h3>
              </div>
              {topByProfit.map((p,i)=>(
                <div key={p.name} style={{display:"flex",alignItems:"center",gap:"10px",padding:"7px 0",borderBottom:i<topByProfit.length-1?"1px solid rgba(26,18,8,0.06)":"none"}}>

                    "linear-gradient(135deg,#C9A84C,#8A6A1E)",
                    "linear-gradient(135deg,rgba(200,168,76,0.55),rgba(138,106,30,0.55))",
                    "linear-gradient(135deg,rgba(200,168,76,0.28),rgba(138,106,30,0.28))"
                  ][i],display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.62rem",fontWeight:800,color:"#07050E",flexShrink:0}}>{i+1}</div>
                  <span style={{fontSize:"0.80rem",flex:1,color:"#1A1208"}}>{p.icon} {p.name}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.75rem",color:"#6AAA48",fontWeight:600}}>+{p.profit.toFixed(0)}<span style={{fontSize:"0.54rem",opacity:0.6}}> ر</span></span>
                </div>
              ))}
            </div>}
            {/* ── Data Backup ── */}
            <div className="glass" style={{marginBottom:"12px"}}>
              <div className="section-hdr"><div className="section-hdr-bar"/><span style={{fontWeight:700,fontSize:"0.82rem",color:"#1A1208"}}>نسخ احتياطية</span></div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                <button className="btn-ghost" style={{fontSize:"0.75rem"}} onClick={()=>{
                  const data={recipes:lsGet('dw_recipes',[]),prodlog:lsGet('dw_prodlog',[]),inv:lsGet('dw_inv',[]),customers:lsGet('dw_customers',[]),orders:lsGet('dw_orders',[]),exportDate:new Date().toISOString()};
                  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
                  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dhawi-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
                  show('✅ تم تصدير البيانات بنجاح');
                }}>⬇ تصدير النسخة الاحتياطية</button>
                <label className="btn-ghost" style={{fontSize:"0.75rem",cursor:"pointer"}}>
                  ⬆ استيراد نسخة احتياطية
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                    const file=e.target.files[0];if(!file)return;
                    const reader=new FileReader();
                    reader.onload=ev=>{try{
                      const d=JSON.parse(ev.target.result);
                      if(window.confirm('سيتم استبدال جميع البيانات الحالية. هل أنت متأكد؟')){
                        if(d.recipes)lsSet('dw_recipes',d.recipes);
                        if(d.prodlog)lsSet('dw_prodlog',d.prodlog);
                        if(d.inv)lsSet('dw_inv',d.inv);
                        if(d.customers)lsSet('dw_customers',d.customers);
                        if(d.orders)lsSet('dw_orders',d.orders);
                        show('✅ تم استيراد البيانات بنجاح');
                        setTimeout(()=>window.location.reload(),1200);
                      }
                    }catch{show('❌ ملف غير صالح',true);}};
                    reader.readAsText(file);
                    e.target.value='';
                  }}/>
                </label>
              </div>
            </div>
            {/* ── roadmap card ── */}
            <div onClick={()=>setShowRoadmap(true)} style={{marginTop:"10px",background:"linear-gradient(135deg,rgba(201,168,76,0.06),rgba(120,70,200,0.06))",border:"1px solid rgba(201,168,76,0.18)",borderRadius:"16px",padding:"14px 16px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:"linear-gradient(90deg,transparent,rgba(201,168,76,0.4),rgba(120,70,200,0.3),transparent)"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:"0.78rem",fontWeight:"800",color:"#E8C870",marginBottom:"3px"}}>🚀 متجر إلكتروني — خارطة الطريق</div>

                </div>
              </div>
              <div style={{marginTop:"10px",display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {[{lbl:"كتالوج",done:true},{lbl:"سلة + فاتورة",done:true},{lbl:"دفع",done:false},{lbl:"شحن",done:false},{lbl:"إشعارات",done:false}].map(({lbl,done})=>(
                  <span key={lbl} style={{fontSize:"0.58rem",padding:"2px 8px",borderRadius:"10px",background:done?"rgba(80,160,80,0.15)":"rgba(26,18,8,0.08)",border:`1px solid ${done?"rgba(80,160,80,0.35)":"rgba(26,18,8,0.08)"}`,color:done?"#80d080":"rgba(26,18,8,0.30)"}}>
                    {done?"✓ ":""}{lbl}
                  </span>
                ))}
              </div>
            </div>
          </div>;
        })()}

        {/* ══════════════ INVENTORY ══════════════ */}
        {tab==="inventory"&&!showAddIng&&<div className="fade">
          <div className="glass" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px",background:"rgba(255,255,255,0.92)"}}>
            <div>
              <div style={{fontSize:"0.44rem",color:"rgba(138,106,30,0.45)",letterSpacing:"0.55em",textTransform:"uppercase",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",marginBottom:"4px"}}>INVENTORY VALUE</div>
              <div className="p-num" style={{marginTop:"2px"}}>{totalInvValue.toFixed(0)} <span style={{fontSize:"0.75rem",opacity:0.55,fontFamily:"'Alexandria',sans-serif"}}>ريال</span></div>
              <div style={{fontSize:"0.60rem",color:"rgba(90,148,80,0.65)",marginTop:"3px",fontFamily:"'IBM Plex Mono',monospace"}}>{inv.filter(i=>i.stock>0).length} خامة متوفرة</div>
            </div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap",justifyContent:"flex-end"}}>
              <button className="btn-ghost" onClick={()=>setShowPurchaseForm(true)} style={{fontSize:"0.75rem"}}>📦 شراء</button>
              <button className="btn-ghost" onClick={()=>setShowAddIng(true)} style={{fontSize:"0.75rem",borderColor:"rgba(104,176,104,0.35)",color:"#68B068"}}>+ خامة</button>
            </div>
          </div>
          <div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}>
            <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowShopList(true)}>🛒 قائمة التسوق{(lowStockItems.length+shopCart.length)>0?` (${lowStockItems.length+shopCart.length})`:""}</button>
            <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowSupplierCmp(true)}>📊 مقارنة الموردين</button>
            <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowExpiryCalendar(true)}>📅 الصلاحية{totalExpiryAlerts>0?` (${totalExpiryAlerts})`:""}</button>
            <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowDilution(true)}>⚗️ تخفيف</button>
          </div>
          <input className="inp" placeholder="🔍 ابحث..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:"10px"}}/>
          <div style={{display:"flex",gap:"5px",overflowX:"auto",marginBottom:"6px",paddingBottom:"4px",scrollbarWidth:"none"}}>
            {CATS.map(c=>(<button key={c} className={`cat-chip${catFilter===c?" on":""}`} onClick={()=>setCatFilter(c)}>{c}</button>))}
          </div>
          <div style={{display:"flex",gap:"5px",overflowX:"auto",marginBottom:"12px",paddingBottom:"4px",alignItems:"center",scrollbarWidth:"none"}}>
            <span style={{fontSize:"0.55rem",color:"rgba(138,106,30,0.50)",whiteSpace:"nowrap",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"0.2em",textTransform:"uppercase"}}>ترتيب</span>
            {[["default","الافتراضي"],["stock_asc","⬆ مخزون"],["stock_desc","⬇ مخزون"],["brand","المورّد"],["name","الاسم"]].map(([val,lbl])=>(
              <button key={val} className={`sort-chip${invSort===val?" active":""}`} onClick={()=>setInvSort(val)}>{lbl}</button>
            ))}
          </div>
          {fInv.map(ing=>{
            const isLow=ing.stock<ing.qty*LOW_STOCK_THRESHOLD&&ing.qty>0;
            const expSt=expiryStatus(ing.expiry);
            const pct=Math.min(100,(ing.stock/Math.max(ing.qty,1))*100);
            const ringColor=pct>50?"#5AA840":pct>20?"#C9A84C":"#C04040";
            const r2=14,circ=2*Math.PI*r2;
            const cardClass=`ing-card${isLow?" low-card":expSt?" expiry-card":""}`;
            return(
            <div key={ing.id} className={cardClass}>
              <div style={{display:"flex",alignItems:"center",gap:"11px",marginBottom:"9px"}}>
                {/* SVG ring */}
                <div style={{flexShrink:0,cursor:"pointer"}} onClick={()=>setEditCostId(editCostId===ing.id?null:ing.id)}>
                  <svg width="38" height="38" viewBox="0 0 38 38">
                    <circle cx="19" cy="19" r={r2} fill="none" stroke="rgba(26,18,8,0.08)" strokeWidth="3.5"/>
                    <circle cx="19" cy="19" r={r2} fill="none" stroke={ringColor} strokeWidth="3.5"
                      strokeDasharray={`${pct/100*circ} ${circ}`}
                      strokeLinecap="round"
                      style={{transform:"rotate(-90deg)",transformOrigin:"19px 19px",transition:"stroke-dasharray 0.5s ease"}}/>
                    <text x="19" y="23" textAnchor="middle" fill={ringColor} fontSize="7.5" fontFamily="'IBM Plex Mono',monospace" fontWeight="700">{Math.round(pct)}%</text>
                  </svg>
                </div>
                {/* name + meta */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.87rem",fontWeight:"700",color:"#1A1208",lineHeight:"1.25",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {ing.name}
                    {isLow&&<span style={{marginInlineStart:"6px",fontSize:"0.58rem",color:"#C06868",fontWeight:"700",background:"rgba(185,45,45,0.12)",border:"1px solid rgba(185,45,45,0.25)",borderRadius:"8px",padding:"1px 5px"}}>ينفد</span>}
                    {expSt==="expired"&&<span style={{marginInlineStart:"5px",fontSize:"0.58rem",color:"#C06868",background:"rgba(185,45,45,0.12)",border:"1px solid rgba(185,45,45,0.25)",borderRadius:"8px",padding:"1px 5px"}}>منتهي</span>}
                    {expSt==="soon"&&<span style={{marginInlineStart:"5px",fontSize:"0.58rem",color:"#C08840",background:"rgba(190,125,25,0.12)",border:"1px solid rgba(190,125,25,0.25)",borderRadius:"8px",padding:"1px 5px"}}>قارب الانتهاء</span>}
                  </div>
                  <div style={{display:"flex",gap:"5px",marginTop:"3px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"0.60rem",color:"rgba(201,168,76,0.45)",background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.12)",borderRadius:"8px",padding:"1px 6px"}}>{ing.brand}</span>
                    <span style={{fontSize:"0.60rem",color:"rgba(26,18,8,0.25)",background:"rgba(26,18,8,0.08)",border:"1px solid rgba(26,18,8,0.08)",borderRadius:"8px",padding:"1px 6px"}}>{ing.cat}</span>
                  </div>
                </div>

    </div>

              <div key={m.key} style={{marginBottom:"14px",padding:"10px 12px",borderRadius:"11px",background:isTop?"rgba(201,168,76,0.06)":"rgba(26,18,8,0.08)",border:`1px solid ${isTop?"rgba(201,168,76,0.18)":"rgba(26,18,8,0.08)"}`}}>

                  <span style={{color:"#1A1208",fontWeight:"700",fontSize:"0.8rem"}}>{m.label}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.68rem",color:"#8A6830",letterSpacing:"-0.01em"}}>{m.count} دفعة</span>
                </div>
                <div style={{height:"7px",background:"rgba(26,18,8,0.85)",borderRadius:"4px",overflow:"hidden",marginBottom:"6px",position:"relative"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:m.profit>=0?"linear-gradient(90deg,#4A7A30,#6AAA48,#C9A84C)":"linear-gradient(90deg,#8A2020,#C04040)",borderRadius:"4px",transition:"width 0.5s cubic-bezier(0.22,1,0.36,1)",boxShadow:m.profit>=0?"0 0 6px rgba(106,170,72,0.35)":"0 0 6px rgba(192,64,64,0.35)"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.69rem"}}>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",color:"#8AB878",letterSpacing:"-0.02em"}}>{m.revenue.toFixed(0)} <span style={{fontFamily:"'Alexandria',sans-serif",fontSize:"0.6rem",opacity:0.7}}>إيراد</span></span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",color:m.profit>=0?"#6AAA48":"#E07070",fontWeight:"600",letterSpacing:"-0.02em"}}>{m.profit>=0?"+":""}{m.profit.toFixed(0)} <span style={{fontFamily:"'Alexandria',sans-serif",fontSize:"0.6rem",opacity:0.7}}>ربح</span></span>
                </div>
              </div>
            );})}
          </div>}

          {/* ── donut chart — recipe distribution ── */}
          {perfStats.length>0&&(()=>{
            const colors=["#C9A84C","#6AAA48","#90B8F0","#E07070","#B080D0","#E0A060","#60C0C0"];
            const total=perfStats.reduce((s,p)=>s+p.count,0);
            const r=52,cx=70,cy=70,strokeW=18;
            let offset=0;
            const arcs=perfStats.slice(0,6).map((p,i)=>{
              const pct=p.count/total;
              const dash=pct*2*Math.PI*r;
              const gap=2*Math.PI*r-dash;
              const arc={pct,dash,gap,offset,color:colors[i%colors.length],name:p.name,icon:p.icon,count:p.count};
              offset+=pct*2*Math.PI*r+1.5;
              return arc;
            });
            return <div className="glass" style={{marginBottom:"14px",padding:"16px"}}>
              <div className="section-hdr" style={{marginBottom:"12px"}}>
                <div className="section-hdr-bar"/>
                <h3 style={{color:"#D4AF37",fontSize:"0.85rem",fontWeight:"700"}}>توزيع الإنتاج</h3>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
                <svg width="140" height="140" viewBox="0 0 140 140" style={{flexShrink:0}}>
                  <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(26,18,8,0.08)" strokeWidth={strokeW}/>
                  {arcs.map((a,i)=>(
                    <circle key={i} cx={cx} cy={cy} r={r} fill="none"
                      stroke={a.color} strokeWidth={strokeW}
                      strokeDasharray={`${a.dash} ${2*Math.PI*r-a.dash}`}
                      strokeDashoffset={-a.offset}
                      strokeLinecap="round"
                      style={{transform:"rotate(-90deg)",transformOrigin:`${cx}px ${cy}px`}}/>
                  ))}
                  <text x={cx} y={cy-7} textAnchor="middle" fill="#D4AF37" fontSize="18" fontFamily="'IBM Plex Mono',monospace" fontWeight="600">{total}</text>
                  <text x={cx} y={cy+10} textAnchor="middle" fill="rgba(26,18,8,0.35)" fontSize="8" fontFamily="'Alexandria',sans-serif">دفعة</text>
                </svg>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:"5px"}}>
                  {arcs.map((a,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:a.color,flexShrink:0}}/>
                      <span style={{fontSize:"0.70rem",color:"#C8B898",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.icon} {a.name}</span>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.65rem",color:"rgba(26,18,8,0.45)"}}>{a.count}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>;
          })()}

          {/* ── best perfumes ── */}
          {perfStats.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"14px"}}>
            <div className="glass" style={{padding:"13px",background:"rgba(100,140,200,0.05)"}}>
              <div style={{fontSize:"0.60rem",color:"#8A6830",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"10px",fontWeight:"700"}}>الأكثر مبيعاً</div>
              {topBySales.map((p,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<topBySales.length-1?"1px solid rgba(26,18,8,0.08)":"none"}}>
                  <span style={{fontSize:"0.73rem",color:"#C8B898"}}>{p.icon} {p.name}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.68rem",color:"#90B8F0",fontWeight:"600",letterSpacing:"-0.02em"}}>{p.count}</span>
                </div>
              ))}
            </div>
            <div className="glass" style={{padding:"13px",background:"rgba(70,140,60,0.05)"}}>
              <div style={{fontSize:"0.60rem",color:"#8A6830",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"10px",fontWeight:"700"}}>الأعلى ربحاً</div>
              {topByProfit.map((p,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<topByProfit.length-1?"1px solid rgba(26,18,8,0.08)":"none"}}>
                  <span style={{fontSize:"0.73rem",color:"#C8B898"}}>{p.icon} {p.name}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.68rem",color:"#6AAA48",fontWeight:"600",letterSpacing:"-0.02em"}}>{p.profit.toFixed(0)}</span>
                </div>
              ))}
            </div>
          </div>}

          {lowStockItems.length>0&&<div className="glass" style={{borderInlineStart:"3px solid rgba(192,64,64,0.70)",marginBottom:"14px",background:"rgba(180,40,40,0.04)"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
              <div style={{width:"3px",height:"18px",background:"linear-gradient(180deg,#E07070,#A03030)",borderRadius:"2px",flexShrink:0}}/>
              <h3 style={{color:"#E08080",fontSize:"0.85rem",fontWeight:"700"}}>مخزون يحتاج تجديد</h3>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.65rem",color:"#9A4040",marginInlineStart:"auto"}}>{lowStockItems.length}</span>
            </div>
            {lowStockItems.map(i=>(
              <div key={i.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(26,18,8,0.08)",alignItems:"center"}}>
                <span style={{fontSize:"0.78rem",color:"#1A1208"}}>{i.name}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.70rem",color:"#E07070",letterSpacing:"-0.02em"}}>{i.stock}<span style={{opacity:0.5,fontSize:"0.60rem"}}> / {i.qty} {i.unit}</span></span>
              </div>
            ))}
          </div>}

          {/* production log */}
          {/* ── aging queue ── */}
          {(()=>{const aging=prodLog.filter(e=>!e.sold&&e.readyDate&&daysLeft(e.readyDate)>0).sort((a,b)=>daysLeft(a.readyDate)-daysLeft(b.readyDate));if(!aging.length)return null;return(
            <div className="glass" style={{marginBottom:"14px"}}>
              <h3 style={{color:"#e0a060",fontSize:"0.88rem",fontWeight:"700",marginBottom:"10px"}}>⏳ قيد التعتيق ({aging.length})</h3>
              {aging.map(e=>{const dl=daysLeft(e.readyDate);const pct=Math.max(0,Math.min(100,100-(dl/e.agingDays*100)));return(
                <div key={e.id} style={{marginBottom:"10px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.75rem",marginBottom:"3px"}}>
                    <span style={{fontWeight:"700"}}>{e.recipeIcon} {e.recipeName}</span>
                    <span style={{color:"#e0a060",fontWeight:"700"}}>{dl} يوم متبقي</span>
                  </div>
                  <div style={{height:"8px",background:"rgba(26,18,8,0.08)",borderRadius:"4px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#c08020,#D4AF37)",borderRadius:"4px",transition:"width .4s"}}/>
                  </div>
                  <div style={{fontSize:"0.62rem",color:"#8A6A1E",marginTop:"2px"}}>#{e.batchNo} • {e.batch} • جاهز {fmtDate(e.readyDate)}</div>
                </div>
              );})}
            </div>
          );})()}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700"}}>🏭 سجل الإنتاج</h3>
          </div>
          {prodLog.length===0&&<div style={{textAlign:"center",color:"#5a3a10",padding:"30px",fontSize:"0.8rem"}}>لا يوجد إنتاج بعد</div>}
          {prodLog.map(e=>{
            const dl=e.readyDate?daysLeft(e.readyDate):0;const ready=dl<=0;
            const cust=e.customerId?customers.find(c=>c.id===e.customerId):null;
            return(
            <div key={e.id} className="glass" style={{padding:"11px 13px",marginBottom:"7px",borderInlineStart:`3px solid ${e.sold?"rgba(90,154,32,0.65)":ready?"rgba(212,175,55,0.70)":"rgba(192,128,32,0.60)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}}>
                <div>
                  <span style={{fontSize:"0.85rem",fontWeight:"700"}}>{e.recipeIcon} {e.recipeName}</span>
                  <div style={{fontSize:"0.66rem",color:"#8A6A1E"}}>{e.batchNo&&<span style={{color:"#D4AF37",fontWeight:"700"}}>#{e.batchNo} • </span>}{fmtDate(e.date)} • {e.batch} ({e.vol} مل)</div>
                  {e.note&&<div style={{fontSize:"0.65rem",color:"#80a0e0",marginTop:"2px"}}>📝 {e.note}</div>}
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:"0.78rem",color:"#D4AF37",fontWeight:"700"}}>تكلفة: {e.cost} ر</div>
                  {e.sold&&e.sellPrice&&<div style={{fontSize:"0.68rem",color:"#80c080"}}>بيع: {e.sellPrice} ر</div>}
                </div>
              </div>
              <div style={{display:"flex",gap:"5px",flexWrap:"wrap",alignItems:"center",marginBottom:"5px"}}>
                {e.readyDate&&(ready?<span className="tag tag-green">✅ جاهز للبيع</span>:<span className="tag" style={{background:"rgba(192,128,32,0.15)",color:"#e0a060",border:"1px solid rgba(192,128,32,0.35)"}}>⏳ تعتيق — متبقي {dl} يوم</span>)}
                {cust&&<span className="tag tag-blue">👤 {cust.name}</span>}
              </div>
              {!e.sold&&<SellEntry id={e.id} onSell={markSold}/>}
              {e.sold&&<span className="tag tag-green">✅ مباع</span>}
              <button onClick={()=>{const custName=e.customerId?customers.find(c=>c.id===e.customerId)?.name:"";const w=window.open('','_blank','width=400,height=320');w.document.write(`<html dir="rtl"><body style="font-family:Arial;margin:0;padding:16px;background:#1a0800;color:#D4AF37;border:2px solid #D4AF37;border-radius:12px;width:340px;box-sizing:border-box;"><div style="text-align:center;font-size:11px;letter-spacing:2px;color:#c8a46a;margin-bottom:4px">ضاوي دهن العود</div><div style="text-align:center;font-size:22px;margin:4px 0">${e.recipeIcon}</div><div style="text-align:center;font-size:16px;font-weight:700;margin-bottom:8px">${e.recipeName}</div><hr style="border-color:#D4AF37;opacity:0.3"/>${custName?`<div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">العميل</span><span style="color:#80c0ff;font-weight:700">${custName}</span></div>`:""}<div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">رقم الدفعة</span><span>${e.batchNo}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">الحجم</span><span>${e.vol} مل</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">تاريخ الصنع</span><span>${fmtDate(e.date)}</span></div>${e.readyDate?`<div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">جاهز في</span><span style="color:#80c080">${fmtDate(e.readyDate)}</span></div>`:""}${e.sold&&e.sellPrice?`<div style="display:flex;justify-content:space-between;font-size:13px;margin:6px 0;padding-top:6px;border-top:1px solid rgba(214,175,55,0.3)"><span style="color:#c8a46a">سعر البيع</span><span style="color:#80c080;font-weight:700">${e.sellPrice} ريال</span></div>`:""}${e.note?`<div style="font-size:11px;color:#80a0e0;margin-top:6px;border-top:1px solid rgba(214,175,55,0.2);padding-top:6px">${e.note}</div>`:""}</body></html>`);w.document.close();w.print();}} style={{marginTop:"5px",background:"rgba(214,175,55,0.08)",border:"1px solid rgba(214,175,55,0.3)",color:"#D4AF37",borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"0.68rem",fontWeight:"600"}}>🏷️ طباعة ملصق</button>
              {!e.customerId&&customers.length>0&&<select value="" onChange={ev=>{if(ev.target.value)linkOrderToCustomer(e.id,ev.target.value);}} style={{marginTop:"6px",background:"rgba(26,18,8,0.85)",border:"1px solid rgba(214,175,55,0.3)",borderRadius:"8px",color:"#8A6A1E",fontSize:"0.72rem",padding:"4px 8px",fontFamily:"'Alexandria',sans-serif",width:"100%"}}><option value="">🔗 اربط بعميل...</option>{customers.map(c=><option key={c.id} value={c.id} style={{background:"#FAF8F3"}}>{c.name}</option>)}</select>}
              {!e.sold&&<button onClick={()=>deleteProdEntry(e.id)} style={{marginTop:"5px",background:"rgba(200,60,60,0.1)",border:"1px solid rgba(200,60,60,0.3)",color:"#e08080",borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"0.68rem",fontWeight:"600"}}>🗑️ حذف الدفعة</button>}
            </div>
          );})}

          {/* purchase log */}
          {purchases.length>0&&<>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"8px",marginTop:"4px"}}>📦 سجل المشتريات</h3>
            {purchases.map(p=>(
              <div key={p.id} className="glass" style={{padding:"10px 13px",marginBottom:"6px"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:"0.82rem",fontWeight:"700"}}>{p.ingName}</div>
                    <div style={{fontSize:"0.65rem",color:"#8A6A1E"}}>{p.brand} • {fmtDate(p.date)}</div>
                    {p.note&&<div style={{fontSize:"0.65rem",color:"#7a5a30",marginTop:"2px"}}>{p.note}</div>}
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.82rem"}}>{p.qty} {p.unit}</div>
                    <div style={{fontSize:"0.7rem",color:"#80c080"}}>{p.price} ريال</div>
                  </div>
                </div>
              </div>
            ))}
          </>}
        </div>}

        {/* ══════════════ CUSTOMERS ══════════════ */}
        {tab==="customers"&&!selectedCustomer&&!showAddCust&&<div className="fade">
          {birthdayAlerts.length>0&&<div className="alert-pulse glass" style={{background:"rgba(201,168,76,0.08)",borderColor:"rgba(201,168,76,0.40)",padding:"11px 16px",marginBottom:"14px",fontSize:"0.78rem",color:"#E8C460",lineHeight:"1.7"}}>🎂 <b style={{fontWeight:"800"}}>عيد ميلاد هذا الأسبوع:</b> {birthdayAlerts.map(c=>c.name).join(" · ")}</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
            <div>
              <h2 style={{color:"#D4AF37",fontSize:"1.05rem",fontWeight:"800",letterSpacing:"-0.01em"}}>العملاء</h2>
              {customers.length>0&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.62rem",color:"#8A6830",letterSpacing:"-0.01em"}}>{customers.length} عميل</span>}
            </div>
            <button className="btn-ghost" onClick={()=>setShowAddCust(true)} style={{fontSize:"0.75rem",borderRadius:"22px",padding:"8px 16px"}}>+ عميل جديد</button>
          </div>
          {customers.length===0&&<div className="glass" style={{textAlign:"center",padding:"28px 20px",background:"rgba(201,168,76,0.03)",border:"1px dashed rgba(201,168,76,0.22)"}}>
            <div style={{fontSize:"2.8rem",marginBottom:"12px",filter:"drop-shadow(0 2px 10px rgba(201,168,76,0.18))"}}>👥</div>
            <div style={{color:"#D4AF37",fontWeight:"800",fontSize:"0.95rem",marginBottom:"12px"}}>سجّل أول عميل</div>
            <div style={{display:"grid",gap:"7px",marginBottom:"18px",textAlign:"right"}}>
              {["أضف العميل باسمه ورقمه","اربط مشتريات الدفعات بالعميل","تتبّع إجمالي مشترياته وتفضيلاته"].map((s,i)=>(
                <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",fontSize:"0.78rem",color:"#C8B898",lineHeight:"1.7"}}>
                  <span style={{minWidth:"20px",height:"20px",borderRadius:"50%",background:"rgba(201,168,76,0.15)",color:"#D4AF37",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.65rem",fontWeight:"700",flexShrink:0}}>{i+1}</span>
                  <span>{s}</span>
                </div>
              ))}
            </div>
            <button className="btn-gold" onClick={()=>setShowAddCust(true)}>+ أضف أول عميل</button>
          </div>}
          {customers.map(c=>{
            const orders=prodLog.filter(e=>e.customerId===c.id);
            const spent=orders.filter(o=>o.sold&&o.sellPrice).reduce((s,o)=>s+o.sellPrice,0);
            const isVip=orders.length>2||spent>500;
            const initials=c.name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("");
            return(
            <div key={c.id} className="glass" style={{padding:"14px",marginBottom:"8px",borderColor:isVip?"rgba(201,168,76,0.25)":"rgba(26,18,8,0.10)",boxShadow:isVip?"0 0 0 0.5px rgba(201,168,76,0.08),0 6px 24px rgba(0,0,0,0.08)":"0 4px 16px rgba(0,0,0,0.07)"}}>
              <div style={{display:"flex",alignItems:"center",gap:"11px",cursor:"pointer",marginBottom:"10px"}} onClick={()=>setSelectedCustomer(c)}>
                {/* avatar */}
                <div className="cust-avatar">{initials}</div>
                {/* info */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"2px"}}>
                    <span style={{fontSize:"0.92rem",fontWeight:"800",color:"#1A1208"}}>{c.name}</span>
                    {isVip&&<span style={{fontSize:"0.55rem",background:"rgba(201,168,76,0.12)",color:"#D4AF37",border:"1px solid rgba(201,168,76,0.25)",borderRadius:"20px",padding:"1px 7px",letterSpacing:"0.3px",fontWeight:"700"}}>VIP</span>}
                  </div>
                  {c.phone&&<div style={{fontSize:"0.65rem",color:"rgba(201,168,76,0.45)",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"-0.01em"}}>{c.phone}</div>}
                  {c.notes&&<div style={{fontSize:"0.62rem",color:"rgba(26,18,8,0.22)",marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.notes}</div>}
                </div>
                {/* stats */}
                <div style={{textAlign:"left",flexShrink:0}}>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.80rem",color:spent>0?"#6AAA48":"rgba(26,18,8,0.20)",fontWeight:"600",letterSpacing:"-0.02em"}}>{spent>0?`${spent.toFixed(0)} ر`:"—"}</div>
                  <div style={{fontSize:"0.58rem",color:"rgba(26,18,8,0.28)",marginTop:"2px",textAlign:"left"}}>{orders.length} طلب</div>
                </div>
              </div>
              <div style={{display:"flex",gap:"6px"}}>
                {c.phone&&<a href={`https://wa.me/${c.phone.replace(/^0/,"966").replace(/[^0-9]/g,"")}`} target="_blank" onClick={e=>e.stopPropagation()} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"5px",background:"rgba(37,211,102,0.08)",border:"1px solid rgba(37,211,102,0.28)",color:"#25d366",borderRadius:"12px",padding:"7px",fontSize:"0.72rem",fontWeight:"700",textDecoration:"none",fontFamily:"'Alexandria',sans-serif"}}>💬 واتساب</a>}
                <button onClick={e=>{e.stopPropagation();setSelectedCustomer(c);}} style={{flex:1,background:"rgba(201,168,76,0.07)",border:"1px solid rgba(201,168,76,0.22)",color:"#C9A84C",borderRadius:"12px",padding:"7px",cursor:"pointer",fontSize:"0.72rem",fontWeight:"700"}}>📋 الملف</button>
                <button onClick={e=>{e.stopPropagation();deleteCustomer(c.id);}} style={{background:"rgba(200,60,60,0.06)",border:"1px solid rgba(200,60,60,0.20)",color:"#C07070",borderRadius:"12px",padding:"7px 12px",cursor:"pointer",fontSize:"0.72rem"}}>🗑️</button>
              </div>
            </div>
          );})}
        </div>}

        {/* ── add customer ── */}

function encodePerfume(obj){try{return encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(obj)))));}catch(e){return "";}}
function decodePerfume(s){try{return JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(s)))));}catch(e){return null;}}
function buildPerfumePayload(recipe,getIng){
  const top=[],mid=[],base=[];
  (recipe.ing||[]).forEach(([id])=>{const ing=getIng?getIng(id):null;const nm=ing?.name||id;const t=noteTier(id);(t==="top"?top:t==="mid"?mid:base).push(nm);});
  return {n:recipe.name,i:recipe.icon,d:recipe.desc,s:recipe.season,g:recipe.gender,st:recipe.stability,top,mid,base};
}
function buildShareLink(recipe,getIng){
  return location.origin+location.pathname+"#p="+encodePerfume(buildPerfumePayload(recipe,getIng));
}

function QRModal({recipe,getIng,onClose}){
  const ref=useRef();
  const [fallback,setFallback]=useState(false);
  const [copied,setCopied]=useState(false);
  const shareLink=buildShareLink(recipe,getIng);
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    if(!window.QRCode){setFallback(true);return;}
    // QR encodes the public customer link (clean view, no prices).
    try{
      new window.QRCode(ref.current,{text:shareLink,width:210,height:210,colorDark:"#1a0800",colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.L});
    }catch(e){
      setFallback(true);
    }
  },[recipe]);
  const copyLink=()=>{
    if(navigator.clipboard)navigator.clipboard.writeText(shareLink).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});
  };
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")onClose();}}>
      <div className="modal-sheet" style={{textAlign:"center"}}>
        <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"6px"}}>📲 مشاركة العطر مع العميل</h3>

        {!fallback&&<div ref={ref} style={{display:"inline-block",padding:"12px",background:"#fff",borderRadius:"14px"}}/>}

}

<script>
// ══ LAB AMBIENT PARTICLES ══
(function(){
  const cv=document.getElementById('lab-canvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  let W,H,pts=[];
  const COLS=['rgba(180,130,30,','rgba(200,80,120,','rgba(120,80,180,','rgba(160,110,20,'];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize,{passive:true});
  for(let i=0;i<40;i++){
    pts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*0.14,vy:(Math.random()-0.5)*0.18,
      r:Math.random()*1.4+0.3,
      o:Math.random()*0.28+0.06,
      c:COLS[i%COLS.length],
      f:Math.random()*Math.PI*2,
      s:Math.random()*0.012+0.006
    });
  }
  let raf,last=0;
  function draw(ts){
    const dt=Math.min(ts-last,50);last=ts;
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.f+=p.s;
      if(p.x<-4)p.x=W+4;if(p.x>W+4)p.x=-4;
      if(p.y<-4)p.y=H+4;if(p.y>H+4)p.y=-4;
      const a=(p.o*(0.6+0.4*Math.sin(p.f))).toFixed(3);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c+a+')';ctx.fill();
    });
    raf=requestAnimationFrame(draw);
  }
  document.addEventListener('visibilitychange',()=>document.hidden?cancelAnimationFrame(raf):(raf=requestAnimationFrame(draw)));
  raf=requestAnimationFrame(draw);
})();

// ══ CARD ENTRANCE OBSERVER ══
(function(){
  if(!window.IntersectionObserver)return;
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting&&!e.target.classList.contains('lux-card-in')){
        e.target.classList.add('lux-card-in');
        io.unobserve(e.target);
      }
    });
  },{threshold:0.08,rootMargin:'0px 0px -20px 0px'});

  function scan(){
    document.querySelectorAll('.glass:not(.lux-card-in),.glass-gold:not(.lux-card-in)').forEach((el,i)=>{
      el.style.animationDelay=(i%6*0.06)+'s';
      io.observe(el);
    });
  }
  // Initial scan after React mounts
  setTimeout(scan,600);
  // Re-scan when DOM changes (tab switches, recipe loads)
  const root=document.getElementById('root');
  if(root)new MutationObserver(()=>setTimeout(scan,100)).observe(root,{childList:true,subtree:true});
})();
</script>
