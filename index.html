*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{

  background-attachment: fixed;
  font-family: 'Alexandria', sans-serif;
  color: #fff8f0;
  overflow-x: hidden;
}
input,select,button,textarea{font-family:'Alexandria',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:4px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.04);opacity:1;filter:drop-shadow(0 0 15px #D4AF37);}}
@keyframes smokeRise{0%{transform:translateY(100%) scale(0.8) translateX(0);opacity:0;}50%{opacity:0.4;transform:translateY(50%) scale(1.1) translateX(10px);}100%{transform:translateY(-20%) scale(1.5) translateX(-10px);opacity:0;}}

.fade{animation:fadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;}
.pulse-glow{animation:pulseGlow 3s ease-in-out infinite;}

#splash-screen {
  position: fixed;
  top:0;left:0;width:100vw;height:100vh;
  background: #120500;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease;
}
.smoke-holder {
  position: absolute;
  bottom: 0; left: 0; width: 100%; height: 50%;
  pointer-events: none; overflow: hidden;
}
.smoke-particle {
  position: absolute;
  bottom: 0; width: 90px; height: 90px;
  background: radial-gradient(circle, rgba(214,175,55,0.06) 0%, transparent 70%);
  border-radius: 50%; filter: blur(8px);
  animation: smokeRise 5s infinite linear;
}

.glass-card {
  background: rgba(255, 248, 240, 0.07);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(214, 175, 55, 0.18);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0; height: 72px;
  background: rgba(25, 8, 0, 0.9);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(214, 175, 55, 0.2);
  display: flex; justify-content: space-around; align-items: center;
  padding-bottom: 12px; z-index: 999;
}
.nav-item {
  background: none; border: none; color: #c8a46a;
  display: flex; flex-direction: column; align-items: center;
  font-size: 0.65rem; font-weight: 400; cursor: pointer;
  transition: all 0.3s ease; gap: 4px;
}
.nav-item.active {
  color: #D4AF37; transform: translateY(-2px);
  text-shadow: 0 0 10px rgba(214,175,55,0.4);
}
.nav-icon { font-size: 1.3rem; }

@media print {
  body { background: #fff !important; color: #000 !important; }
  .no-print { display: none !important; }
  .glass-card { background: none !important; border: 1px solid #000 !important; backdrop-filter: none !important; color:#000 !important;}
}
</style>

function App() {
  const [tab, setTab] = useState("inventory");
  const [ingredients, setIngredients] = useState([]);
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("الكل");
  const [productionLog, setProductionLog] = useState([]);
  const [toast, setToast] = useState("");

  // حالات فورم إضافة خامة جديدة
  const [showAddForm, setShowAddForm] = useState(false);
  const [newName, setNewName] = useState("");
  const [newBrand, setNewBrand] = useState("");
  const [newCat, setNewCat] = useState("عود");
  const [newStock, setNewStock] = useState(100);
  const [newUnit, setNewUnit] = useState("جم");

  // المعمل والمخبار الفوري
  const [labMix, setLabMix] = useState([]);
  const [labSelectedIng, setLabSelectedIng] = useState("");
  const [labAmount, setLabAmount] = useState(5);

  const triggerToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 3000);
  };

  // تحميل جرد دار الدهن الحقيقي وتخطي أي بيانات قديمة مخزنة
  useEffect(() => {
    const saved = localStorage.getItem("dahr_dehn_v3_final");
    if (saved) {
      try {
        const d = JSON.parse(saved);
        if (d.ingredients && d.ingredients.length >= MASTER_INGREDIENTS.length) {
          setIngredients(d.ingredients);
        } else {
          setIngredients(MASTER_INGREDIENTS);
        }
        if (d.productionLog) setProductionLog(d.productionLog);
      } catch (e) {
        setIngredients(MASTER_INGREDIENTS);
      }
    } else {
      setIngredients(MASTER_INGREDIENTS);
    }
  }, []);

  // الحفظ الفوري عند تعديل الحصص أو إضافة خامة جديدة
  useEffect(() => {
    if (ingredients.length > 0) {
      localStorage.setItem("dahr_dehn_v3_final", JSON.stringify({ ingredients, productionLog }));
    }
  }, [ingredients, productionLog]);

  useEffect(() => {
    if (ingredients.length > 0 && !labSelectedIng) {
      setLabSelectedIng(ingredients[0].id);
    }
  }, [ingredients]);

  const updateStockValue = (id, delta) => {
    setIngredients(prev => prev.map(item => {
      if (item.id === id) {
        return { ...item, stock: Math.max(0, item.stock + delta) };
      }
      return item;
    }));
  };

  // هندسة إضافة المادة الجديدة من الفورم
  const handleAddNewIngredient = (e) => {
    e.preventDefault();
    if (!newName.trim()) {
      triggerToast("⚠️ فضلاً أدخل اسم المادة العطرية!");
      return;
    }
    const customId = "custom_" + Date.now();
    const newItem = {
      id: customId,
      name: newName,
      brand: newBrand.trim() || "خاص",
      cat: newCat,
      stock: Number(newStock),
      unit: newUnit,
      img: "https://images.unsplash.com/photo-1616949755610-8c9bbc08f138?auto=format&fit=crop&w=150&q=80"
    };

    setIngredients(prev => [newItem, ...prev]);
    setNewName(""); setNewBrand(""); setNewStock(100);
    setShowAddForm(false);
    triggerToast(`🏺 تم تسجيل ${newName} وإضافتها للرفوف بنجاح!`);
  };

  const filteredIngs = (catFilter === "الكل" ? ingredients : ingredients.filter(i => i.cat === catFilter))
    .filter(i => i.name.toLowerCase().includes(search.toLowerCase()) || i.brand.toLowerCase().includes(search.toLowerCase()));

  const totalLabVolume = labMix.reduce((s, i) => s + i.amount, 0);
  const concentrationPct = totalLabVolume > 0 ? 100 : 0;

  const inpStyle = {
    background: "rgba(255,255,255,0.06)",
    border: "1px solid rgba(214,175,55,0.4)",
    borderRadius: "10px",
    padding: "10px 12px",
    fontSize: "0.8rem",
    color: "#fff",
    width: "100%",
    outline: "none"
  };

  return (
    <div style={{minHeight:"100vh", paddingBottom:"90px"}}>
      
      {toast && (
        <div style={{position:"fixed", bottom:"90px", left:"50%", transform:"translateX(-50%)", background:"rgba(214,175,55,0.95)", color:"#1a0800", padding:"10px 24px", borderRadius:"30px", fontSize:"0.8rem", fontWeight:"600", zIndex:99999}} className="fade">
          ✨ {toast}
        </div>
      )}

      <div className="no-print" style={{textAlign:"center", padding:"20px 10px 10px"}}>
        <h1 style={{fontSize:"1.4rem", color:"#D4AF37", fontWeight:"600"}}>دار الدهن</h1>
        <p style={{fontSize:"0.65rem", color:"#c8a46a", letterSpacing:"3px"}}>MUSHAF AL-DEHN LAB</p>
      </div>

      <div style={{padding:"0 16px", maxWidth:"460px", margin:"0 auto"}}>
        
        {/* ===== TAB: HOME ===== */}
        {tab === "home" && (
          <div className="fade" style={{paddingTop:"10px"}}>
            <div className="glass-card">
              <h3 style={{color:"#D4AF37", fontSize:"0.88rem", marginBottom:"6px"}}>📜 نظام إدارة خزانة العطور الذكي</h3>
              <p style={{fontSize:"0.72rem", color:"#e5d5be", lineHeight:"1.6"}}>
                أهلاً بك في النسخة الثالثة والنهائية من معملك التراثي. تم تصفير الكاش القديم لتثبيت جردك الواقعي الجديد بدقة عالية، وتفعيل خاصية التوسيع الذاتي للمخزون دون قيود برمجية.
              </p>
            </div>
          </div>
        )}

        {/* ===== TAB: INVENTORY (إضافة جرد وزر الإدخال الفوري) ===== */}
        {tab === "inventory" && (
          <div className="fade">
            <div style={{display:"flex", justifyValue:"space-between", justifyContent:"space-between", alignItems:"center", marginBottom:"12px"}}>
              <h2 style={{fontSize:"0.9rem", color:"#D4AF37"}}>جرد الرفوف الفعلي ({ingredients.length} مادة)</h2>
              
              {/* زر إضافة مخزون جديد */}
              <button onClick={() => setShowAddForm(!showAddForm)} style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"6px 14px", borderRadius:"20px", fontSize:"0.7rem", fontWeight:"600", cursor:"pointer", boxShadow:"0 4px 12px rgba(214,175,55,0.2)"}}>
                {showAddForm ? "✕ إغلاق" : "➕ إضافة خامة جديدة"}
              </button>
            </div>

            {/* فورم إضافة مادة جديدة الفوري */}
            {showAddForm && (
              <form onSubmit={handleAddNewIngredient} className="glass-card" style={{border:"1px solid #D4AF37", background:"rgba(30,15,5,0.9)", animation:"fadeIn 0.3s ease"}}>
                <h4 style={{fontSize:"0.8rem", color:"#D4AF37", marginBottom:"10px"}}>➕ إدخال مادة عطرية جديدة للخزانة:</h4>
                <div style={{display:"grid", gap:"8px"}}>
                  <input placeholder="اسم الزيت أو الخامة (مثال: عود سيوفي عتيق)" value={newName} onChange={e => setNewName(e.target.value)} style={inpStyle} />
                  <input placeholder="المصدر / المصنع (مثال: شرفان، IFF، جيفودان)" value={newBrand} onChange={e => setNewBrand(e.target.value)} style={inpStyle} />
                  
                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px"}}>
                    <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{...inpStyle, background:"#221105"}}>
                      <option value="عود">عود</option>
                      <option value="تراثي">تراثي / عنبر / مسك</option>
                      <option value="زهري">زهري / ورد</option>
                      <option value="صندل">صندل</option>
                      <option value="مثبت">مثبت عطور</option>
                      <option value="مضخم">مضخم فوحان</option>
                      <option value="براند">محاكاة براندات</option>
                    </select>
                    <div style={{display:"flex", gap:"4px"}}>
                      <input type="number" placeholder="الكمية" value={newStock} onChange={e => setNewStock(e.target.value)} style={{...inpStyle, textAlign:"center"}} />
                      <select value={newUnit} onChange={e => setNewUnit(e.target.value)} style={{...inpStyle, width:"65px", background:"#221105", padding:"4px"}}>
                        <option value="مل">مل</option>
                        <option value="جم">جم</option>
                        <option value="كجم">كجم</option>
                      </select>
                    </div>
                  </div>
                  
                  <button type="submit" style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"10px", borderRadius:"8px", fontSize:"0.75rem", fontWeight:"600", marginTop:"4px", cursor:"pointer"}}>
                    💾 تثبيت وحفظ في رفوف المختبر
                  </button>
                </div>
              </form>
            )}

            <input placeholder="🔍 ابحث في الرفوف الفورية..." value={search} onChange={e => setSearch(e.target.value)} style={{...inpStyle, marginBottom:"12px"}}/>

            <div style={{display:"flex", gap:"4px", overflowX:"auto", marginBottom:"12px", paddingBottom:"4px"}}>
              {["الكل","عود","تراثي","زهري","صندل","مثبت","مضخم","براند"].map(c => (
                <button key={c} onClick={() => setCatFilter(c)} style={{background: catFilter === c ? "#D4AF37" : "rgba(255,255,255,0.05)", border: "1px solid #D4AF37", color: catFilter === c ? "#1a0800" : "#D4AF37", padding:"4px 12px", borderRadius:"20px", fontSize:"0.65rem", cursor:"pointer", whiteSpace:"nowrap"}}>{c}</button>
              ))}
            </div>

            {filteredIngs.map(ing => (
              <div key={ing.id} className="glass-card" style={{padding:"10px", display:"flex", gap:"10px", alignItems:"center"}}>
                <img src={ing.img} alt={ing.name} style={{width:"44px", height:"44px", borderRadius:"10px", objectFit:"cover", border:"1px solid rgba(214,175,55,0.2)"}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.78rem", fontWeight:"600", color:"#fff"}}>{ing.name}</div>
                  <div style={{fontSize:"0.6rem", color:"#c8a46a"}}>المصنع: {ing.brand} • التصنيف: {ing.cat}</div>
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:"6px"}}>
                    <span style={{fontSize:"0.72rem", color:"#D4AF37", fontWeight:"600"}}>المتاح: {ing.stock} {ing.unit}</span>
                    <div style={{display:"flex", alignItems:"center", gap:"4px"}}>
                      <button type="button" onClick={() => updateStockValue(ing.id, -5)} style={{background:"rgba(255,255,255,0.05)", border:"1px solid rgba(214,175,55,0.3)", color:"#fff", width:"24px", height:"24px", borderRadius:"50%", cursor:"pointer"}}>−</button>
                      <button type="button" onClick={() => updateStockValue(ing.id, 5)} style={{background:"#D4AF37", border:"none", color:"#1a0800", width:"24px", height:"24px", borderRadius:"50%", cursor:"pointer", fontWeight:"bold"}}>+</button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ===== TAB: LAB ===== */}
        {tab === "lab" && (
          <div className="fade">
            <div style={{textAlign:"center", marginBottom:"12px"}}>
              <span style={{fontSize:"1.6rem"}}>🧪</span>
              <h2 style={{fontSize:"1rem", color:"#D4AF37", fontWeight:"600"}}>مُحاكي المخبار الرقمي الفوري</h2>
            </div>

            <div className="glass-card">
              <span style={{fontSize:"0.7rem", color:"#D4AF37", display:"block", marginBottom:"4px"}}>اختر مادة للضخ الفوري:</span>
              <div style={{display:"grid", gridTemplateColumns:"2fr 1fr auto", gap:"6px"}}>
                <select value={labSelectedIng} onChange={e => setLabSelectedIng(e.target.value)} style={{...inpStyle, background:"#221105"}}>
                  {ingredients.map(i => <option key={i.id} value={i.id} style={{background:"#221105"}}>{i.name} ({i.brand})</option>)}
                </select>
                <input type="number" value={labAmount} onChange={e => setLabAmount(Math.max(0, +e.target.value))} style={{...inpStyle, textAlign:"center"}}/>
                <button onClick={() => {
                  const target = ingredients.find(x => x.id === labSelectedIng);
                  if(!target) return;
                  if(labMix.find(i => i.id === labSelectedIng)) {
                    setLabMix(p => p.map(i => i.id === labSelectedIng ? {...i, amount: i.amount + labAmount} : i));
                  } else {
                    setLabMix(p => [...p, {id: labSelectedIng, amount: labAmount}]);
                  }
                }} style={{background:"#D4AF37", color:"#1a0800", border:"none", padding:"0 14px", borderRadius:"10px", cursor:"pointer", fontWeight:"600"}}>+</button>
              </div>
            </div>

            <div style={{background:"linear-gradient(135deg, #241207, #120500)", border:"1px solid #D4AF37", borderRadius:"14px", padding:"14px", marginBottom:"12px"}}>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:"0.72rem", marginBottom:"4px"}}><span>الحجم الكلي بالتوليفة:</span><span style={{color:"#D4AF37", fontWeight:"600"}}>{totalLabVolume} مل/جم</span></div>
            </div>

            {labMix.length > 0 && (
              <div className="glass-card" style={{padding:"10px"}}>
                <div style={{display:"flex", justifyContent:"space-between", fontSize:"0.68rem", color:"#c8a46a", marginBottom:"6px"}}>
                  <span>العناصر النشطة بالمخبار:</span>
                  <span onClick={() => setLabMix([])} style={{color:"#ff8585", cursor:"pointer"}}>✕ تصفير الخلطة</span>
                </div>
                {labMix.map(lm => {
                  const xinf = ingredients.find(i => i.id === lm.id);
                  return (
                    <div key={lm.id} style={{display:"flex", justifyContent:"space-between", fontSize:"0.72rem", padding:"3px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                      <span>• {xinf?.name}</span>
                      <span style={{fontWeight:"600"}}>{lm.amount} {xinf?.unit}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>

      <div className="bottom-nav no-print">
        <button onClick={() => setTab("home")} className={`nav-item ${tab === "home" ? "active" : ""}`}><span className="nav-icon">🪵</span>الرئيسية</button>
        <button onClick={() => setTab("inventory")} className={`nav-item ${tab === "inventory" ? "active" : ""}`}><span className="nav-icon">🏺</span>المخزون</button>
        <button onClick={() => setTab("lab")} className={`nav-item ${tab === "lab" ? "active" : ""}`}><span className="nav-icon">🧪</span>المختبر</button>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
