const bulkTotalQty=RAW.filter(r=>r[2]==="Bulkaroma").reduce((s,r)=>s+r[5],0);

function buildInv(){
  return RAW.map(([id,name,brand,cat,price,qty,unit])=>{
    const ship=brand==="Bulkaroma"?(SHIPPING_BULK*qty/bulkTotalQty):0;
    const unitCost=qty>0?(price+ship)/qty:0;
    return {id,name,brand,cat,price,qty,unit,stock:qty,ship,unitCost};
  });
}

}

          </div>

          </div>
          {prodLog.length===0&&<div style={{textAlign:"center",color:"#5a3a10",padding:"30px",fontSize:"0.8rem"}}>لا يوجد إنتاج بعد</div>}

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}}>
                <div>
                  <span style={{fontSize:"0.85rem",fontWeight:"700"}}>{e.recipeIcon} {e.recipeName}</span>
                  <div style={{fontSize:"0.66rem",color:"#c8a46a"}}>{fmtDate(e.date)} • {e.batch} ({e.vol} مل)</div>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:"0.78rem",color:"#D4AF37",fontWeight:"700"}}>تكلفة: {e.cost} ر</div>
                  {e.sold&&e.sellPrice&&<div style={{fontSize:"0.68rem",color:"#80c080"}}>بيع: {e.sellPrice} ر</div>}
                </div>
              </div>
              {!e.sold&&<SellEntry id={e.id} onSell={markSold}/>}
              {e.sold&&<span className="tag tag-green">✅ مباع</span>}
            </div>
          ))}

          {/* purchase log */}
          {purchases.length>0&&<>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"8px",marginTop:"4px"}}>📦 سجل المشتريات</h3>
            {purchases.map(p=>(
              <div key={p.id} className="glass" style={{padding:"10px 13px",marginBottom:"6px"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:"0.82rem",fontWeight:"700"}}>{p.ingName}</div>
                    <div style={{fontSize:"0.65rem",color:"#c8a46a"}}>{p.brand} • {fmtDate(p.date)}</div>
                    {p.note&&<div style={{fontSize:"0.65rem",color:"#7a5a30",marginTop:"2px"}}>{p.note}</div>}
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.82rem"}}>{p.qty} {p.unit}</div>
                    <div style={{fontSize:"0.7rem",color:"#80c080"}}>{p.price} ريال</div>
                  </div>
                </div>
              </div>
            ))}
          </>}
        </div>}

        {/* ══════════════ HERITAGE ══════════════ */}
        {tab==="heritage"&&<div className="fade">
          {/* backup section */}
          <div className="glass" style={{background:"rgba(214,175,55,0.04)",marginBottom:"14px"}}>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"10px"}}>💾 النسخ الاحتياطي</h3>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              <button className="btn-ghost" onClick={exportData}>📤 تصدير البيانات</button>
              <button className="btn-ghost" onClick={()=>importRef.current.click()}>📥 استيراد نسخة</button>
              <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
            </div>
            <p style={{fontSize:"0.68rem",color:"#7a5a30",marginTop:"8px"}}>يُحفظ تلقائياً في المتصفح — صدّر نسخة احتياطية للحماية من الضياع</p>
          </div>

          <div style={{background:"linear-gradient(160deg,#1a0800,#3a1500)",borderRadius:"16px",padding:"20px",marginBottom:"14px",textAlign:"center"}}>
            <span style={{fontSize:"2.5rem"}}>🪵</span>
            <h2 style={{color:"#D4AF37",fontSize:"1.15rem",fontWeight:"700"}}>تراث الدهن العربي</h2>
          </div>
          {[
            {icon:"🕌",t:"العود في مجالس الأمراء",d:"منذ القرن الثامن الهجري، لا تكتمل مجالس الشيوخ إلا بفتيل العود. الضيف يعرف كرم مضيفه من رائحة العود المشتعل قبل وصوله."},
            {icon:"🌹",t:"الطائف عاصمة العطر",d:"مدينتك الطائف أم عواصم العطر الشرقي. ورد طائفي يُباع بأسعار الذهب ومعامل تقطير تصدر للعالم."},
            {icon:"🪵",t:"العود الغرقاوي",d:"أندر وأغلى أنواع العود — الغارق في مياه الغابة عشرات السنين. قطرة تبقى أسبوعاً كاملاً."},
            {icon:"👘",t:"البشت والدهن",d:"قبل ارتداء البشت في المناسبات، تُدهن حوافه بالعود الثقيل ليصاحب العطر صاحبه طوال الليل."},
            {icon:"🏺",t:"وصفة الجدة",d:"جدات الحجاز يصنعن الدهن في الفخار، يورّثن الوصفة سراً من جيل لجيل كبصمة عائلية."},
          ].map((h,i)=>(<div key={i} className="glass" style={{borderRight:"4px solid #D4AF37"}}><div style={{display:"flex",gap:"10px"}}><span style={{fontSize:"1.4rem"}}>{h.icon}</span><div><h3 style={{color:"#D4AF37",fontSize:"0.85rem",fontWeight:"700",marginBottom:"3px"}}>{h.t}</h3><p style={{color:"#e5d5be",fontSize:"0.76rem",lineHeight:"1.7"}}>{h.d}</p></div></div></div>))}
          <div className="glass" style={{background:"rgba(214,175,55,0.04)"}}>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"10px"}}>👑 أسرار الشيوخ</h3>
            {[["تعتيق 5 سنوات+","الزمن يصنع ما لا يصنعه المال"],["الطبخ على الفحم","حرارة بطيئة تولّد أعمق الروائح"],["الوعاء الفخاري","يتنفس ببطء ويخرج الماء تدريجياً"],["المزج ليلاً","الليل يثبّت الجزيئات"]].map(([s,t],i)=>(<div key={i} style={{background:"rgba(214,175,55,0.06)",borderRadius:"9px",padding:"9px 11px",marginBottom:"7px",borderRight:"3px solid rgba(214,175,55,0.4)"}}><div style={{color:"#D4AF37",fontSize:"0.78rem",fontWeight:"700"}}>✦ {s}</div><div style={{color:"#c8a060",fontSize:"0.72rem"}}>{t}</div></div>))}
          </div>
        </div>}

      </div>

      <div className="bottom-nav">
        {[
          {id:"inventory",icon:"🏺",label:"المخزون"},
          {id:"recipes",icon:"📋",label:"الوصفات"},
          {id:"stats",icon:"📊",label:"الإحصائيات"},
          {id:"heritage",icon:"👑",label:"التراث"},
        ].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setSelectedRecipe(null);setShowAddIng(false);setShowAddRec(false);setShowCompare(false);setShowMixer(false);}} className={`nav-btn ${tab===t.id?"active":""}`}>
            <span className="nav-icon">{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

function SellEntry({id,onSell}){
  const [price,setPrice]=useState("");
  return(
    <div style={{display:"flex",gap:"6px",alignItems:"center",marginTop:"6px"}}>
      <input type="number" placeholder="سعر البيع (ريال)" value={price} onChange={e=>setPrice(e.target.value)}
        style={{flex:1,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(214,175,55,0.4)",borderRadius:"8px",color:"#fff",fontSize:"0.75rem",padding:"5px 8px",outline:"none",fontFamily:"'Alexandria',sans-serif"}}/>
      <button onClick={()=>{if(price)onSell(id,+price);}} style={{background:"rgba(80,160,80,0.2)",border:"1px solid rgba(80,160,80,0.4)",color:"#80c080",borderRadius:"8px",padding:"5px 10px",fontSize:"0.72rem",cursor:"pointer",fontWeight:"600",whiteSpace:"nowrap"}}>✓ بيع</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
