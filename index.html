    const ship=brand==="Bulkaroma"?(SHIPPING_BULK*qty/bulkTotalQty):0;

}

function lsGet(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
function applyPendingPurchases(inv){
  if(lsGet("dw_pp_ver","")===PENDING_PURCHASES_VERSION)return inv;
  const map=new Map(inv.map(i=>[i.id,{...i}]));
  PENDING_PURCHASES.forEach(p=>{
    if(map.has(p.id)){
      const i=map.get(p.id);
      const nQty=i.qty+p.qty;const nPrice=i.price+p.cost;
      map.set(p.id,{...i,qty:nQty,price:nPrice,stock:i.stock+p.qty,unitCost:nQty>0?nPrice/nQty:0});
    } else if(p.newItem){
      map.set(p.id,{id:p.id,...p.newItem,price:p.cost,qty:p.qty,stock:p.qty,ship:0,unitCost:p.qty>0?p.cost/p.qty:0});
    }
  });
  lsSet("dw_pp_ver",PENDING_PURCHASES_VERSION);
  return [...map.values()];
}

// ─── aging: parse stability ("7 أيام"→7, "24 ساعة"→1) ───────────
function agingDaysOf(stability){
  if(!stability)return 0;
  const n=parseInt(stability,10)||0;
  if(stability.includes("ساعة")||stability.includes("ساعات"))return Math.max(1,Math.ceil(n/24));
  return n;
}
function daysLeft(readyDate){
  if(!readyDate)return 0;
  return Math.ceil((new Date(readyDate)-new Date())/86400000);
}

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"7px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.88rem",fontWeight:"700",color:"#F0E6D0",lineHeight:"1.3"}}>{ing.name}{isLow&&<span style={{marginInlineStart:"6px",fontSize:"0.62rem",color:"#C06868",fontWeight:"700"}}>⚠️ ينفد</span>}{expSt==="soon"&&<span style={{marginInlineStart:"6px",fontSize:"0.60rem",color:"#C08840",fontWeight:"700"}}>⚠️ قارب الانتهاء</span>}{expSt==="expired"&&<span style={{marginInlineStart:"6px",fontSize:"0.60rem",color:"#C06868",fontWeight:"700"}}>❌ منتهي</span>}</div>
                  <div style={{fontSize:"0.65rem",color:"#7A5820",marginTop:"3px",letterSpacing:"0.2px"}}>{ing.brand} · {ing.cat}{ing.brand==="Bulkaroma"&&ing.ship>0&&<span style={{color:"#68A868"}}> · شحن <span className="mono">{ing.ship.toFixed(1)}</span>ر</span>}{ing.expiry&&<span style={{color:expSt?"#C08840":"#5A4015"}}> · ينتهي {fmtDate(ing.expiry)}</span>}</div>
                </div>
                <div style={{textAlign:"left",marginInlineStart:"10px",flexShrink:0}}>

                  <div onClick={()=>setEditCostId(editCostId===ing.id?null:ing.id)} style={{fontSize:"0.62rem",color:"#68A868",cursor:"pointer",textDecoration:"underline dotted",marginTop:"2px"}} className="mono">{ing.unitCost.toFixed(2)}ر/{ing.unit}</div>

              </div>

                  <input type="number" value={ing.price} onChange={e=>setPrice(ing.id,+e.target.value)} style={{width:"70px",textAlign:"center",background:"rgba(0,0,0,0.4)",border:"1px solid #D4AF37",borderRadius:"6px",color:"#fff",fontSize:"0.8rem",padding:"4px"}}/>
                  <span style={{fontSize:"0.7rem",color:"#c8a46a"}}>ريال / {ing.qty}{ing.unit}</span>
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"7px"}}>
                  <span style={{fontSize:"0.7rem",color:"#c8a46a"}}>الكمية الأصلية:</span>
                  <input type="number" value={ing.qty} onChange={e=>setQty(ing.id,+e.target.value)} style={{width:"70px",textAlign:"center",background:"rgba(0,0,0,0.4)",border:"1px solid #D4AF37",borderRadius:"6px",color:"#fff",fontSize:"0.8rem",padding:"4px"}}/>
                  <span style={{fontSize:"0.7rem",color:"#c8a46a"}}>{ing.unit}</span>
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"7px"}}>
                  <span style={{fontSize:"0.7rem",color:"#c8a46a"}}>تاريخ الانتهاء:</span>
                  <input type="date" value={ing.expiry||""} onChange={e=>setExpiry(ing.id,e.target.value)} style={{background:"rgba(0,0,0,0.4)",border:"1px solid #D4AF37",borderRadius:"6px",color:"#fff",fontSize:"0.75rem",padding:"4px",colorScheme:"dark"}}/>
                </div>
                <button onClick={()=>deleteIng(ing.id)} style={{width:"100%",background:"rgba(200,60,60,0.15)",border:"1px solid rgba(200,60,60,0.4)",color:"#e08080",borderRadius:"8px",padding:"6px",cursor:"pointer",fontSize:"0.75rem",fontWeight:"600"}}>🗑️ حذف من المخزون</button>

                </div>
                <button onClick={()=>updateStock(ing.id,-5)} style={{background:"rgba(170,40,40,0.14)",border:"1px solid rgba(180,50,50,0.28)",color:"#C06868",width:"26px",height:"26px",borderRadius:"50%",cursor:"pointer",fontSize:"0.95rem",lineHeight:"1",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <input type="number" value={ing.stock} onChange={e=>setStock(ing.id,+e.target.value)} className="mono" style={{width:"50px",textAlign:"center",background:"rgba(0,0,0,0.45)",border:"1px solid rgba(201,168,76,0.35)",borderRadius:"8px",color:"#F0E6D0",fontSize:"0.78rem",padding:"4px"}}/>
                <button onClick={()=>updateStock(ing.id,5)} style={{background:"rgba(60,130,60,0.14)",border:"1px solid rgba(70,150,70,0.28)",color:"#68B068",width:"26px",height:"26px",borderRadius:"50%",cursor:"pointer",fontSize:"0.95rem",lineHeight:"1",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>

            </div>);

        {/* ── add ingredient ── */}

              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>التصنيف</label><select className="inp" value={niCat} onChange={e=>setNiCat(e.target.value)} style={{background:"#0C0601"}}>{CATS.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الوحدة</label><select className="inp" value={niUnit} onChange={e=>setNiUnit(e.target.value)} style={{background:"#0C0601"}}>{["مل","جم","كجم","لتر"].map(u=><option key={u}>{u}</option>)}</select></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>السعر الكلي (ريال)</label><input type="number" className="inp" value={niPrice} onChange={e=>setNiPrice(+e.target.value)}/></div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الكمية</label><input type="number" className="inp" value={niQty} onChange={e=>setNiQty(+e.target.value)}/></div>
            </div>
            {niName&&niQty>0&&<div className="glass" style={{textAlign:"center",padding:"10px",background:"rgba(214,175,55,0.06)"}}>
              <div style={{color:"#80c080",fontSize:"0.8rem"}}>تكلفة الوحدة المحسوبة: <b style={{color:"#D4AF37"}}>{(((niBrand==="Bulkaroma"?SHIPPING_BULK*niQty/bulkTotalQty:0)+niPrice)/niQty).toFixed(2)} ريال/{niUnit}</b></div>
              {niBrand==="Bulkaroma"&&<div style={{color:"#c8a46a",fontSize:"0.68rem",marginTop:"3px"}}>+ حصة شحن {(SHIPPING_BULK*niQty/bulkTotalQty).toFixed(1)} ريال</div>}
            </div>}
            <button className="btn-gold" onClick={addIng}>💾 حفظ الخامة</button>
          </div>
        </div>}

        {/* ── purchase form modal ── */}
        {showPurchaseForm&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowPurchaseForm(false);}}>
          <div className="modal-sheet">
            <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>📦 تسجيل شراء جديد</h3>
            <div style={{display:"grid",gap:"9px"}}>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الخامة</label>
                <select className="inp" value={puIngId} onChange={e=>setPuIngId(e.target.value)} style={{background:"#0C0601"}}>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الكمية المشتراة</label><input type="number" className="inp" value={puQty} onChange={e=>setPuQty(+e.target.value)}/></div>
                <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>السعر المدفوع (ريال)</label><input type="number" className="inp" value={puPrice} onChange={e=>setPuPrice(+e.target.value)}/></div>
              </div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>ملاحظة</label><input className="inp" placeholder="اختياري..." value={puNote} onChange={e=>setPuNote(e.target.value)}/></div>

              <button className="btn-ghost" onClick={()=>setShowPurchaseForm(false)}>إلغاء</button>
            </div>
          </div>
        </div>}

        {/* ── shopping list modal ── */}
        {showShopList&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowShopList(false);}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
              <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700"}}>🛒 قائمة التسوق الذكية</h3>
              {lowStockItems.length>0&&<button className="btn-ghost" onClick={copyShopList}>📋 نسخ القائمة</button>}
            </div>
            {shopCart.length===0&&lowStockItems.length===0&&<div style={{textAlign:"center",color:"#80c080",padding:"30px",fontSize:"0.85rem"}}>✅ المخزون ممتاز — لا حاجة للشراء</div>}
            {shopCart.length>0&&(
              <div className="glass" style={{padding:"12px",marginBottom:"10px",background:"rgba(200,60,60,0.06)",border:"1px solid rgba(200,60,60,0.3)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                  <div style={{color:"#e08080",fontWeight:"700",fontSize:"0.85rem"}}>📝 ناقص من الوصفات ({shopCart.length})</div>
                  <button onClick={()=>setShopCart([])} style={{background:"rgba(200,60,60,0.2)",border:"1px solid rgba(200,60,60,0.4)",color:"#e08080",borderRadius:"6px",padding:"2px 8px",cursor:"pointer",fontSize:"0.68rem"}}>مسح الكل</button>
                </div>
                {shopCart.map(item=>(
                  <div key={item.id} style={{borderBottom:"1px solid rgba(255,255,255,0.05)",paddingBottom:"6px",marginBottom:"4px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
                      <div>
                        <div style={{fontSize:"0.78rem",fontWeight:"600"}}>{item.name}</div>
                        <div style={{fontSize:"0.62rem",color:"#7a5a30"}}>من: {item.fromRecipe} • {item.brand}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <span style={{fontSize:"0.78rem",color:"#D4AF37",fontWeight:"700"}}>{item.need} {item.unit}</span>
                        <button onClick={()=>{setBuyingCartItem(item);setBuyQty(item.need);setBuyPrice(0);}} style={{background:"rgba(80,160,80,0.2)",border:"1px solid rgba(80,160,80,0.4)",color:"#80c080",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",fontSize:"0.7rem",fontWeight:"700"}}>✓ شريت</button>

                          <div>

                            <input type="number" className="inp" value={buyQty} onChange={e=>setBuyQty(+e.target.value)} step="0.1" style={{textAlign:"center",fontSize:"0.82rem",padding:"5px"}}/>
                          </div>
                          <div>
                            <div style={{fontSize:"0.62rem",color:"#c8a46a",marginBottom:"2px"}}>السعر (ريال)</div>
                            <input type="number" className="inp" value={buyPrice} onChange={e=>setBuyPrice(+e.target.value)} step="1" placeholder="0" style={{textAlign:"center",fontSize:"0.82rem",padding:"5px"}}/>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:"6px"}}>
                          <button onClick={confirmCartPurchase} style={{flex:1,background:"rgba(80,160,80,0.25)",border:"1px solid rgba(80,160,80,0.5)",color:"#80c080",borderRadius:"7px",padding:"6px",cursor:"pointer",fontSize:"0.75rem",fontWeight:"700"}}>💾 حفظ وتحديث المخزون</button>
                          <button onClick={()=>setBuyingCartItem(null)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#7a6a50",borderRadius:"7px",padding:"6px 10px",cursor:"pointer",fontSize:"0.75rem"}}>إلغاء</button>

                      </div>

                  </div>

              </div>

                {items.map(i=>(
                  <div key={i.id}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <span style={{fontSize:"0.78rem"}}>{i.name}</span>
                      <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                        <span style={{fontSize:"0.74rem",color:"#80c080",fontWeight:"700"}}>اشترِ {i.recommend} {i.unit} <span style={{color:"#e08080",fontWeight:"400"}}>(باقي {i.stock})</span></span>

                      </div>
                    </div>
                    {buyingCartItem?.id===i.id&&buyingCartItem?.fromRecipe==="__lowstock__"&&(

                          <div><div style={{fontSize:"0.62rem",color:"#c8a46a",marginBottom:"2px"}}>الكمية ({i.unit})</div><input type="number" className="inp" value={buyQty} onChange={e=>setBuyQty(+e.target.value)} step="0.1" style={{textAlign:"center",fontSize:"0.82rem",padding:"5px"}}/></div>
                          <div><div style={{fontSize:"0.62rem",color:"#c8a46a",marginBottom:"2px"}}>السعر (ريال)</div><input type="number" className="inp" value={buyPrice} onChange={e=>setBuyPrice(+e.target.value)} step="1" placeholder="0" style={{textAlign:"center",fontSize:"0.82rem",padding:"5px"}}/></div>
                        </div>
                        <div style={{display:"flex",gap:"6px"}}>
                          <button onClick={confirmCartPurchase} style={{flex:1,background:"rgba(80,160,80,0.25)",border:"1px solid rgba(80,160,80,0.5)",color:"#80c080",borderRadius:"7px",padding:"6px",cursor:"pointer",fontSize:"0.75rem",fontWeight:"700"}}>💾 حفظ وتحديث المخزون</button>
                          <button onClick={()=>setBuyingCartItem(null)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#7a6a50",borderRadius:"7px",padding:"6px 10px",cursor:"pointer",fontSize:"0.75rem"}}>إلغاء</button>

                      </div>

                  </div>
                ))}
              </div>
            ))}
            <button className="btn-ghost" style={{width:"100%",marginTop:"6px"}} onClick={()=>setShowShopList(false)}>إغلاق</button>
          </div>

        {/* ── supplier comparison modal ── */}
        {showSupplierCmp&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowSupplierCmp(false);}}>
          <div className="modal-sheet">
            <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"6px"}}>📊 مقارنة الموردين</h3>
            <p style={{fontSize:"0.68rem",color:"#7a5a30",marginBottom:"12px"}}>الأرخص لكل تصنيف يظهر أولاً (الأخضر = الأوفر)</p>

                {items.map((i,idx)=>(
                  <div key={i.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                    <span style={{fontSize:"0.74rem",color:idx===0?"#80c080":"#c8a46a"}}>{idx===0?"🏆 ":""}{i.name} <span style={{color:"#7a5a30"}}>· {i.brand}</span></span>
                    <span style={{fontSize:"0.74rem",fontWeight:"700",color:idx===0?"#80c080":"#D4AF37"}}>{i.unitCost.toFixed(2)} ر/{i.unit}</span>

        {showExpiryCalendar&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowExpiryCalendar(false);}}>
          <div className="modal-sheet">
            <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>📅 تقويم انتهاء الصلاحية</h3>

            {expiryGroups.expired.length>0&&<div className="glass" style={{marginBottom:"10px",borderInlineStart:"3px solid rgba(192,64,64,0.70)",padding:"10px 12px"}}>
              <div style={{color:"#e08080",fontWeight:"700",fontSize:"0.82rem",marginBottom:"6px"}}>❌ منتهية الصلاحية ({expiryGroups.expired.length})</div>

              </div>

          {/* production log */}
          {/* ── aging queue ── */}
          {(()=>{const aging=prodLog.filter(e=>!e.sold&&e.readyDate&&daysLeft(e.readyDate)>0).sort((a,b)=>daysLeft(a.readyDate)-daysLeft(b.readyDate));if(!aging.length)return null;return(

            const dl=e.readyDate?daysLeft(e.readyDate):0;const ready=dl<=0;

                  <span style={{fontSize:"0.85rem",fontWeight:"700"}}>{e.recipeIcon} {e.recipeName}</span>

                  {e.note&&<div style={{fontSize:"0.65rem",color:"#80a0e0",marginTop:"2px"}}>📝 {e.note}</div>}

                  <div style={{fontSize:"0.78rem",color:"#D4AF37",fontWeight:"700"}}>تكلفة: {e.cost} ر</div>

                </div>
              </div>
              <div style={{display:"flex",gap:"5px",flexWrap:"wrap",alignItems:"center",marginBottom:"5px"}}>
                {e.readyDate&&(ready?<span className="tag tag-green">✅ جاهز للبيع</span>:<span className="tag" style={{background:"rgba(192,128,32,0.15)",color:"#e0a060",border:"1px solid rgba(192,128,32,0.35)"}}>⏳ تعتيق — متبقي {dl} يوم</span>)}
                {cust&&<span className="tag tag-blue">👤 {cust.name}</span>}
              </div>

              {e.sold&&<span className="tag tag-green">✅ مباع</span>}
              <button onClick={()=>{const custName=e.customerId?customers.find(c=>c.id===e.customerId)?.name:"";const w=window.open('','_blank','width=400,height=320');w.document.write(`<html dir="rtl"><body style="font-family:Arial;margin:0;padding:16px;background:#1a0800;color:#D4AF37;border:2px solid #D4AF37;border-radius:12px;width:340px;box-sizing:border-box;"><div style="text-align:center;font-size:11px;letter-spacing:2px;color:#c8a46a;margin-bottom:4px">ضاوي دهن العود</div><div style="text-align:center;font-size:22px;margin:4px 0">${e.recipeIcon}</div><div style="text-align:center;font-size:16px;font-weight:700;margin-bottom:8px">${e.recipeName}</div><hr style="border-color:#D4AF37;opacity:0.3"/>${custName?`<div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">العميل</span><span style="color:#80c0ff;font-weight:700">${custName}</span></div>`:""}<div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">رقم الدفعة</span><span>${e.batchNo}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">الحجم</span><span>${e.vol} مل</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">تاريخ الصنع</span><span>${fmtDate(e.date)}</span></div>${e.readyDate?`<div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span style="color:#c8a46a">جاهز في</span><span style="color:#80c080">${fmtDate(e.readyDate)}</span></div>`:""}${e.sold&&e.sellPrice?`<div style="display:flex;justify-content:space-between;font-size:13px;margin:6px 0;padding-top:6px;border-top:1px solid rgba(214,175,55,0.3)"><span style="color:#c8a46a">سعر البيع</span><span style="color:#80c080;font-weight:700">${e.sellPrice} ريال</span></div>`:""}${e.note?`<div style="font-size:11px;color:#80a0e0;margin-top:6px;border-top:1px solid rgba(214,175,55,0.2);padding-top:6px">${e.note}</div>`:""}</body></html>`);w.document.close();w.print();}} style={{marginTop:"5px",background:"rgba(214,175,55,0.08)",border:"1px solid rgba(214,175,55,0.3)",color:"#D4AF37",borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"0.68rem",fontWeight:"600"}}>🏷️ طباعة ملصق</button>

                    <div style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.82rem"}}>{p.qty} {p.unit}</div>
                    <div style={{fontSize:"0.7rem",color:"#80c080"}}>{p.price} ريال</div>
                  </div>
                </div>
              </div>
            ))}
          </>}
        </div>}

        {/* ══════════════ CUSTOMERS ══════════════ */}
        {tab==="customers"&&!selectedCustomer&&!showAddCust&&<div className="fade">

              {["أضف العميل باسمه ورقمه","اربط مشتريات الدفعات بالعميل","تتبّع إجمالي مشترياته وتفضيلاته"].map((s,i)=>(
                <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",fontSize:"0.78rem",color:"#C8B898",lineHeight:"1.7"}}>
                  <span style={{minWidth:"20px",height:"20px",borderRadius:"50%",background:"rgba(201,168,76,0.15)",color:"#D4AF37",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.65rem",fontWeight:"700",flexShrink:0}}>{i+1}</span>
                  <span>{s}</span>

            <button className="btn-gold" onClick={()=>setShowAddCust(true)}>+ أضف أول عميل</button>
          </div>}

            const orders=prodLog.filter(e=>e.customerId===c.id);
            const spent=orders.filter(o=>o.sold&&o.sellPrice).reduce((s,o)=>s+o.sellPrice,0);
            return(
            <div key={c.id} className="glass" style={{padding:"14px",marginBottom:"8px",borderInlineStart:`3px solid ${orders.length>2?"rgba(201,168,76,0.55)":"rgba(100,140,200,0.50)"}`}}>

                  {c.phone&&<div style={{fontSize:"0.67rem",color:"#8A6830",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"-0.01em"}}>{c.phone}</div>}
                </div>
                <div style={{textAlign:"left",flexShrink:0}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"3px"}}>

                    {spent>0&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.65rem",color:"#6AAA48",letterSpacing:"-0.02em"}}>{spent.toFixed(0)} ر</span>}
                    {c.preferredRecipes&&c.preferredRecipes.length>0&&<div style={{fontSize:"0.60rem",color:"#E8C460"}}>⭐ {c.preferredRecipes.length}</div>}

              </div>
            </div>
          );})}
        </div>}

        {tab==="customers"&&showAddCust&&<div className="fade">
          <button className="btn-ghost" onClick={()=>setShowAddCust(false)} style={{marginBottom:"14px"}}>← رجوع</button>

            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الاسم *</label><input className="inp" value={ncName} onChange={e=>setNcName(e.target.value)}/></div>

              <button className="btn-danger" style={{flex:1}} onClick={()=>deleteCustomer(c.id)}>🗑️ حذف</button>

              {c.phone&&<p style={{fontSize:"0.75rem",color:"#8A6830",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"-0.01em",marginTop:"6px"}}>{c.phone}</p>}
              {c.birthday&&<p style={{fontSize:"0.72rem",color:"#E8C460",marginTop:"5px"}}>🎂 {new Date(c.birthday).toLocaleDateString('ar-SA',{day:'numeric',month:'long'})}</p>}

              <div className="stat-card" style={{background:"rgba(70,140,60,0.07)",borderColor:"rgba(70,140,60,0.20)"}}><div style={{fontSize:"0.60rem",color:"#8A6830",textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"5px"}}>الإنفاق</div><div className="p-num" style={{fontSize:"1.5rem",backgroundImage:"linear-gradient(135deg,#8AD878,#5AA840)"}}>{spent.toFixed(0)}<span style={{fontSize:"0.7rem",opacity:0.6,fontFamily:"'Alexandria',sans-serif"}}> ر</span></div></div>
            </div>
            {prefRecipes.length>0&&<>

                <div key={r.id} onClick={()=>{setTab("recipes");setSelectedRecipe(r);setSelectedCustomer(null);}} className="glass" style={{cursor:"pointer",padding:"10px 13px",marginBottom:"6px"}}>
                  <span style={{fontSize:"0.85rem",fontWeight:"700"}}>{r.icon} {r.name}</span>

                <div style={{display:"flex",justifyContent:"space-between"}}>

                  <span style={{fontSize:"0.7rem",color:o.sold?"#80c080":"#c8a46a"}}>{o.sold?`✅ ${o.sellPrice} ر`:"قيد التنفيذ"}</span>
                </div>
                <div style={{fontSize:"0.64rem",color:"#c8a46a"}}>{fmtDate(o.date)} • {o.batch}</div>
              </div>
            ))}
          </div>;
        })()}

        {tab==="heritage"&&<div className="fade">
          {/* AI settings */}

          </div>

      </div>}

      <div className="bottom-nav">
        {[
          {id:"home",icon:"🏠",label:"الرئيسية"},

          {id:"customers",icon:"👥",label:"العملاء"},

        ].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setSelectedRecipe(null);setCatalogView(null);setQrRecipe(null);setShowAddIng(false);setShowAddRec(false);setShowCompare(false);setShowMixer(false);setSelectedCustomer(null);setShowAddCust(false);setShowShopList(false);setShowSupplierCmp(false);setShowExpiryCalendar(false);setShowRating(false);setShowAIGen(false);setShowAIAnalysis(false);setShowDilution(false);setEditRecipe(null);}} className={`nav-btn ${tab===t.id?"active":""}`}>
            <span className="nav-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── shareable customer perfume link (no prices) ──────────────────
function encodePerfume(obj){try{return encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(obj)))));}catch(e){return "";}}
function decodePerfume(s){try{return JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(s)))));}catch(e){return null;}}
function buildPerfumePayload(recipe,getIng){
  const top=[],mid=[],base=[];
  (recipe.ing||[]).forEach(([id])=>{const ing=getIng?getIng(id):null;const nm=ing?.name||id;const t=noteTier(id);(t==="top"?top:t==="mid"?mid:base).push(nm);});
  return {n:recipe.name,i:recipe.icon,d:recipe.desc,s:recipe.season,g:recipe.gender,st:recipe.stability,top,mid,base};
}
function buildShareLink(recipe,getIng){
  return location.origin+location.pathname+"#p="+encodePerfume(buildPerfumePayload(recipe,getIng));
}

function QRModal({recipe,getIng,onClose}){
  const ref=useRef();
  const [fallback,setFallback]=useState(false);
  const [copied,setCopied]=useState(false);
  const shareLink=buildShareLink(recipe,getIng);
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    if(!window.QRCode){setFallback(true);return;}
    // QR encodes the public customer link (clean view, no prices).
    try{
      new window.QRCode(ref.current,{text:shareLink,width:210,height:210,colorDark:"#1a0800",colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.L});
    }catch(e){
      setFallback(true);
    }
  },[recipe]);
  const copyLink=()=>{
    if(navigator.clipboard)navigator.clipboard.writeText(shareLink).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});
  };
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")onClose();}}>
      <div className="modal-sheet" style={{textAlign:"center"}}>
        <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"6px"}}>📲 مشاركة العطر مع العميل</h3>
        <p style={{fontSize:"0.74rem",color:"#c8a46a",marginBottom:"14px"}}>{recipe.icon} {recipe.name} — يفتح صفحة فاخرة بدون أسعار</p>
        {!fallback&&<div ref={ref} style={{display:"inline-block",padding:"12px",background:"#fff",borderRadius:"14px"}}/>}
        {fallback&&<div style={{color:"#c8a46a",fontSize:"0.72rem",padding:"16px",background:"rgba(0,0,0,0.3)",borderRadius:"12px",wordBreak:"break-all",textAlign:"center",lineHeight:"1.8"}}>{shareLink}</div>}
        <button className="btn-gold" style={{width:"100%",marginTop:"14px"}} onClick={copyLink}>{copied?"✅ تم النسخ":"🔗 نسخ رابط العميل"}</button>
        <button className="btn-ghost" style={{width:"100%",marginTop:"8px"}} onClick={onClose}>إغلاق</button>
      </div>
    </div>
  );
}

function SellEntry({id,onSell}){
  const [price,setPrice]=useState("");
  return(
    <div style={{display:"flex",gap:"6px",alignItems:"center",marginTop:"6px"}}>
      <input type="number" placeholder="سعر البيع (ريال)" value={price} onChange={e=>setPrice(e.target.value)}
        style={{flex:1,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(214,175,55,0.4)",borderRadius:"8px",color:"#fff",fontSize:"0.75rem",padding:"5px 8px",outline:"none",fontFamily:"'Alexandria',sans-serif"}}/>
      <button onClick={()=>{if(price)onSell(id,+price);}} style={{background:"rgba(80,160,80,0.2)",border:"1px solid rgba(80,160,80,0.4)",color:"#80c080",borderRadius:"8px",padding:"5px 10px",fontSize:"0.72rem",cursor:"pointer",fontWeight:"600",whiteSpace:"nowrap"}}>✓ بيع</button>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px",textAlign:"center",fontFamily:"'Alexandria',sans-serif",color:"#e5d5be"}},
        React.createElement("div",{style:{fontSize:"2.5rem",marginBottom:"12px"}},"⚠️"),
        React.createElement("h2",{style:{color:"#D4AF37",fontSize:"1.1rem",marginBottom:"8px"}},"حدث خطأ مؤقت"),
        React.createElement("p",{style:{fontSize:"0.82rem",color:"#c8a46a",marginBottom:"18px",maxWidth:"320px",lineHeight:"1.8"}},"التطبيق واجه مشكلة لكن بياناتك محفوظة. اضغط لإعادة التحميل."),
        React.createElement("button",{onClick:()=>location.reload(),style:{background:"#D4AF37",border:"none",color:"#1a0800",padding:"10px 24px",borderRadius:"12px",cursor:"pointer",fontSize:"0.9rem",fontWeight:"700",fontFamily:"'Alexandria',sans-serif"}},"🔄 إعادة التحميل")
      );
    }
    return this.props.children;
  }
}
// If opened via a shared customer link (#p=...), show the public perfume page.
const _pm=(location.hash||"").match(/^#p=(.+)$/);
const _payload=_pm?decodePerfume(_pm[1]):null;
const _rootEl=_payload?React.createElement(PublicView,{payload:_payload}):React.createElement(App);
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,_rootEl));
</script>
