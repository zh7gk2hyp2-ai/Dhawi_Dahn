<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background: linear-gradient(160deg, rgba(26, 8, 0, 0.96), rgba(58, 26, 5, 0.96)), url('https://images.unsplash.com/photo-1515377905703-c4788e51af15');
  background-size: cover;
  background-attachment: fixed;
  font-family: 'Alexandria', sans-serif;
  color: #fff8f0;
  overflow-x: hidden;
}
input,select,button,textarea{font-family:'Alexandria',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:4px;}

/* تأثيرات الأنيميشن الفاخرة */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.04);opacity:1;filter:drop-shadow(0 0 15px #D4AF37);}}
@keyframes smokeRise{0%{transform:translateY(100%) scale(0.8) translateX(0);opacity:0;}50%{opacity:0.4;transform:translateY(50%) scale(1.1) translateX(10px);}100%{transform:translateY(-20%) scale(1.5) translateX(-10px);opacity:0;}}
@keyframes driftParticles{0%{transform:translateY(0) translateX(0);opacity:0;}50%{opacity:0.6;}100%{transform:translateY(-100vh) translateX(30px);opacity:0;}}

.fade{animation:fadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;}
.pulse-glow{animation:pulseGlow 3s ease-in-out infinite;}

/* شاشة الإقلاع الفخمة */
#splash-screen {
  position: fixed;
  top:0;left:0;width:100vw;height:100vh;
  background: #120500;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease;
}
.smoke-holder {
  position: absolute;
  bottom: 0; left: 0; width: 100%; height: 50%;
  pointer-events: none; overflow: hidden;
}
.smoke-particle {
  position: absolute;
  bottom: 0;
  width: 90px; height: 90px;
  background: radial-gradient(circle, rgba(214,175,55,0.06) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(8px);
  animation: smokeRise 5s infinite linear;
}

/* جزيئات الذهب العائمة في الخلفية */
.gold-particle {
  position: fixed;
  width: 3px; height: 3px;
  background: #D4AF37;
  border-radius: 50%;
  box-shadow: 0 0 6px #D4AF37;
  animation: driftParticles 12s infinite linear;
  pointer-events: none;
  z-index: 0;
}

/* بطاقات الزجاج الضبابي Glassmorphism */
.glass-card {
  background: rgba(255, 248, 240, 0.07);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(214, 175, 55, 0.18);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

/* شريط التنقل السفلي نمط iOS */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 72px;
  background: rgba(25, 8, 0, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(214, 175, 55, 0.2);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: 12px;
  z-index: 999;
}
.nav-item {
  background: none; border: none;
  color: #c8a46a;
  display: flex; flex-direction: column; align-items: center;
  font-size: 0.65rem; font-weight: 400; cursor: pointer;
  transition: all 0.3s ease; gap: 4px;
}
.nav-item.active {
  color: #D4AF37;
  transform: translateY(-2px);
  text-shadow: 0 0 10px rgba(214,175,55,0.4);
}
.nav-icon {
  font-size: 1.3rem;
}

@media print {
  body { background: #fff !important; color: #000 !important; }
  .no-print { display: none !important; }
  .glass-card { background: none !important; border: 1px solid #000 !important; backdrop-filter: none !important; color:#000 !important;}
}
</style>

    <div class="smoke-particle" style="left: 65%; animation-delay: 0.9s;"></div>
