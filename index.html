const STOCK_OVERRIDES={musk_climb:60};
function buildInv(){
  return RAW.map(([id,name,brand,cat,price,qty,unit])=>{
    const ship=brand==="Bulkaroma"?(SHIPPING_BULK*qty/bulkTotalQty):0;
    const unitCost=qty>0?(price+ship)/qty:0;
    const stock=STOCK_OVERRIDES[id]!==undefined?STOCK_OVERRIDES[id]:qty;
    return {id,name,brand,cat,price,qty,unit,stock,ship,unitCost};
  });
}

const NOTES_MID=new Set(['artessence','lux_cambodi','lux_hindi','lux_hindi_sweety','lux_black','oud_xx','cambodi_fawah','maracuja','pretty_oud','white_oudh','amber_oud','cmp90','cmp91','cmp121','oud_synth','black_agar','lux_greatness','lux_exclusif','lux_symphony','lux_afternoon','crimson','metal_made','sleek_oud','oud_royal','oud_earthy']);
function noteTier(id){return NOTES_TOP.has(id)?"top":NOTES_MID.has(id)?"mid":"base";}
const NOTE_LABEL={top:"🔝 قمة",mid:"💫 قلب",base:"🪨 قاعدة"};

// ─── aging: parse stability ("7 أيام"→7, "24 ساعة"→1) ───────────
function agingDaysOf(stability){
  if(!stability)return 0;
  const n=parseInt(stability,10)||0;
  if(stability.includes("ساعة")||stability.includes("ساعات"))return Math.max(1,Math.ceil(n/24));
  return n;
}
function daysLeft(readyDate){
  if(!readyDate)return 0;
  return Math.ceil((new Date(readyDate)-new Date())/86400000);
}

            </div>

          {catalogMode&&sortedRecipes.map(r=>(
            <div key={r.id} onClick={()=>setSelectedRecipe(r)} className="glass" style={{cursor:"pointer",marginBottom:"12px",padding:"22px 16px",textAlign:"center",background:"linear-gradient(160deg,rgba(214,175,55,0.08),rgba(30,12,3,0.85))",border:"1px solid rgba(214,175,55,0.35)"}}>

              <h3 style={{color:"#D4AF37",fontSize:"1.15rem",fontWeight:"700",margin:"6px 0"}}>{favoriteIds.includes(r.id)?"⭐ ":""}{r.name}</h3>
              <p style={{fontSize:"0.82rem",color:"#e5d5be",marginBottom:"10px",lineHeight:"1.7"}}>{r.desc}</p>
              <div style={{display:"flex",gap:"6px",justifyContent:"center",flexWrap:"wrap"}}>
                <span className="tag tag-gold">👤 {r.gender}</span>
                <span className="tag tag-gold">🗓️ {r.season}</span>
                <span className="tag tag-gold">⏱ {r.stability}</span>
              </div>
            </div>
          ))}
          {/* normal mode — full operational cards */}
          {!catalogMode&&sortedRecipes.map(r=>{const fav=favoriteIds.includes(r.id);return(
            <div key={r.id} className="glass" style={{cursor:"pointer",borderRight:`4px solid ${compareIds.includes(r.id)?"#80a0e0":fav?"#e8c860":canMake(r)?"#D4AF37":"#5a3a10"}`,marginBottom:"9px",padding:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                <span onClick={()=>setSelectedRecipe(r)} style={{fontSize:"0.98rem",fontWeight:"700",color:"#fff",flex:1}}>{fav&&<span style={{color:"#e8c860"}}>⭐ </span>}{r.name}</span>
                <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
                  <span style={{fontSize:"1.3rem"}}>{r.icon}</span>
                  <button onClick={e=>{e.stopPropagation();toggleFav(r.id);}} style={{background:fav?"rgba(214,175,55,0.3)":"rgba(255,255,255,0.06)",border:"1px solid rgba(214,175,55,0.4)",color:"#e8c860",borderRadius:"8px",padding:"2px 7px",fontSize:"0.7rem",cursor:"pointer",fontWeight:"600"}}>{fav?"★":"☆"}</button>
                  <button onClick={e=>{e.stopPropagation();toggleCompare(r.id);}} style={{background:compareIds.includes(r.id)?"rgba(80,120,200,0.3)":"rgba(255,255,255,0.06)",border:"1px solid rgba(80,120,200,0.4)",color:"#80a0e0",borderRadius:"8px",padding:"2px 7px",fontSize:"0.65rem",cursor:"pointer",fontWeight:"600"}}>⚖️</button>
                </div>
              </div>
              <p onClick={()=>setSelectedRecipe(r)} style={{fontSize:"0.78rem",color:"#e5d5be",marginBottom:"8px"}}>{r.desc}</p>
              <div style={{display:"flex",gap:"5px",flexWrap:"wrap",alignItems:"center"}}>
                <span className="tag tag-gold">⏱ {r.stability}</span>
                <span className="tag" style={{background:"rgba(255,255,255,0.06)",color:"#fff"}}>👤 {r.gender}</span>
                <span className={`tag ${canMake(r)?"tag-green":"tag-red"}`}>{canMake(r)?"✅ جاهز":"⚠️ ناقص"}</span>
                <span className="tag tag-gold" style={{marginRight:"auto"}}>💰 {recipeCost(r).toFixed(0)}ر/{BATCH_NAME[batchUnit]}</span>
              </div>
              {ratings[r.id]&&<div style={{fontSize:"0.68rem",color:"#e8c860",marginTop:"5px"}}>{"⭐".repeat(ratings[r.id].stars)}{ratings[r.id].note&&<span style={{color:"#c8a46a"}}> — {ratings[r.id].note}</span>}</div>}
            </div>
          );})}
        </div>}

        {/* ── compare view ── */}
        {tab==="recipes"&&showCompare&&compareIds.length===2&&(()=>{
          const [r1,r2]=[recipes.find(r=>r.id===compareIds[0]),recipes.find(r=>r.id===compareIds[1])];
          if(!r1||!r2)return null;
          const allIds=[...new Set([...r1.ing.map(i=>i[0]),...r2.ing.map(i=>i[0])])];
          return <div className="fade">
            <button className="btn-ghost" onClick={()=>{setShowCompare(false);setCompareIds([]);}} style={{marginBottom:"12px"}}>← رجوع</button>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>
              {[r1,r2].map(r=><div key={r.id} className="glass" style={{textAlign:"center",padding:"12px"}}>
                <div style={{fontSize:"1.5rem"}}>{r.icon}</div>
                <div style={{fontSize:"0.82rem",fontWeight:"700",color:"#D4AF37",marginTop:"4px"}}>{r.name}</div>
                <div style={{fontSize:"0.68rem",color:"#c8a46a",marginTop:"2px"}}>{r.gender} • {r.season}</div>
                <div style={{fontSize:"0.7rem",color:"#80c080",marginTop:"4px"}}>تكلفة {BATCH_NAME[batchUnit]}: {recipeCost(r).toFixed(0)} ر</div>
                <div style={{fontSize:"0.68rem",color:"#c8a46a"}}>ثبات: {r.stability}</div>
              </div>)}
            </div>
            <h4 style={{color:"#D4AF37",fontSize:"0.8rem",marginBottom:"8px"}}>المكونات</h4>
            {allIds.map(id=>{
              const ing=getIng(id);
              const a1=r1.ing.find(i=>i[0]===id);const a2=r2.ing.find(i=>i[0]===id);
              return <div key={id} style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:"6px",alignItems:"center",padding:"5px 8px",marginBottom:"3px",borderRadius:"8px",background:"rgba(255,255,255,0.03)"}}>
                <div style={{fontSize:"0.72rem",color:a1?"#D4AF37":"#3a2a10",textAlign:"right"}}>{a1?`${(a1[1]*recipeScale(r1)).toFixed(1)}`:"—"}</div>
                <div style={{fontSize:"0.68rem",color:"#c8a46a",textAlign:"center"}}>{ing?.name||id}</div>
                <div style={{fontSize:"0.72rem",color:a2?"#D4AF37":"#3a2a10",textAlign:"left"}}>{a2?`${(a2[1]*recipeScale(r2)).toFixed(1)}`:"—"}</div>
              </div>;
            })}
          </div>;
        })()}

        {/* ── mixer ── */}
        {tab==="recipes"&&showMixer&&<div className="fade">
          <button className="btn-ghost" onClick={()=>{setShowMixer(false);setMixItems([]);}} style={{marginBottom:"14px"}}>← رجوع</button>
          <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>🧪 حاسبة الخلط المباشرة</h3>
          <div className="glass" style={{padding:"12px"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr auto",gap:"6px",marginBottom:"8px"}}>
              <select className="inp" value={mixIngId} onChange={e=>setMixIngId(e.target.value)} style={{background:"#1a0800",fontSize:"0.78rem"}}>
                {inv.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
              </select>
              <input type="number" className="inp" value={mixAmt} onChange={e=>setMixAmt(+e.target.value)} step="0.5" style={{textAlign:"center"}}/>
              <button onClick={()=>{
                if(mixItems.find(i=>i.id===mixIngId))setMixItems(p=>p.map(i=>i.id===mixIngId?{...i,amount:+(i.amount+mixAmt).toFixed(1)}:i));
                else setMixItems(p=>[...p,{id:mixIngId,amount:mixAmt}]);
              }} style={{background:"#D4AF37",border:"none",color:"#1a0800",width:"36px",height:"36px",borderRadius:"50%",cursor:"pointer",fontSize:"1.1rem",fontWeight:"bold",alignSelf:"end"}}>+</button>
            </div>
            {mixItems.map(mi=>{
              const ing=getIng(mi.id);
              const pct=mixTotal>0?(mi.amount/mixTotal*100).toFixed(1):0;
              const cost=ing?ing.unitCost*mi.amount:0;
              return <div key={mi.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"rgba(255,255,255,0.04)",borderRadius:"7px",marginBottom:"3px"}}>
                <div>
                  <div style={{fontSize:"0.78rem"}}>{ing?.name}</div>
                  <div style={{fontSize:"0.62rem",color:"#c8a46a"}}>{pct}% • {cost.toFixed(2)} ريال</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                  <span style={{color:"#D4AF37",fontWeight:"700"}}>{mi.amount} {ing?.unit}</span>
                  <button onClick={()=>setMixItems(p=>p.filter(i=>i.id!==mi.id))} style={{background:"none",border:"none",color:"#e08080",cursor:"pointer"}}>✕</button>
                </div>
              </div>;
            })}
            {mixItems.length>0&&<div style={{marginTop:"10px",padding:"10px",background:"rgba(214,175,55,0.08)",borderRadius:"10px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",textAlign:"center"}}>
                <div><div style={{fontSize:"0.62rem",color:"#c8a46a"}}>المجموع</div><div style={{fontWeight:"700",color:"#D4AF37"}}>{mixTotal.toFixed(1)} وحدة</div></div>
                <div><div style={{fontSize:"0.62rem",color:"#c8a46a"}}>التكلفة الكلية</div><div style={{fontWeight:"700",color:"#D4AF37"}}>{mixCost.toFixed(1)} ريال</div></div>
                <div><div style={{fontSize:"0.62rem",color:"#c8a46a"}}>تكلفة الوحدة</div><div style={{fontWeight:"700",color:"#80c080"}}>{mixTotal>0?(mixCost/mixTotal).toFixed(2):0} ريال</div></div>
              </div>
            </div>}
          </div>
        </div>}

        {/* ── add recipe ── */}
        {tab==="recipes"&&showAddRec&&<div className="fade">
          <button className="btn-ghost" onClick={()=>setShowAddRec(false)} style={{marginBottom:"14px"}}>← رجوع</button>
          <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>✦ وصفة جديدة</h3>
          <div style={{display:"grid",gap:"9px"}}>
            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الاسم *</label><input className="inp" value={nrName} onChange={e=>setNrName(e.target.value)}/></div>
            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الوصف</label><input className="inp" value={nrDesc} onChange={e=>setNrDesc(e.target.value)}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الموسم</label><select className="inp" value={nrSeason} onChange={e=>setNrSeason(e.target.value)} style={{background:"#1a0800"}}>{["صيف","شتاء","ربيع","خريف","مناسبات"].map(s=><option key={s}>{s}</option>)}</select></div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الجنس</label><select className="inp" value={nrGender} onChange={e=>setNrGender(e.target.value)} style={{background:"#1a0800"}}>{["للجنسين","رجالي","نسائي"].map(g=><option key={g}>{g}</option>)}</select></div>
            </div>
            <div className="glass" style={{padding:"12px",background:"rgba(0,0,0,0.3)"}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr auto",gap:"6px",marginBottom:"8px"}}>
                <select className="inp" value={nrIngId} onChange={e=>setNrIngId(e.target.value)} style={{background:"#1a0800",fontSize:"0.78rem"}}>{inv.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}</select>
                <input type="number" className="inp" value={nrAmt} onChange={e=>setNrAmt(+e.target.value)} step="0.5" style={{textAlign:"center"}}/>
                <button onClick={()=>{if(nrIngs.find(i=>i.id===nrIngId))setNrIngs(p=>p.map(i=>i.id===nrIngId?{...i,amount:+(i.amount+nrAmt).toFixed(1)}:i));else setNrIngs(p=>[...p,{id:nrIngId,amount:nrAmt}]);}} style={{background:"#D4AF37",border:"none",color:"#1a0800",width:"36px",height:"36px",borderRadius:"50%",cursor:"pointer",fontSize:"1.1rem",fontWeight:"bold",alignSelf:"end"}}>+</button>
              </div>
              {nrIngs.map(ri=>{const ing=getIng(ri.id);return(<div key={ri.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"rgba(255,255,255,0.04)",borderRadius:"7px",marginBottom:"3px"}}><span style={{fontSize:"0.78rem"}}>{ing?.name}</span><div style={{display:"flex",alignItems:"center",gap:"7px"}}><span style={{color:"#D4AF37",fontWeight:"700"}}>{ri.amount}مل</span><button onClick={()=>setNrIngs(p=>p.filter(i=>i.id!==ri.id))} style={{background:"none",border:"none",color:"#e08080",cursor:"pointer"}}>✕</button></div></div>);})}
              {nrIngs.length>0&&<div style={{textAlign:"left",color:"#D4AF37",fontSize:"0.78rem",marginTop:"5px"}}>المجموع: {nrIngs.reduce((s,i)=>s+i.amount,0).toFixed(1)} مل • التكلفة: {nrIngs.reduce((s,i)=>{const ing=getIng(i.id);return s+(ing?ing.unitCost*i.amount:0);},0).toFixed(1)} ريال</div>}
            </div>
            <button className="btn-gold" onClick={addRec}>✦ حفظ الوصفة</button>
          </div>
        </div>}

        {/* ── recipe detail ── */}
        {tab==="recipes"&&selectedRecipe&&!showAddRec&&!showCompare&&!showMixer&&(()=>{
          const r=selectedRecipe;const sc=recipeScale(r);const cost=recipeCost(r);const vol=BATCH[batchUnit];
          const mlCost=cost/vol;const sellMl=mlCost*profitMult;
          return <div className="fade">
            <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
              <button className="btn-ghost" onClick={()=>setSelectedRecipe(null)}>← رجوع</button>
              <button className="btn-ghost" onClick={()=>printRecipe(r)}>🖨️ طباعة</button>
              <button className="btn-ghost" onClick={()=>setQrRecipe(r)}>📲 مشاركة</button>
              <button className="btn-ghost" onClick={()=>openRating(r)}>⭐ {ratings[r.id]?`${ratings[r.id].stars}/5`:"تقييم"}</button>
              <button className="btn-ghost" style={{borderColor:"rgba(80,120,200,0.5)",color:"#80a0e0"}} onClick={()=>analyzeRecipeAI(r)}>🤖 تحليل</button>
              <button className="btn-ghost" style={favoriteIds.includes(r.id)?{background:"#D4AF37",color:"#1a0800"}:{}} onClick={()=>toggleFav(r.id)}>{favoriteIds.includes(r.id)?"★ مفضلة":"☆ مفضلة"}</button>
            </div>
            <div className="glass" style={{textAlign:"center",background:"rgba(214,175,55,0.06)",padding:"18px"}}>
              <span style={{fontSize:"1.8rem"}}>{r.icon}</span>
              <h2 style={{color:"#D4AF37",fontSize:"1.1rem",fontWeight:"700",marginTop:"4px"}}>{r.name}</h2>
              <p style={{fontSize:"0.8rem",color:"#e5d5be",marginTop:"4px"}}>{r.desc}</p>
            </div>

            <div className="glass">
              <div style={{color:"#D4AF37",fontSize:"0.78rem",textAlign:"center",marginBottom:"8px"}}>حجم الدفعة</div>
              <div style={{display:"flex",justifyContent:"center",gap:"5px",flexWrap:"wrap"}}>
                {Object.keys(BATCH).map(b=>(<button key={b} onClick={()=>setBatchUnit(b)} style={{background:batchUnit===b?"#D4AF37":"rgba(255,255,255,0.06)",border:`1px solid ${batchUnit===b?"#D4AF37":"rgba(214,175,55,0.3)"}`,color:batchUnit===b?"#1a0800":"#D4AF37",padding:"5px 10px",borderRadius:"20px",cursor:"pointer",fontSize:"0.75rem",fontWeight:"600"}}>{BATCH_NAME[b]}</button>))}
              </div>
            </div>

            <div className="glass" style={{background:"linear-gradient(135deg,rgba(214,175,55,0.12),rgba(30,12,3,0.8))",border:"1.5px solid #D4AF37"}}>
              <h3 style={{color:"#D4AF37",fontSize:"0.92rem",fontWeight:"700",marginBottom:"10px",textAlign:"center"}}>💰 حاسبة التكلفة الذكية</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#c8a46a"}}>تكلفة الدفعة</div><div style={{fontSize:"1.2rem",fontWeight:"700",color:"#D4AF37"}}>{cost.toFixed(1)} ر</div></div>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#c8a46a"}}>تكلفة المل</div><div style={{fontSize:"1.2rem",fontWeight:"700",color:"#D4AF37"}}>{mlCost.toFixed(2)} ر</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",padding:"8px",background:"rgba(0,0,0,0.25)",borderRadius:"10px"}}>
                <span style={{fontSize:"0.78rem",color:"#c8a46a"}}>هامش الربح:</span>
                <input type="range" min="1.5" max="6" step="0.5" value={profitMult} onChange={e=>setProfitMult(+e.target.value)} style={{flex:1,accentColor:"#D4AF37"}}/>
                <span style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.9rem",minWidth:"34px"}}>×{profitMult}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                <div style={{background:"rgba(80,160,80,0.12)",border:"1px solid rgba(80,160,80,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#80c080"}}>سعر بيع المل</div><div style={{fontSize:"1.15rem",fontWeight:"700",color:"#80c080"}}>{sellMl.toFixed(1)} ر</div></div>
                <div style={{background:"rgba(80,160,80,0.12)",border:"1px solid rgba(80,160,80,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#80c080"}}>سعر بيع الدفعة</div><div style={{fontSize:"1.15rem",fontWeight:"700",color:"#80c080"}}>{(sellMl*vol).toFixed(0)} ر</div></div>
              </div>
              <div style={{marginTop:"8px",textAlign:"center",fontSize:"0.7rem",color:"#c8a46a"}}>الربح الصافي للدفعة: <b style={{color:"#80c080"}}>{(sellMl*vol-cost).toFixed(0)} ريال</b></div>
            </div>

            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"7px"}}>🏺 المكونات ({BATCH_NAME[batchUnit]})</h3>
            <div style={{display:"flex",gap:"6px",marginBottom:"8px",flexWrap:"wrap"}}>
              <span className="tag tag-top">🔝 قمة</span><span className="tag tag-mid">💫 قلب</span><span className="tag tag-base">🪨 قاعدة</span>
            </div>
            {[...r.ing].sort((x,y)=>{const o={top:0,mid:1,base:2};return o[noteTier(x[0])]-o[noteTier(y[0])];}).map(([id,a])=>{const ing=getIng(id);const need=a*sc;const ok=ing&&ing.stock>=need;const c=ing?ing.unitCost*need:0;const tier=noteTier(id);return(
              <div key={id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 11px",marginBottom:"4px",borderRadius:"10px",background:ok?"rgba(80,160,80,0.08)":"rgba(200,60,60,0.08)",border:`1px solid ${ok?"rgba(80,160,80,0.25)":"rgba(200,60,60,0.25)"}`}}>
                <div><div style={{fontSize:"0.82rem",fontWeight:"600"}}>{ing?.name||id} <span className={`tag tag-${tier}`} style={{fontSize:"0.58rem",padding:"1px 6px"}}>{NOTE_LABEL[tier]}</span></div><div style={{fontSize:"0.62rem",color:"#c8a46a"}}>{ing?.brand} • {c.toFixed(2)}ر</div></div>
                <div style={{textAlign:"left"}}><div style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.85rem"}}>{need.toFixed(2)} {ing?.unit}</div><div style={{fontSize:"0.6rem",color:ok?"#80c080":"#e08080"}}>متوفر: {ing?.stock||0}</div></div>
              </div>);})}

          <div className="glass" style={{background:"rgba(214,175,55,0.04)"}}>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"10px"}}>👑 أسرار الشيوخ</h3>
            {[["تعتيق 5 سنوات+","الزمن يصنع ما لا يصنعه المال"],["الطبخ على الفحم","حرارة بطيئة تولّد أعمق الروائح"],["الوعاء الفخاري","يتنفس ببطء ويخرج الماء تدريجياً"],["المزج ليلاً","الليل يثبّت الجزيئات"]].map(([s,t],i)=>(<div key={i} style={{background:"rgba(214,175,55,0.06)",borderRadius:"9px",padding:"9px 11px",marginBottom:"7px",borderRight:"3px solid rgba(214,175,55,0.4)"}}><div style={{color:"#D4AF37",fontSize:"0.78rem",fontWeight:"700"}}>✦ {s}</div><div style={{color:"#c8a060",fontSize:"0.72rem"}}>{t}</div></div>))}
          </div>
        </div>}

      </div>

      {/* ── QR share modal ── */}
      {qrRecipe&&<QRModal recipe={qrRecipe} getIng={getIng} onClose={()=>setQrRecipe(null)}/>}

      {/* ── AI recipe generation modal ── */}
      {showAIGen&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowAIGen(false);}}>
        <div className="modal-sheet">
          <h3 style={{color:"#80a0e0",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>🤖 وصفة بـ Claude AI</h3>
          {aiLoading&&<div style={{textAlign:"center",padding:"30px",color:"#80a0e0"}}>
            <div style={{fontSize:"2.5rem",animation:"pulseGlow 1.5s ease-in-out infinite"}}>🤖</div>
            <p style={{marginTop:"12px",fontSize:"0.85rem"}}>Claude يصمّم الوصفة...</p>
          </div>}
          {!aiLoading&&!aiGenResult&&aiGenRaw&&<div style={{padding:"10px",background:"rgba(200,60,60,0.1)",borderRadius:"10px",fontSize:"0.72rem",color:"#e08080",marginBottom:"12px",wordBreak:"break-word"}}>⚠️ رد غير متوقع: {aiGenRaw.slice(0,300)}</div>}
          {!aiLoading&&aiGenResult&&<div>
            <div className="glass" style={{textAlign:"center",background:"rgba(80,120,200,0.08)",padding:"16px",marginBottom:"12px"}}>
              <span style={{fontSize:"2rem"}}>{aiGenResult.icon}</span>
              <h2 style={{color:"#D4AF37",fontSize:"1.05rem",fontWeight:"700",margin:"6px 0"}}>{aiGenResult.name}</h2>
              <p style={{fontSize:"0.78rem",color:"#e5d5be"}}>{aiGenResult.desc}</p>
              <div style={{display:"flex",gap:"5px",justifyContent:"center",marginTop:"8px",flexWrap:"wrap"}}>
                <span className="tag tag-gold">🗓️ {aiGenResult.season}</span>
                <span className="tag tag-gold">👤 {aiGenResult.gender}</span>
                <span className="tag tag-gold">⏱ {aiGenResult.stability}</span>
              </div>
            </div>
            <h4 style={{color:"#D4AF37",fontSize:"0.82rem",marginBottom:"7px"}}>المكونات</h4>
            {(aiGenResult.ing||[]).map(([id,a],i)=>{const ing=getIng(id);return(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 10px",background:ing?"rgba(255,255,255,0.04)":"rgba(200,60,60,0.08)",borderRadius:"8px",marginBottom:"3px"}}>
                <span style={{fontSize:"0.78rem",color:ing?"#fff":"#e08080"}}>{ing?ing.name:id} {!ing&&<span style={{fontSize:"0.65rem"}}>⚠️ غير موجود</span>}</span>
                <span style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.78rem"}}>{a} مل</span>
              </div>
            );})}
            <button className="btn-gold" style={{width:"100%",marginTop:"14px"}} onClick={()=>{
              setRecipes(p=>[...p,{...aiGenResult,steps:aiGenResult.steps||["امزج من الأثقل للأخف","اتركه 7 أيام"]}]);
              setShowAIGen(false);show("✅ أُضيفت الوصفة من Claude AI");
            }}>💾 أضف الوصفة للمعمل</button>
          </div>}
          <button className="btn-ghost" style={{width:"100%",marginTop:"8px"}} onClick={()=>setShowAIGen(false)}>إغلاق</button>
        </div>
      </div>}

      {/* ── AI analysis modal ── */}
      {showAIAnalysis&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowAIAnalysis(false);}}>
        <div className="modal-sheet">
          <h3 style={{color:"#80a0e0",fontSize:"1rem",fontWeight:"700",marginBottom:"6px"}}>🤖 تحليل Claude AI</h3>
          {aiAnalysisRecipe&&<p style={{fontSize:"0.74rem",color:"#c8a46a",marginBottom:"14px"}}>{aiAnalysisRecipe.icon} {aiAnalysisRecipe.name}</p>}
          {aiLoading&&<div style={{textAlign:"center",padding:"30px",color:"#80a0e0"}}>
            <div style={{fontSize:"2.5rem",animation:"pulseGlow 1.5s ease-in-out infinite"}}>🤖</div>
            <p style={{marginTop:"12px",fontSize:"0.85rem"}}>Claude يحلّل الوصفة...</p>
          </div>}
          {!aiLoading&&<div style={{background:"rgba(0,0,0,0.3)",borderRadius:"12px",padding:"14px",fontSize:"0.8rem",lineHeight:"1.9",color:"#e5d5be",whiteSpace:"pre-wrap"}}>{aiAnalysisText}</div>}
          <button className="btn-ghost" style={{width:"100%",marginTop:"14px"}} onClick={()=>setShowAIAnalysis(false)}>إغلاق</button>
        </div>
      </div>}

      {showRating&&<div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")setShowRating(false);}}>
        <div className="modal-sheet" style={{textAlign:"center"}}>
          <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"6px"}}>⭐ تقييم الوصفة</h3>
          <p style={{fontSize:"0.74rem",color:"#c8a46a",marginBottom:"14px"}}>{recipes.find(r=>r.id===ratingRecId)?.name}</p>
          <div style={{display:"flex",justifyContent:"center",gap:"2px",marginBottom:"16px"}}>
            {[1,2,3,4,5].map(s=>(
              <button key={s} className="star-btn" onClick={()=>setRatingStars(s)}
                style={{color:s<=ratingStars?"#D4AF37":"rgba(214,175,55,0.25)",filter:s<=ratingStars?"drop-shadow(0 0 5px #D4AF37)":"none"}}>★</button>
            ))}
          </div>
          <textarea className="inp" placeholder="ملاحظات التذوق: رائحة الفتح، القلب، العقبة..." value={ratingNote} onChange={e=>setRatingNote(e.target.value)} rows={3} style={{textAlign:"right",resize:"none",marginBottom:"12px"}}/>
          <div style={{display:"flex",gap:"8px"}}>
            <button className="btn-gold" style={{flex:1}} onClick={saveRating}>💾 حفظ التقييم</button>
            <button className="btn-ghost" onClick={()=>setShowRating(false)}>إلغاء</button>
          </div>
        </div>
      </div>}

      <div className="bottom-nav">
        {[
          {id:"inventory",icon:"🏺",label:"المخزون"},
          {id:"recipes",icon:"📋",label:"الوصفات"},
          {id:"customers",icon:"👥",label:"العملاء"},
          {id:"stats",icon:"📊",label:"الإحصائيات"},
          {id:"heritage",icon:"👑",label:"التراث"},
        ].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setSelectedRecipe(null);setShowAddIng(false);setShowAddRec(false);setShowCompare(false);setShowMixer(false);setSelectedCustomer(null);setShowAddCust(false);setShowShopList(false);setShowSupplierCmp(false);setShowExpiryCalendar(false);setShowRating(false);setShowAIGen(false);setShowAIAnalysis(false);}} className={`nav-btn ${tab===t.id?"active":""}`}>
            <span className="nav-icon">{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

function QRModal({recipe,getIng,onClose}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    const ingTxt=recipe.ing.map(([id,a])=>{const ing=getIng(id);return `${ing?.name||id}: ${a}`;}).join(" | ");
    const txt=`ضاوي دهن العود\n${recipe.name} ${recipe.icon}\n${recipe.desc}\n\nالمكونات: ${ingTxt}`;
    if(window.QRCode){
      new window.QRCode(ref.current,{text:txt,width:200,height:200,colorDark:"#1a0800",colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.M});
    }else{
      ref.current.innerHTML='<div style="color:#e08080;font-size:0.8rem;padding:20px;">تعذّر تحميل مكتبة QR — تحقق من الاتصال</div>';
    }
  },[recipe]);
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")onClose();}}>
      <div className="modal-sheet" style={{textAlign:"center"}}>
        <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"6px"}}>📲 مشاركة الوصفة</h3>
        <p style={{fontSize:"0.74rem",color:"#c8a46a",marginBottom:"14px"}}>{recipe.icon} {recipe.name} — امسح الرمز لعرض الوصفة</p>
        <div ref={ref} style={{display:"inline-block",padding:"12px",background:"#fff",borderRadius:"14px"}}/>
        <button className="btn-ghost" style={{width:"100%",marginTop:"16px"}} onClick={onClose}>إغلاق</button>
      </div>
    </div>
  );
}

function SellEntry({id,onSell}){
  const [price,setPrice]=useState("");
  return(
    <div style={{display:"flex",gap:"6px",alignItems:"center",marginTop:"6px"}}>
      <input type="number" placeholder="سعر البيع (ريال)" value={price} onChange={e=>setPrice(e.target.value)}
        style={{flex:1,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(214,175,55,0.4)",borderRadius:"8px",color:"#fff",fontSize:"0.75rem",padding:"5px 8px",outline:"none",fontFamily:"'Alexandria',sans-serif"}}/>
      <button onClick={()=>{if(price)onSell(id,+price);}} style={{background:"rgba(80,160,80,0.2)",border:"1px solid rgba(80,160,80,0.4)",color:"#80c080",borderRadius:"8px",padding:"5px 10px",fontSize:"0.72rem",cursor:"pointer",fontWeight:"600",whiteSpace:"nowrap"}}>✓ بيع</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
