  const calculateRecipeCost=(recipe, size)=>{
    let totalCost = 0;
    let baseTotalMl = recipe.ingredients.reduce((sum, ing)=>sum+ing.a, 0);
    let currentScale = size / baseTotalMl;

    recipe.ingredients.forEach(ri=>{
      const ing = getIng(ri.id);
      if(ing){
        totalCost += (ri.a * currentScale) * ing.costPerUnit;
      }
    });
    return totalCost;
  };

  if(!isLoggedIn) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"90vh",padding:"20px"}}>
      <div class="glass" style={{maxWidth:"380px",width:"100%",textAlign:"center",border:"2px solid #D4AF37",padding:"40px 24px"}}>
        <h2 style={{color:"#D4AF37",fontSize:"1.6rem",fontWeight:"700",marginBottom:"20px"}}>مختبر ضاوي الدهن</h2>
        <input type="password" placeholder="أدخل رمز الدخول" value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter" && pin==="2026") setIsLoggedIn(true)}}
          style={{background:"rgba(0,0,0,0.5)",border:"1.5px solid rgba(214,175,55,0.5)",borderRadius:"12px",padding:"16px",color:"#fff",textAlign:"center",fontSize:"1.2rem",outline:"none",width:"100%",marginBottom:"14px"}}/>
        <button class="btn-gold" style={{width:"100%"}} onClick={()=>{if(pin==="2026") setIsLoggedIn(true); else alert("الرمز خاطئ")}}>دخول للمعمل</button>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:"100px"}}>
      {toast&&<div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:"#D4AF37",color:"#1a0800",padding:"12px 24px",borderRadius:"30px",fontSize:"0.88rem",fontWeight:"700",zIndex:999999}}>{toast}</div>}

      <div style={{textAlign:"center",padding:"24px 12px 10px"}}>
        <h1 style={{fontSize:"1.8rem",color:"#D4AF37",fontWeight:"700"}}>ضاوي الدهن</h1>
        <p style={{fontSize:"0.75rem",color:"#c8a46a",letterSpacing:"2px"}}>مخزون وخلطات النيش الفاخرة</p>
      </div>

      <div style={{padding:"0 14px",maxWidth:"480px",margin:"0 auto"}}>
        
        {/* التبويب الأول: المخزن */}
        {tab==="inventory"&&<div class="fade">
          <input class="inp" placeholder="🔍 ابحث في الخامات..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:"12px"}}/>
          {ingredients.filter(i=>i.name.toLowerCase().includes(search.toLowerCase())).map(ing=>(
            <div key={ing.id} class="glass" style={{padding:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontWeight:"700"}}>{ing.name}</div>
                  <div style={{fontSize:"0.75rem",color:"#c8a46a"}}>{ing.brand} • {ing.cat}</div>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{color:"#D4AF37",fontWeight:"700"}}>{ing.stock} {ing.unit}</div>
                  <div style={{fontSize:"0.65rem",color:"#80c080"}}>تكلفة المِل/جم: {ing.costPerUnit.toFixed(2)} ريال</div>
                </div>
              </div>
            </div>
          ))}
        </div>}

        {/* التبويب الثاني: الوصفات */}
        {tab==="recipes"&&!selectedRecipe&&<div class="fade">
          {recipes.map(r=>{
            const cost = calculateRecipeCost(r, 50);
            return (
              <div key={r.id} onClick={()=>setSelectedRecipe(r)} class="glass" style={{cursor:"pointer",padding:"16px",borderRight:"4px solid #D4AF37"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontWeight:"700",fontSize:"1rem"}}>{r.name} {r.icon}</span>
                  <span class="tag tag-gold">{r.stability}</span>
                </div>
                <p style={{fontSize:"0.8rem",color:"#e5d5be",margin:"8px 0"}}>{r.desc}</p>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"0.75rem",color:"#80c080",background:"rgba(0,0,0,0.2)",padding:"6px 12px",borderRadius:"8px"}}>
                  <span>تكلفة إنتاج 50 مل خِام:</span>
                  <span style={{fontWeight:"700",color:"#fff"}}>{cost.toFixed(2)} ريال</span>
                </div>
              </div>
            )
          })}
        </div>}

        {/* تفاصيل الوصفة المفتوحة وحاسبة التكلفة الذكية */}
        {tab==="recipes"&&selectedRecipe&&<div class="fade">
          <button class="btn-ghost" onClick={()=>setSelectedRecipe(null)} style={{marginBottom:"12px"}}>← العودة للوصفات</button>
          
          <div class="glass" style={{background:"rgba(214,175,55,0.06)",textAlign:"center"}}>
            <h2>{selectedRecipe.name}</h2>
            <p style={{fontSize:"0.85rem",color:"#c8a46a",marginTop:"6px"}}>{selectedRecipe.desc}</p>
          </div>

          <div class="glass">
            <h3 style={{color:"#D4AF37",fontSize:"0.9rem",marginBottom:"10px"}}>📏 تخصيص حجم الإنتاج وحساب الأرباح</h3>
            <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
              {[30,50,100].map(size=>(
                <button key={size} onClick={()=>setBatchSize(size)} style={{flex:1,background:batchSize===size?"#D4AF37":"rgba(255,255,255,0.05)",color:batchSize===size?"#1a0800":"#fff",padding:"8px",borderRadius:"8px",border:"none",fontWeight:"700"}}>{size} مل</button>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
              <div>
                <label style={{fontSize:"0.7rem",color:"#c8a46a"}}>تكلفة العبوة والتغليف (ريال):</label>
                <input type="number" class="inp" value={packagingCost} onChange={e=>setPackagingCost(Number(e.target.value))} style={{padding:"8px",marginTop:"4px"}}/>
              </div>
              <div>
                <label style={{fontSize:"0.7er",color:"#c8a46a"}}>هامش الربح المستهدف (%):</label>
                <input type="number" class="inp" value={targetProfit} onChange={e=>setTargetProfit(Number(e.target.value))} style={{padding:"8px",marginTop:"4px"}}/>
              </div>
            </div>

            {/* مخرجات حاسبة التكلفة الفورية */}
            {(() => {
              const liquidCost = calculateRecipeCost(selectedRecipe, batchSize);
              const totalCost = liquidCost + packagingCost;
              const recommendedPrice = totalCost * (1 + targetProfit/100);
              return (
                <div style={{background:"rgba(0,0,0,0.4)",padding:"12px",borderRadius:"10px",border:"1px dashed #D4AF37",marginTop:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.85rem",marginBottom:"4px"}}>
                    <span>تكلفة الزيت العطري لـ ({batchSize} مل):</span>
                    <span style={{color:"#fff"}}>{liquidCost.toFixed(2)} ريال</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.85rem",marginBottom:"4px"}}>
                    <span>إجمالي تكلفة العبوة الجاهزة:</span>
                    <span style={{color:"#e08080",fontWeight:"700"}}>{totalCost.toFixed(2)} ريال</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.95rem",borderTop:"1px solid rgba(214,175,55,0.2)",paddingTop:"6px",marginTop:"6px"}}>
                    <span style={{color:"#D4AF37",fontWeight:"700"}}>سعر البيع المقترح لربح {targetProfit}%:</span>
                    <span style={{color:"#80c080",fontWeight:"700"}}>{recommendedPrice.toFixed(0)} ريال</span>
                  </div>
                </div>
              );
            })()}
          </div>

          <h3 style={{color:"#D4AF37",fontSize:"0.9rem",marginBottom:"8px"}}>🏺 المقادير المطلوبة بالضبط لهذه الدفعة:</h3>
          {(() => {
            let baseTotalMl = selectedRecipe.ingredients.reduce((sum, ing)=>sum+ing.a, 0);
            let currentScale = batchSize / baseTotalMl;
            return selectedRecipe.ingredients.map(ri=>{
              const ing = getIng(ri.id);
              const exactWeight = (ri.a * currentScale).toFixed(2);
              return (
                <div key={ri.id} style={{display:"flex",justifyContent:"space-between",padding:"8px",background:"rgba(255,255,255,0.03)",marginBottom:"4px",borderRadius:"8px"}}>
                  <span>{ing?.name}</span>
                  <span style={{color:"#D4AF37",fontWeight:"700"}}>{exactWeight} {ing?.unit||"مل"}</span>
                </div>
              );
            });
          })()}
        </div>}

        {/* تبويب المختبر الرقمي الفوري */}
        {tab==="lab"&&<div class="fade" style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:"3rem"}}>🧪</div>
          <h3 style={{color:"#D4AF37",marginTop:"10px"}}>المختبر الرقمي الحر</h3>
          <p style={{fontSize:"0.85rem",color:"#c8a46a",marginTop:"6px"}}>اضغط على خيار الوصفات للوصول الفوري للتركيبات والحسابات التلقائية المحدثة بالمل والسعر.</p>
        </div>}

      </div>

      <div class="bottom-nav">
        <button onClick={()=>{setTab("inventory");setSelectedRecipe(null);}} class={`nav-btn ${tab==="inventory"?"active":""}`}><span class="nav-icon">🏺</span>المخزن</button>
        <button onClick={()=>{setTab("recipes");setSelectedRecipe(null);}} class={`nav-btn ${tab==="recipes"?"active":""}`}><span class="nav-icon">📋</span>الوصفات</button>
        <button onClick={()=>{setTab("lab");setSelectedRecipe(null);}} class={`nav-btn ${tab==="lab"?"active":""}`}><span class="nav-icon">🧪</span>المختبر</button>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
