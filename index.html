<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>نظام ضاوي الدهن المتكامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    
    <style>
        body { background: #120500; color: #fff8f0; font-family: sans-serif; margin: 0; padding-bottom: 120px; font-size: 18px; }
        .glass-card { background: rgba(45, 25, 15, 0.8); border: 1px solid #D4AF37; border-radius: 16px; padding: 18px; margin: 12px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #200a00; padding: 15px 0; border-top: 2px solid #D4AF37; z-index: 1000; }
        button { color: #D4AF37; background: #2d190f; border: 1px solid #D4AF37; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        h1 { color: #D4AF37; text-align: center; padding: 20px; }
        .login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        input { background: #2d190f; color: white; border: 1px solid #D4AF37; padding: 15px; border-radius: 8px; width: 80%; text-align: center; margin-bottom: 10px; }
        .stock-ctrl { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState } = React;

    const App = () => {
        const [auth, setAuth] = useState(false);
        const [pin, setPin] = useState('');
        const [tab, setTab] = useState('inventory');
        
        const [inventory, setInventory] = useState([
            {id: 1, name: "عنبر 2000", stock: 50}, {id: 2, name: "مسك متسلق", stock: 80},
            {id: 3, name: "ورد إسطنبولي", stock: 60}, {id: 4, name: "صندل تراثي", stock: 80},
            {id: 5, name: "فانيلا دانتيل", stock: 70}, {id: 6, name: "عود ملكي", stock: 35},
            {id: 7, name: "مسك الرمان", stock: 40}, {id: 8, name: "ورد طائفي", stock: 75},
            {id: 9, name: "باتشولي", stock: 70}, {id: 10, name: "عنبر 700", stock: 50},
            {id: 11, name: "عود كمبودي فواح", stock: 70}, {id: 12, name: "عود كمبودي لوكسر", stock: 75},
            {id: 13, name: "عود هندي سويتي", stock: 80}, {id: 14, name: "دهن العود xx", stock: 300},
            {id: 15, name: "عود ترابي", stock: 70}, {id: 16, name: "شمامة العنبر", stock: 30},
            {id: 17, name: "ISO E Super", stock: 1000}, {id: 18, name: "Sandalwood INDI", stock: 500},
            {id: 19, name: "Cashmeran", stock: 500}, {id: 20, name: "PEA", stock: 1000},
            {id: 21, name: "WHITE OUDH", stock: 25}, {id: 22, name: "CMP 91", stock: 200},
            {id: 23, name: "Ambermor", stock: 250}, {id: 24, name: "Luxodor Fixative", stock: 100},
            {id: 25, name: "Symphony", stock: 100}, {id: 26, name: "Afternoon Swim", stock: 100},
            {id: 27, name: "Oud for Greatness", stock: 100}, {id: 28, name: "إضافي 1", stock: 50}, {id: 29, name: "إضافي 2", stock: 50}
        ]);

        const recipes = [
            {name: "عود المحيط الأزرق", desc: "عود فواح مع نوتات بحرية"},
            {name: "حرير الطائف", desc: "ورد طائفي مع مسك الرمان"},
            {name: "سمفونية الدهن", desc: "عود هندي مع صندل وسمفوني"},
            {name: "سهم العود الهيب", desc: "عود جريتنس مع عود هندي"},
            {name: "بريق العنبر", desc: "عنبر 2000 مع مسك متسلق"},
            {name: "نسيم العود الأبيض", desc: "عود أبيض مع صندل ومسك"}
        ];

        const updateStock = (id, delta) => {
            setInventory(prev => prev.map(i => i.id === id ? {...i, stock: Math.max(0, i.stock + delta)} : i));
        };

        if (!auth) return (
            <div className="login-box">
                <h1>معمل ضاوي الدهن</h1>
                <input type="password" placeholder="أدخل رمز الدخول (2026)" onChange={(e) => setPin(e.target.value)} />
                <button onClick={() => pin === '2026' ? setAuth(true) : alert('رمز خاطئ')}>دخول إلى المعمل</button>
            </div>
        );

        return (
            <div>
                <h1>ضاوي الدهن</h1>
                {tab === 'inventory' && inventory.map(i => (
                    <div key={i.id} className="glass-card">
                        <h3>{i.name}</h3>
                        <p>المخزون الحالي: {i.stock} مل/جم</p>
                        <div className="stock-ctrl">
                            <button onClick={() => updateStock(i.id, -5)}>-</button>
                            <button onClick={() => updateStock(i.id, 5)}>+</button>
                        </div>
                    </div>
                ))}
                
                {tab === 'recipes' && recipes.map((r, idx) => (
                    <div key={idx} className="glass-card">
                        <h3>{r.name}</h3>
                        <p>{r.desc}</p>
                    </div>
                ))}

                {tab === 'lab' && (
                    <div className="glass-card">
                        <h3>المختبر الرقمي</h3>
                        <p>نظام التوليف جاهز للعمل...</p>
                    </div>
                )}
                
                <div className="nav-bar">
                    <button onClick={() => setTab('inventory')}>📦 المخزون</button>
                    <button onClick={() => setTab('recipes')}>📋 الوصفات</button>
                    <button onClick={() => setTab('lab')}>🧪 المختبر</button>
                </div>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
