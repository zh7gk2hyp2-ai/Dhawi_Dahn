const bulkTotalQty=RAW.filter(r=>r[2]==="Bulkaroma").reduce((s,r)=>s+r[5],0);

function buildInv(){
  return RAW.map(([id,name,brand,cat,price,qty,unit])=>{
    const ship=brand==="Bulkaroma"?(SHIPPING_BULK*qty/bulkTotalQty):0;
    const unitCost=qty>0?(price+ship)/qty:0;
    return {id,name,brand,cat,price,qty,unit,stock:qty,ship,unitCost};
  });
}

function App(){
  const [logged,setLogged]=useState(false);
  const [pin,setPin]=useState("");
  const [tab,setTab]=useState("inventory");
  const [inv,setInv]=useState(buildInv());
  const [recipes,setRecipes]=useState(INITIAL_RECIPES);
  const [search,setSearch]=useState("");
  const [catFilter,setCatFilter]=useState("الكل");
  const [toast,setToast]=useState("");
  const [toastErr,setToastErr]=useState(false);
  const [selectedRecipe,setSelectedRecipe]=useState(null);
  const [batchUnit,setBatchUnit]=useState("tola");
  const [profitMult,setProfitMult]=useState(3);
  const [showAddIng,setShowAddIng]=useState(false);
  const [showAddRec,setShowAddRec]=useState(false);
  const [editCostId,setEditCostId]=useState(null);

  // add ingredient
  const [niName,setNiName]=useState("");const [niBrand,setNiBrand]=useState("");const [niCat,setNiCat]=useState("عود");
  const [niPrice,setNiPrice]=useState(100);const [niQty,setNiQty]=useState(100);const [niUnit,setNiUnit]=useState("مل");
  // add recipe
  const [nrName,setNrName]=useState("");const [nrDesc,setNrDesc]=useState("");const [nrSeason,setNrSeason]=useState("صيف");
  const [nrGender,setNrGender]=useState("للجنسين");const [nrIngId,setNrIngId]=useState(RAW[0][0]);const [nrAmt,setNrAmt]=useState(3);const [nrIngs,setNrIngs]=useState([]);

  const show=(m,e=false)=>{setToast(m);setToastErr(e);setTimeout(()=>setToast(""),2800);};
  const getIng=id=>inv.find(i=>i.id===id);
  const BATCH={quarter:2.9,half:5.8,tola:11.6,ml50:50,ml100:100};
  const BATCH_NAME={quarter:"ربع تولة",half:"نص تولة",tola:"تولة",ml50:"50 مل",ml100:"100 مل"};

  const recipeBaseVol=r=>r.ing.reduce((s,[,a])=>s+a,0);
  const recipeScale=r=>BATCH[batchUnit]/recipeBaseVol(r);
  const recipeCost=r=>{const sc=recipeScale(r);return r.ing.reduce((s,[id,a])=>{const ing=getIng(id);return s+(ing?ing.unitCost*a*sc:0);},0);};
  const canMake=r=>{const sc=recipeScale(r);return r.ing.every(([id,a])=>{const ing=getIng(id);return ing&&ing.stock>=a*sc;});};

  const produce=r=>{
    if(!canMake(r))return;
    const sc=recipeScale(r);
    setInv(p=>p.map(i=>{const ri=r.ing.find(x=>x[0]===i.id);return ri?{...i,stock:Math.max(0,+(i.stock-ri[1]*sc).toFixed(2))}:i;}));
    show("🏭 أُنتجت "+BATCH_NAME[batchUnit]+" من "+r.name);
  };

  const updateStock=(id,d)=>setInv(p=>p.map(i=>i.id===id?{...i,stock:Math.max(0,+(i.stock+d).toFixed(1))}:i));
  const setStock=(id,v)=>setInv(p=>p.map(i=>i.id===id?{...i,stock:Math.max(0,v)}:i));
  const setPrice=(id,v)=>setInv(p=>p.map(i=>{if(i.id!==id)return i;const ship=i.brand==="Bulkaroma"?(SHIPPING_BULK*i.qty/bulkTotalQty):0;return {...i,price:v,unitCost:i.qty>0?(v+ship)/i.qty:0};}));

  const addIng=()=>{
    if(!niName){show("⚠️ أدخل الاسم",true);return;}
    const ship=niBrand==="Bulkaroma"?(SHIPPING_BULK*niQty/bulkTotalQty):0;
    const id="c_"+Date.now();
    setInv(p=>[{id,name:niName,brand:niBrand||"محلي",cat:niCat,price:niPrice,qty:niQty,unit:niUnit,stock:niQty,ship,unitCost:niQty>0?(niPrice+ship)/niQty:0},...p]);
    setNiName("");setNiBrand("");setShowAddIng(false);show("🏺 أُضيفت "+niName);
  };

  const addRec=()=>{
    if(!nrName||nrIngs.length===0){show("⚠️ أكمل البيانات",true);return;}
    const ic={"صيف":"☀️","شتاء":"❄️","ربيع":"🌸","خريف":"🍂","مناسبات":"👑"};
    setRecipes(p=>[...p,{id:"r_"+Date.now(),name:nrName,icon:ic[nrSeason]||"✨",season:nrSeason,gender:nrGender,stability:"—",desc:nrDesc||"وصفة مخصصة",ing:nrIngs.map(i=>[i.id,i.amount]),steps:["امزج من الأثقل للأخف","اتركه 7 أيام"]}]);
    setNrName("");setNrDesc("");setNrIngs([]);setShowAddRec(false);show("✅ أُضيفت الوصفة");
  };

  const CATS=["الكل","عود","مثبت","مسك","صندل","زهري","عنبر","سويتي","قاعدة","حامل","مضخم","خلطة","مستوحى"];
  const fInv=(catFilter==="الكل"?inv:inv.filter(i=>i.cat===catFilter)).filter(i=>i.name.toLowerCase().includes(search.toLowerCase())||i.brand.toLowerCase().includes(search.toLowerCase()));
  const totalInvValue=inv.reduce((s,i)=>s+(i.price+i.ship),0);

  if(!logged) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"90vh",padding:"20px"}} className="fade">
      <div className="glass" style={{maxWidth:"360px",width:"100%",textAlign:"center",border:"2px solid #D4AF37",padding:"36px 22px"}}>
        <Logo size={76}/>
        <h2 style={{color:"#D4AF37",fontSize:"1.5rem",fontWeight:"700",margin:"12px 0 6px"}}>ضاوي الدهن</h2>
        <p style={{color:"#c8a46a",fontSize:"0.8rem",marginBottom:"22px"}}>أدخل رمزك الخاص</p>
        <input type="password" inputMode="numeric" placeholder="••••" value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){if(pin==="2026")setLogged(true);else show("❌ رمز خاطئ",true);}}}
          style={{background:"rgba(0,0,0,0.5)",border:"1.5px solid rgba(214,175,55,0.5)",borderRadius:"12px",padding:"15px",color:"#fff",textAlign:"center",fontSize:"1.5rem",letterSpacing:"10px",outline:"none",width:"100%",marginBottom:"14px"}}/>
        <button className="btn-gold" style={{width:"100%"}} onClick={()=>{if(pin==="2026")setLogged(true);else show("❌ رمز خاطئ",true);}}>دخول للمعمل ←</button>
      </div>
      {toast&&<div className="fade" style={{position:"fixed",bottom:"40px",background:toastErr?"#8B1a1a":"#D4AF37",color:toastErr?"#fff":"#1a0800",padding:"12px 24px",borderRadius:"30px",fontWeight:"700"}}>{toast}</div>}
    </div>
  );

  return(
    <div style={{paddingBottom:"92px"}}>
      {toast&&<div className="fade" style={{position:"fixed",bottom:"100px",left:"50%",transform:"translateX(-50%)",background:toastErr?"#8B1a1a":"#D4AF37",color:toastErr?"#fff":"#1a0800",padding:"12px 22px",borderRadius:"30px",fontSize:"0.85rem",fontWeight:"700",zIndex:99999,whiteSpace:"nowrap"}}>{toast}</div>}

      <div style={{textAlign:"center",padding:"20px 12px 8px"}}>
        <Logo size={48}/>
        <h1 style={{fontSize:"1.5rem",color:"#D4AF37",fontWeight:"700",marginTop:"4px"}}>ضاوي الدهن</h1>
        <p style={{fontSize:"0.62rem",color:"#c8a46a",letterSpacing:"4px"}}>DHAWI DAHN LAB</p>
      </div>

      <div style={{padding:"0 14px",maxWidth:"480px",margin:"0 auto"}}>

        {/* ===== INVENTORY ===== */}
        {tab==="inventory"&&!showAddIng&&<div className="fade">
          <div className="glass" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:"rgba(214,175,55,0.08)"}}>
            <div><div style={{fontSize:"0.7rem",color:"#c8a46a"}}>قيمة المخزون الكلية</div><div style={{fontSize:"1.2rem",fontWeight:"700",color:"#D4AF37"}}>{totalInvValue.toFixed(0)} ريال</div></div>
            <button className="btn-ghost" onClick={()=>setShowAddIng(true)}>+ خامة</button>
          </div>
          <input className="inp" placeholder="🔍 ابحث..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:"10px"}}/>
          <div style={{display:"flex",gap:"5px",overflowX:"auto",marginBottom:"12px",paddingBottom:"4px"}}>
            {CATS.map(c=>(<button key={c} onClick={()=>setCatFilter(c)} style={{background:catFilter===c?"#D4AF37":"rgba(255,255,255,0.06)",border:"1px solid rgba(214,175,55,0.4)",color:catFilter===c?"#1a0800":"#D4AF37",padding:"5px 13px",borderRadius:"20px",fontSize:"0.72rem",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap"}}>{c}</button>))}
          </div>
          {fInv.map(ing=>(
            <div key={ing.id} className="glass" style={{padding:"12px 14px",marginBottom:"7px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.9rem",fontWeight:"700",color:"#fff8f0"}}>{ing.name}</div>
                  <div style={{fontSize:"0.68rem",color:"#c8a46a"}}>{ing.brand} • {ing.cat}{ing.brand==="Bulkaroma"&&ing.ship>0&&<span style={{color:"#80c080"}}> • شحن {ing.ship.toFixed(1)}ر</span>}</div>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.88rem"}}>{ing.stock} {ing.unit}</div>
                  <div onClick={()=>setEditCostId(editCostId===ing.id?null:ing.id)} style={{fontSize:"0.66rem",color:"#80c080",cursor:"pointer",textDecoration:"underline"}}>تكلفة {ing.unit}: {ing.unitCost.toFixed(2)}ر</div>
                </div>
              </div>
              {editCostId===ing.id&&<div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"7px",padding:"8px",background:"rgba(0,0,0,0.3)",borderRadius:"8px"}}>
                <span style={{fontSize:"0.7rem",color:"#c8a46a"}}>السعر الكلي:</span>
                <input type="number" value={ing.price} onChange={e=>setPrice(ing.id,+e.target.value)} style={{width:"70px",textAlign:"center",background:"rgba(0,0,0,0.4)",border:"1px solid #D4AF37",borderRadius:"6px",color:"#fff",fontSize:"0.8rem",padding:"4px"}}/>
                <span style={{fontSize:"0.7rem",color:"#c8a46a"}}>ريال / {ing.qty}{ing.unit}</span>
              </div>}
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:"4px",height:"4px"}}><div style={{height:"100%",borderRadius:"4px",width:`${Math.min(100,(ing.stock/Math.max(ing.qty,1))*100)}%`,background:ing.stock>ing.qty*0.5?"#5a9a20":ing.stock>ing.qty*0.2?"#D4AF37":"#c04040"}}/></div>
                <button onClick={()=>updateStock(ing.id,-5)} style={{background:"rgba(200,60,60,0.15)",border:"1px solid rgba(200,60,60,0.3)",color:"#e08080",width:"26px",height:"26px",borderRadius:"50%",cursor:"pointer",fontSize:"0.95rem"}}>−</button>
                <input type="number" value={ing.stock} onChange={e=>setStock(ing.id,+e.target.value)} style={{width:"48px",textAlign:"center",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(214,175,55,0.4)",borderRadius:"7px",color:"#fff",fontSize:"0.8rem",padding:"3px"}}/>
                <button onClick={()=>updateStock(ing.id,5)} style={{background:"rgba(80,160,80,0.15)",border:"1px solid rgba(80,160,80,0.3)",color:"#80c080",width:"26px",height:"26px",borderRadius:"50%",cursor:"pointer",fontSize:"0.95rem"}}>+</button>
              </div>
            </div>
          ))}
        </div>}

        {tab==="inventory"&&showAddIng&&<div className="fade">
          <button className="btn-ghost" onClick={()=>setShowAddIng(false)} style={{marginBottom:"14px"}}>← رجوع</button>
          <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>🏺 إضافة خامة + سعرها</h3>
          <div style={{display:"grid",gap:"9px"}}>
            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الاسم *</label><input className="inp" value={niName} onChange={e=>setNiName(e.target.value)}/></div>
            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>المورّد</label>
              <select className="inp" value={niBrand} onChange={e=>setNiBrand(e.target.value)} style={{background:"#1a0800"}}><option value="">اختر...</option>{["شرفان","الحميدي","Luxodor","Bulkaroma","محلي","صناعتي"].map(b=><option key={b}>{b}</option>)}</select></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>التصنيف</label><select className="inp" value={niCat} onChange={e=>setNiCat(e.target.value)} style={{background:"#1a0800"}}>{CATS.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الوحدة</label><select className="inp" value={niUnit} onChange={e=>setNiUnit(e.target.value)} style={{background:"#1a0800"}}>{["مل","جم","كجم","لتر"].map(u=><option key={u}>{u}</option>)}</select></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>السعر الكلي (ريال)</label><input type="number" className="inp" value={niPrice} onChange={e=>setNiPrice(+e.target.value)}/></div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الكمية</label><input type="number" className="inp" value={niQty} onChange={e=>setNiQty(+e.target.value)}/></div>
            </div>
            {niName&&niQty>0&&<div className="glass" style={{textAlign:"center",padding:"10px",background:"rgba(214,175,55,0.06)"}}>
              <div style={{color:"#80c080",fontSize:"0.8rem"}}>تكلفة الوحدة المحسوبة: <b style={{color:"#D4AF37"}}>{(((niBrand==="Bulkaroma"?SHIPPING_BULK*niQty/bulkTotalQty:0)+niPrice)/niQty).toFixed(2)} ريال/{niUnit}</b></div>
              {niBrand==="Bulkaroma"&&<div style={{color:"#c8a46a",fontSize:"0.68rem",marginTop:"3px"}}>+ حصة شحن {(SHIPPING_BULK*niQty/bulkTotalQty).toFixed(1)} ريال</div>}
            </div>}
            <button className="btn-gold" onClick={addIng}>💾 حفظ الخامة</button>
          </div>
        </div>}

        {/* ===== RECIPES ===== */}
        {tab==="recipes"&&!selectedRecipe&&!showAddRec&&<div className="fade">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <h2 style={{color:"#D4AF37",fontSize:"1.05rem",fontWeight:"700"}}>الوصفات ({recipes.length})</h2>
            <button className="btn-ghost" onClick={()=>setShowAddRec(true)}>+ وصفة</button>
          </div>
          {recipes.map(r=>(
            <div key={r.id} onClick={()=>setSelectedRecipe(r)} className="glass" style={{cursor:"pointer",borderRight:`4px solid ${canMake(r)?"#D4AF37":"#5a3a10"}`,marginBottom:"9px",padding:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                <span style={{fontSize:"0.98rem",fontWeight:"700",color:"#fff"}}>{r.name}</span>
                <span style={{fontSize:"1.3rem"}}>{r.icon}</span>
              </div>
              <p style={{fontSize:"0.78rem",color:"#e5d5be",marginBottom:"8px"}}>{r.desc}</p>
              <div style={{display:"flex",gap:"5px",flexWrap:"wrap",alignItems:"center"}}>
                <span className="tag tag-gold">⏱ {r.stability}</span>
                <span className="tag" style={{background:"rgba(255,255,255,0.06)",color:"#fff"}}>👤 {r.gender}</span>
                <span className={`tag ${canMake(r)?"tag-green":"tag-red"}`}>{canMake(r)?"✅ جاهز":"⚠️ ناقص"}</span>
                <span className="tag tag-gold" style={{marginRight:"auto"}}>💰 {recipeCost(r).toFixed(0)}ر/{BATCH_NAME[batchUnit]}</span>
              </div>
            </div>
          ))}
        </div>}

        {tab==="recipes"&&showAddRec&&<div className="fade">
          <button className="btn-ghost" onClick={()=>setShowAddRec(false)} style={{marginBottom:"14px"}}>← رجوع</button>
          <h3 style={{color:"#D4AF37",fontSize:"1rem",fontWeight:"700",marginBottom:"14px"}}>✦ وصفة جديدة</h3>
          <div style={{display:"grid",gap:"9px"}}>
            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الاسم *</label><input className="inp" value={nrName} onChange={e=>setNrName(e.target.value)}/></div>
            <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الوصف</label><input className="inp" value={nrDesc} onChange={e=>setNrDesc(e.target.value)}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الموسم</label><select className="inp" value={nrSeason} onChange={e=>setNrSeason(e.target.value)} style={{background:"#1a0800"}}>{["صيف","شتاء","ربيع","خريف","مناسبات"].map(s=><option key={s}>{s}</option>)}</select></div>
              <div><label style={{fontSize:"0.72rem",color:"#c8a46a"}}>الجنس</label><select className="inp" value={nrGender} onChange={e=>setNrGender(e.target.value)} style={{background:"#1a0800"}}>{["للجنسين","رجالي","نسائي"].map(g=><option key={g}>{g}</option>)}</select></div>
            </div>
            <div className="glass" style={{padding:"12px",background:"rgba(0,0,0,0.3)"}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr auto",gap:"6px",marginBottom:"8px"}}>
                <select className="inp" value={nrIngId} onChange={e=>setNrIngId(e.target.value)} style={{background:"#1a0800",fontSize:"0.78rem"}}>{inv.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}</select>
                <input type="number" className="inp" value={nrAmt} onChange={e=>setNrAmt(+e.target.value)} step="0.5" style={{textAlign:"center"}}/>
                <button onClick={()=>{if(nrIngs.find(i=>i.id===nrIngId))setNrIngs(p=>p.map(i=>i.id===nrIngId?{...i,amount:+(i.amount+nrAmt).toFixed(1)}:i));else setNrIngs(p=>[...p,{id:nrIngId,amount:nrAmt}]);}} style={{background:"#D4AF37",border:"none",color:"#1a0800",width:"36px",height:"36px",borderRadius:"50%",cursor:"pointer",fontSize:"1.1rem",fontWeight:"bold",alignSelf:"end"}}>+</button>
              </div>
              {nrIngs.map(ri=>{const ing=getIng(ri.id);return(<div key={ri.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"rgba(255,255,255,0.04)",borderRadius:"7px",marginBottom:"3px"}}><span style={{fontSize:"0.78rem"}}>{ing?.name}</span><div style={{display:"flex",alignItems:"center",gap:"7px"}}><span style={{color:"#D4AF37",fontWeight:"700"}}>{ri.amount}مل</span><button onClick={()=>setNrIngs(p=>p.filter(i=>i.id!==ri.id))} style={{background:"none",border:"none",color:"#e08080",cursor:"pointer"}}>✕</button></div></div>);})}
              {nrIngs.length>0&&<div style={{textAlign:"left",color:"#D4AF37",fontSize:"0.78rem",marginTop:"5px"}}>المجموع: {nrIngs.reduce((s,i)=>s+i.amount,0).toFixed(1)} مل • التكلفة: {nrIngs.reduce((s,i)=>{const ing=getIng(i.id);return s+(ing?ing.unitCost*i.amount:0);},0).toFixed(1)} ريال</div>}
            </div>
            <button className="btn-gold" onClick={addRec}>✦ حفظ الوصفة</button>
          </div>
        </div>}

        {tab==="recipes"&&selectedRecipe&&!showAddRec&&(()=>{
          const r=selectedRecipe;const sc=recipeScale(r);const cost=recipeCost(r);const vol=BATCH[batchUnit];
          const mlCost=cost/vol;const sellMl=mlCost*profitMult;
          return <div className="fade">
            <button className="btn-ghost" onClick={()=>setSelectedRecipe(null)} style={{marginBottom:"12px"}}>← رجوع</button>
            <div className="glass" style={{textAlign:"center",background:"rgba(214,175,55,0.06)",padding:"18px"}}>
              <span style={{fontSize:"1.8rem"}}>{r.icon}</span>
              <h2 style={{color:"#D4AF37",fontSize:"1.1rem",fontWeight:"700",marginTop:"4px"}}>{r.name}</h2>
              <p style={{fontSize:"0.8rem",color:"#e5d5be",marginTop:"4px"}}>{r.desc}</p>
            </div>

            <div className="glass">
              <div style={{color:"#D4AF37",fontSize:"0.78rem",textAlign:"center",marginBottom:"8px"}}>حجم الدفعة</div>
              <div style={{display:"flex",justifyContent:"center",gap:"5px",flexWrap:"wrap"}}>
                {Object.keys(BATCH).map(b=>(<button key={b} onClick={()=>setBatchUnit(b)} style={{background:batchUnit===b?"#D4AF37":"rgba(255,255,255,0.06)",border:`1px solid ${batchUnit===b?"#D4AF37":"rgba(214,175,55,0.3)"}`,color:batchUnit===b?"#1a0800":"#D4AF37",padding:"5px 10px",borderRadius:"20px",cursor:"pointer",fontSize:"0.75rem",fontWeight:"600"}}>{BATCH_NAME[b]}</button>))}
              </div>
            </div>

            {/* COST CALCULATOR */}
            <div className="glass" style={{background:"linear-gradient(135deg,rgba(214,175,55,0.12),rgba(30,12,3,0.8))",border:"1.5px solid #D4AF37"}}>
              <h3 style={{color:"#D4AF37",fontSize:"0.92rem",fontWeight:"700",marginBottom:"10px",textAlign:"center"}}>💰 حاسبة التكلفة الذكية</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#c8a46a"}}>تكلفة الدفعة</div><div style={{fontSize:"1.2rem",fontWeight:"700",color:"#D4AF37"}}>{cost.toFixed(1)} ر</div></div>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#c8a46a"}}>تكلفة المل</div><div style={{fontSize:"1.2rem",fontWeight:"700",color:"#D4AF37"}}>{mlCost.toFixed(2)} ر</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",padding:"8px",background:"rgba(0,0,0,0.25)",borderRadius:"10px"}}>
                <span style={{fontSize:"0.78rem",color:"#c8a46a"}}>هامش الربح:</span>
                <input type="range" min="1.5" max="6" step="0.5" value={profitMult} onChange={e=>setProfitMult(+e.target.value)} style={{flex:1,accentColor:"#D4AF37"}}/>
                <span style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.9rem",minWidth:"34px"}}>×{profitMult}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                <div style={{background:"rgba(80,160,80,0.12)",border:"1px solid rgba(80,160,80,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#80c080"}}>سعر بيع المل</div><div style={{fontSize:"1.15rem",fontWeight:"700",color:"#80c080"}}>{sellMl.toFixed(1)} ر</div></div>
                <div style={{background:"rgba(80,160,80,0.12)",border:"1px solid rgba(80,160,80,0.3)",borderRadius:"10px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"0.65rem",color:"#80c080"}}>سعر بيع الدفعة</div><div style={{fontSize:"1.15rem",fontWeight:"700",color:"#80c080"}}>{(sellMl*vol).toFixed(0)} ر</div></div>
              </div>
              <div style={{marginTop:"8px",textAlign:"center",fontSize:"0.7rem",color:"#c8a46a"}}>الربح الصافي للدفعة: <b style={{color:"#80c080"}}>{(sellMl*vol-cost).toFixed(0)} ريال</b></div>
            </div>

            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"7px"}}>🏺 المكونات ({BATCH_NAME[batchUnit]})</h3>
            {r.ing.map(([id,a])=>{const ing=getIng(id);const need=a*sc;const ok=ing&&ing.stock>=need;const c=ing?ing.unitCost*need:0;return(
              <div key={id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 11px",marginBottom:"4px",borderRadius:"10px",background:ok?"rgba(80,160,80,0.08)":"rgba(200,60,60,0.08)",border:`1px solid ${ok?"rgba(80,160,80,0.25)":"rgba(200,60,60,0.25)"}`}}>
                <div><div style={{fontSize:"0.82rem",fontWeight:"600"}}>{ing?.name||id}</div><div style={{fontSize:"0.62rem",color:"#c8a46a"}}>{ing?.brand} • {c.toFixed(2)}ر</div></div>
                <div style={{textAlign:"left"}}><div style={{color:"#D4AF37",fontWeight:"700",fontSize:"0.85rem"}}>{need.toFixed(2)} {ing?.unit}</div><div style={{fontSize:"0.6rem",color:ok?"#80c080":"#e08080"}}>متوفر: {ing?.stock||0}</div></div>
              </div>);})}
            <div style={{background:"rgba(214,175,55,0.08)",border:"1px solid rgba(214,175,55,0.3)",borderRadius:"10px",padding:"8px",textAlign:"center",color:"#D4AF37",fontSize:"0.85rem",margin:"6px 0 12px",fontWeight:"700"}}>إجمالي الحجم: {vol} مل • التكلفة: {cost.toFixed(1)} ريال</div>

            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"7px"}}>📝 الخطوات</h3>
            {r.steps.map((s,i)=>(<div key={i} style={{display:"flex",gap:"8px",padding:"8px 11px",marginBottom:"4px",borderRadius:"10px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}><div style={{minWidth:"21px",height:"21px",borderRadius:"50%",background:"#D4AF37",color:"#1a0800",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.68rem",fontWeight:"700"}}>{i+1}</div><span style={{fontSize:"0.8rem",color:"#c8a46a"}}>{s}</span></div>))}

            <button onClick={()=>produce(r)} disabled={!canMake(r)} style={{width:"100%",marginTop:"12px",padding:"12px",background:canMake(r)?"linear-gradient(135deg,#2d6a1b,#1a4010)":"rgba(255,255,255,0.05)",border:`1px solid ${canMake(r)?"#5aD420":"rgba(255,255,255,0.1)"}`,color:canMake(r)?"#a0ff60":"#5a3a10",borderRadius:"12px",cursor:canMake(r)?"pointer":"not-allowed",fontSize:"0.95rem",fontWeight:"700"}}>🏭 أنتج وخصم من المخزون</button>
          </div>;
        })()}

        {/* ===== HERITAGE ===== */}
        {tab==="heritage"&&<div className="fade">
          <div style={{background:"linear-gradient(160deg,#1a0800,#3a1500)",borderRadius:"16px",padding:"20px",marginBottom:"14px",textAlign:"center"}}>
            <span style={{fontSize:"2.5rem"}}>🪵</span>
            <h2 style={{color:"#D4AF37",fontSize:"1.15rem",fontWeight:"700"}}>تراث الدهن العربي</h2>
          </div>
          {[
            {icon:"🕌",t:"العود في مجالس الأمراء",d:"منذ القرن الثامن الهجري، لا تكتمل مجالس الشيوخ إلا بفتيل العود. الضيف يعرف كرم مضيفه من رائحة العود المشتعل قبل وصوله."},
            {icon:"🌹",t:"الطائف عاصمة العطر",d:"مدينتك الطائف أم عواصم العطر الشرقي. ورد طائفي يُباع بأسعار الذهب ومعامل تقطير تصدر للعالم."},
            {icon:"🪵",t:"العود الغرقاوي",d:"أندر وأغلى أنواع العود — الغارق في مياه الغابة عشرات السنين. قطرة تبقى أسبوعاً كاملاً."},
            {icon:"👘",t:"البشت والدهن",d:"قبل ارتداء البشت في المناسبات، تُدهن حوافه بالعود الثقيل ليصاحب العطر صاحبه طوال الليل."},
            {icon:"🏺",t:"وصفة الجدة",d:"جدات الحجاز يصنعن الدهن في الفخار، يورّثن الوصفة سراً من جيل لجيل كبصمة عائلية."},
          ].map((h,i)=>(<div key={i} className="glass" style={{borderRight:"4px solid #D4AF37"}}><div style={{display:"flex",gap:"10px"}}><span style={{fontSize:"1.4rem"}}>{h.icon}</span><div><h3 style={{color:"#D4AF37",fontSize:"0.85rem",fontWeight:"700",marginBottom:"3px"}}>{h.t}</h3><p style={{color:"#e5d5be",fontSize:"0.76rem",lineHeight:"1.7"}}>{h.d}</p></div></div></div>))}
          <div className="glass" style={{background:"rgba(214,175,55,0.04)"}}>
            <h3 style={{color:"#D4AF37",fontSize:"0.88rem",fontWeight:"700",marginBottom:"10px"}}>👑 أسرار الشيوخ</h3>
            {[["تعتيق 5 سنوات+","الزمن يصنع ما لا يصنعه المال"],["الطبخ على الفحم","حرارة بطيئة تولّد أعمق الروائح"],["الوعاء الفخاري","يتنفس ببطء ويخرج الماء تدريجياً"],["المزج ليلاً","الليل يثبّت الجزيئات"]].map(([s,t],i)=>(<div key={i} style={{background:"rgba(214,175,55,0.06)",borderRadius:"9px",padding:"9px 11px",marginBottom:"7px",borderRight:"3px solid rgba(214,175,55,0.4)"}}><div style={{color:"#D4AF37",fontSize:"0.78rem",fontWeight:"700"}}>✦ {s}</div><div style={{color:"#c8a060",fontSize:"0.72rem"}}>{t}</div></div>))}
          </div>
        </div>}

      </div>

      <div className="bottom-nav">
        {[{id:"inventory",icon:"🏺",label:"المخزون"},{id:"recipes",icon:"📋",label:"الوصفات"},{id:"heritage",icon:"👑",label:"التراث"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setSelectedRecipe(null);setShowAddIng(false);setShowAddRec(false);}} className={`nav-btn ${tab===t.id?"active":""}`}><span className="nav-icon">{t.icon}</span>{t.label}</button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
