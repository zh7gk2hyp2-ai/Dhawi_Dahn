<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="theme-color" content="#0a0a0c"/>
<title>AB Studio — المكتبة الإبداعية (خاص)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0c'/><text x='50' y='68' text-anchor='middle' font-size='44' fill='%23C9A24B' font-family='Georgia,serif' font-weight='700'>AB</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,500;1,600&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--bg2:#111015;--card:#16141b;--ink:#ece7de;--soft:#a49d92;--faint:#726c64;
  --gold:#c9a24b;--champ:#e4cd8f;--gold-d:#9a7826;--coral:#c4623d;--sage:#8a936f;
  --line:rgba(233,222,201,.10);--line2:rgba(233,222,201,.055);--shadow:0 24px 60px rgba(0,0,0,.5);
  --serif:'Cormorant Garamond',Georgia,serif;--body:'Alexandria','Segoe UI',Tahoma,system-ui,sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  background-image:radial-gradient(60% 45% at 82% -5%,rgba(201,162,75,.10),transparent 60%),radial-gradient(55% 40% at 0% 100%,rgba(196,98,61,.08),transparent 60%)}
::selection{background:var(--gold);color:#0a0a0c}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px}
.hidden{display:none!important}
/* gate */
#gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(60% 55% at 70% 20%,rgba(201,162,75,.12),transparent 60%),#0a0a0c}
.gate-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:38px 32px;max-width:390px;width:100%;text-align:center}
.mark{width:64px;height:64px;border-radius:16px;margin:0 auto 18px;display:grid;place-items:center;background:linear-gradient(135deg,#1b1922,#0a0a0c);
  box-shadow:inset 0 0 0 1px rgba(201,162,75,.45);font-family:var(--serif);font-weight:600;font-size:1.8rem;color:var(--champ);letter-spacing:1px}
.gate-card h1{font-family:var(--serif);font-size:1.5rem;font-weight:600;margin-bottom:4px}
.gate-card p{color:var(--soft);font-size:.84rem;margin-bottom:20px}
.inp{width:100%;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);font-family:var(--body);font-size:.95rem;margin-bottom:10px;outline:none;transition:.2s}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,75,.12)}
.btn{width:100%;padding:13px;border-radius:100px;border:none;cursor:pointer;font-weight:700;font-family:var(--body);font-size:.92rem;
  color:#0a0a0c;background:linear-gradient(120deg,var(--champ),var(--gold) 60%,var(--gold-d));transition:.2s;margin-top:6px}
.btn:hover{transform:translateY(-2px)}
.err{color:#e8908a;font-size:.8rem;min-height:1.1em;margin-top:8px}
.gate-note{font-size:.7rem;color:var(--faint);margin-top:14px}
/* header */
header{padding:34px 0 8px}
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;margin-inline-end:auto}
.brand .m{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,#1b1922,#0a0a0c);box-shadow:inset 0 0 0 1px rgba(201,162,75,.45);font-family:var(--serif);font-weight:600;font-size:1.3rem;color:var(--champ)}
.brand b{font-size:1.02rem;letter-spacing:1px;display:block;line-height:1.1}
.brand span{font-size:.62rem;color:var(--champ);letter-spacing:2px;text-transform:uppercase}
.logout{padding:9px 16px;border-radius:100px;border:1px solid var(--line);background:transparent;color:var(--soft);font-family:var(--body);font-size:.78rem;cursor:pointer}
.logout:hover{border-color:var(--gold-d);color:var(--ink)}
.lead{margin:22px 0 6px}
.eyebrow{font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d)}
h2.title{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,4.5vw,2.8rem);line-height:1.1;margin-top:8px}
h2.title .it{font-style:italic;color:var(--champ)}
/* tabs + controls */
.tabs{display:flex;gap:8px;margin-top:20px}
.tab{padding:11px 22px;border-radius:100px;border:1px solid var(--line);background:transparent;color:var(--soft);font-family:var(--body);font-size:.9rem;cursor:pointer;transition:.2s}
.tab.on{background:linear-gradient(120deg,var(--champ),var(--gold));color:#0a0a0c;border-color:transparent;font-weight:700}
.controls{position:sticky;top:0;z-index:20;padding:14px 0;margin-top:16px;background:rgba(10,10,12,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.search{display:flex;align-items:center;gap:10px;max-width:520px;margin:0 auto 12px;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:10px 18px}
.search input{flex:1;background:none;border:none;color:var(--ink);font-family:var(--body);font-size:.95rem;outline:none}
.search input::placeholder{color:var(--faint)}
.search .ic{color:var(--gold)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 4px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 15px;border-radius:100px;border:1px solid var(--line);background:transparent;color:var(--soft);font-family:var(--body);font-size:.82rem;cursor:pointer;transition:.2s;flex:0 0 auto}
.chip:hover{color:var(--ink);border-color:var(--gold-d)}
.chip.on{background:linear-gradient(120deg,var(--champ),var(--gold));color:#0a0a0c;border-color:transparent;font-weight:600}
.count-line{text-align:center;color:var(--faint);font-size:.8rem;letter-spacing:1px;margin:18px 0 6px}
.grid{display:grid;gap:18px;padding:12px 0 60px}
.grid.ideas{grid-template-columns:repeat(3,1fr)}
.grid.mood{grid-template-columns:repeat(2,1fr)}
.card{background:linear-gradient(165deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:20px;overflow:hidden;transition:transform .35s cubic-bezier(.2,.7,.2,1),border-color .35s,box-shadow .35s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);border-color:rgba(201,162,75,.4);box-shadow:var(--shadow)}
.card-body{padding:22px;display:flex;flex-direction:column;gap:12px;flex:1}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.num{font-family:var(--serif);font-size:1.4rem;font-weight:600;color:var(--gold-d);font-variant-numeric:tabular-nums}
.tag{font-size:.62rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--champ);padding:4px 10px;border-radius:100px;background:rgba(201,162,75,.1);border:1px solid rgba(201,162,75,.22)}
.card h3{font-family:var(--serif);font-weight:600;font-size:1.4rem;line-height:1.22}
.card p{color:var(--soft);font-size:.9rem}
.prompt{margin-top:auto;background:#0c0b10;border:1px solid var(--line2);border-radius:13px;padding:13px 14px}
.prompt .lbl{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);margin-bottom:6px;display:block}
.prompt code{font-family:var(--mono);font-size:.73rem;line-height:1.6;color:#c9c2b6;display:block;direction:ltr;text-align:left;white-space:pre-wrap;word-break:break-word}
.copy{margin-top:11px;width:100%;padding:9px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--champ);font-family:var(--body);font-size:.78rem;cursor:pointer;transition:.2s}
.copy:hover{background:rgba(201,162,75,.1);border-color:var(--gold-d)}
.copy.done{background:var(--sage);color:#0a0a0c;border-color:transparent}
.pal{display:flex;height:60px}.pal span{flex:1}
.cover{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#111116}
.cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s var(--ease,ease)}
.card:hover .cover img{transform:scale(1.05)}
.cover .ico{font-size:2.9rem;opacity:.9;filter:drop-shadow(0 6px 16px rgba(0,0,0,.55))}
.cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.35))}
.pfold{margin-top:auto}
.pdet{margin-top:10px;border-top:1px solid var(--line2);padding-top:9px}
.pdet summary{cursor:pointer;color:var(--gold-d);font-size:.7rem;letter-spacing:.5px;list-style:none}
.pdet summary::-webkit-details-marker{display:none}
.pdet code{display:block;direction:ltr;text-align:left;font-family:var(--mono);font-size:.7rem;line-height:1.55;color:#c9c2b6;background:#0c0b10;border:1px solid var(--line2);border-radius:10px;padding:10px;margin-top:8px;white-space:pre-wrap;word-break:break-word}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.spec{display:flex;flex-direction:column;gap:2px}.spec .k{font-size:.62rem;letter-spacing:.5px;color:var(--gold-d);text-transform:uppercase}.spec .v{font-size:.82rem;color:var(--soft);line-height:1.5}
.empty{grid-column:1/-1;text-align:center;color:var(--faint);padding:60px 20px;font-style:italic;font-family:var(--serif);font-size:1.3rem}
footer{border-top:1px solid var(--line);padding:30px 0 60px;text-align:center;color:var(--faint);font-size:.8rem}
@media(max-width:900px){.grid.ideas{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.grid.ideas,.grid.mood{grid-template-columns:1fr}}
.subframe{width:100%;height:84vh;border:1px solid var(--line);border-radius:16px;background:var(--bg);display:block;margin-top:6px}
@media(max-width:760px){.subframe{height:80vh}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="mark">AB</div>
    <h1>AB Studio</h1>
    <p>المكتبة الإبداعية — دخول خاص</p>
    <input class="inp" id="gu" placeholder="اسم المستخدم" autocomplete="username"/>
    <input class="inp" id="gp" type="password" placeholder="كلمة المرور" autocomplete="current-password"/>
    <button class="btn" onclick="tryLogin()">دخول</button>
    <div class="err" id="gerr"></div>
    <div class="gate-note">صفحة داخلية خاصة بفريق AB Events</div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="wrap">
    <header>
      <div class="top">
        <div class="brand"><div class="m">AB</div><div><b>AB STUDIO</b><span>Creative Library</span></div></div>
        <button class="logout" onclick="logout()">خروج ⏻</button>
      </div>
      <div class="lead">
        <span class="eyebrow">AB EVENTS · INTERNAL</span>
        <h2 class="title">المكتبة <span class="it">الإبداعية</span></h2>
      </div>
      <div class="tabs">
        <button class="tab on" id="tab-ideas" onclick="switchTab('ideas')">💡 الأفكار + Prompts</button>
        <button class="tab" id="tab-mood" onclick="switchTab('mood')">🎨 لوحات المزاج</button>
        <button class="tab" id="tab-lib" onclick="switchTab('lib')">🗂️ ٣٠٠ فكرة</button>
        <button class="tab" id="tab-ref" onclick="switchTab('ref')">🖼️ المراجع البصرية</button>
      </div>
    </header>
  </div>

  <div class="controls" id="controls">
    <div class="wrap">
      <div class="search"><span class="ic">⌕</span><input id="q" type="search" placeholder="ابحث… (زواج، نجدي، ورد، رمضان، شركات…)" aria-label="بحث"></div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div class="wrap" id="gridWrap">
    <div class="count-line" id="countLine"></div>
    <div class="grid ideas" id="grid"></div>
  </div>

  <div class="wrap hidden" id="frameWrap">
    <iframe id="subframe" class="subframe" title="مكتبة AB" loading="lazy"></iframe>
  </div>

  <footer><div class="wrap">© 2026 AB Events — The Art of Luxury Events · مكتبة الاستوديو الداخلية</div></footer>
</div>

<script>

const IMG={"ركن قهوة وتمر نجدي":"event-1.jpg","تنسيق طاولة ممتد":"event-2.jpg","جلسة قهوة عربية":"event-3.jpg","باقة العروس":"event-4.jpg","ليلة الحناء النجدية":"event-5.jpg","زفاف نجدي فاخر":"event-6.jpg","ركن نجدي تراثي":"event-7.jpg","مدخل الملكة":"event-8.jpg","قوس ورد للمدخل":"event-9.jpg"};

/* ══ AUTH ══ */
function tryLogin(){
  const u=document.getElementById('gu').value.trim(), p=document.getElementById('gp').value;
  if(u===AUTH.user && p===AUTH.pass){ sessionStorage.setItem(SS_KEY,"1"); reveal(); }
  else { document.getElementById('gerr').textContent="بيانات الدخول غير صحيحة"; }
}
function reveal(){ document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); }
function logout(){ sessionStorage.removeItem(SS_KEY); location.reload(); }
document.getElementById('gp').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin()});
if(sessionStorage.getItem(SS_KEY)==="1") reveal();

/* ══ APP ══ */
let mode='ideas', active='الكل';
const grid=document.getElementById('grid'),chipsEl=document.getElementById('chips'),qEl=document.getElementById('q'),countLine=document.getElementById('countLine');
const KEYS=[['💡','الإضاءة',3],['🌹','الورد',4],['🧵','الأقمشة',5],['🪑','الكراسي',6],['🍽️','الطاولات',7],['🖼️','الخلفية',8],['📐','الديكور',9],['📸','التصوير',10]];
function data(){ return mode==='ideas'?IDEAS:MOOD; }
function switchTab(m){
  ['ideas','mood','lib','ref'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('on',x===m));
  const isGrid=(m==='ideas'||m==='mood');
  document.getElementById('controls').classList.toggle('hidden',!isGrid);
  document.getElementById('gridWrap').classList.toggle('hidden',!isGrid);
  document.getElementById('frameWrap').classList.toggle('hidden',isGrid);
  if(isGrid){
    mode=m; active='الكل';
    grid.className='grid '+(m==='ideas'?'ideas':'mood');
    buildChips(); render();
  } else {
    const f=document.getElementById('subframe');
    const src=(m==='lib'?'library.html':'references.html');
    if(f.getAttribute('data-src')!==src){ f.src=src; f.setAttribute('data-src',src); }
  }
}
function buildChips(){
  const cats=[...new Set(data().map(d=>d[0]))];
  chipsEl.innerHTML='';
  [['الكل','الكل'],...cats.map(c=>[c,c])].forEach(([k,l])=>{
    const b=document.createElement('button');b.className='chip'+(k==='الكل'?' on':'');b.textContent=l;b.dataset.k=k;
    b.onclick=()=>{active=k;[...chipsEl.children].forEach(x=>x.classList.toggle('on',x.dataset.k===k));render()};
    chipsEl.appendChild(b);
  });
}
function render(){
  const q=qEl.value.trim().toLowerCase();
  const items=data().map((d,i)=>({d,i})).filter(({d})=>(active==='الكل'||d[0]===active)&&(!q||d.join(' ').toLowerCase().includes(q)));
  countLine.textContent=`عرض ${items.length} `+(mode==='ideas'?'فكرة':'لوحة')+(active!=='الكل'?` · ${active}`:'');
  if(!items.length){grid.innerHTML=`<div class="empty">لا توجد نتائج مطابقة</div>`;return;}
  grid.innerHTML=items.map(({d,i})=> mode==='ideas'
    ? (()=>{const img=IMG[d[1]];const pal=(MOOD[i]&&MOOD[i][2])||['#1a1620','#c9a24b','#0b0b0d','#5a2333'];
        const cover=img
          ?`<div class="cover"><img src="../assets/media/${img}" alt="${d[1]}" loading="lazy"></div>`
          :`<div class="cover" style="background:linear-gradient(150deg,${pal[0]},${pal[2]||pal[1]},${pal[3]||pal[0]})"><span class="ico">${CATICON[d[0]]||'✦'}</span></div>`;
        return `<article class="card">${cover}<div class="card-body">
          <div class="card-top"><span class="num">${String(i+1).padStart(3,'0')}</span><span class="tag">${d[0]}</span></div>
          <h3>${d[1]}</h3><p>${d[2]}</p>
          <div class="pfold">
            <button class="copy" data-p="${encodeURIComponent(d[3])}">⧉ نسخ برومت الصورة</button>
            <details class="pdet"><summary>عرض نص البرومت ⌄</summary><code>${d[3].replace(/</g,'&lt;')}</code></details>
          </div>
        </div></article>`;})()
    : `<article class="card">
        <div class="pal">${d[2].map(c=>`<span style="background:${c}"></span>`).join('')}</div>
        <div class="card-body"><div class="card-top"><span class="num">${String(i+1).padStart(3,'0')}</span><span class="tag">${d[0]}</span></div>
        <h3>${d[1]}</h3>
        <div class="specs">${KEYS.map(([ic,lbl,idx])=>`<div class="spec"><span class="k">${ic} ${lbl}</span><span class="v">${d[idx]}</span></div>`).join('')}</div>
      </div></article>`
  ).join('');
}
grid.addEventListener('click',e=>{const b=e.target.closest('.copy');if(!b)return;
  navigator.clipboard.writeText(decodeURIComponent(b.dataset.p)).then(()=>{const o=b.textContent;b.textContent='✓ تم النسخ';b.classList.add('done');setTimeout(()=>{b.textContent=o;b.classList.remove('done')},1400);});});
qEl.addEventListener('input',render);
buildChips(); render();
</script>
