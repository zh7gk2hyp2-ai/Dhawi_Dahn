<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عهدة سيسد">
<meta name="theme-color" content="#4d704c">
<title>إدارة عهدة مشروع تأهيل سيسد — جامعة الطائف</title>
<style>
/* ═══════════════════════════════════════════
   SISD — جامعة الطائف | Premium UI v3
   ═══════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmerGold{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(213,178,84,.45)}70%{box-shadow:0 0 0 10px rgba(213,178,84,0)}100%{box-shadow:0 0 0 0 rgba(213,178,84,0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes orbDrift{0%{transform:translate(0,0)}33%{transform:translate(12px,-18px)}66%{transform:translate(-10px,10px)}100%{transform:translate(0,0)}}
@keyframes progressReveal{from{transform:scaleX(0);transform-origin:right}to{transform:scaleX(1)}}
@keyframes heightReveal{from{height:0 !important;min-height:0 !important}to{}}
@keyframes ripple{to{transform:scale(3);opacity:0}}
@keyframes slideInTab{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes numberIn{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}

:root{
  --green:#4d704c;--green2:#3d5c3c;--green3:#6c926a;--green4:#2a3f2a;
  --gold:#d5b254;--gold2:#be9647;--gold-light:#fdf6e3;--gold-pale:#f0e2b8;
  --white:#fff;--light:#f2f5f1;--border:#cddccb;
  --muted:#7a9478;--text:#1a2d1a;--sub:#4a6848;
  --g-ok:#22c55e;--g-warn:#d5b254;--g-hi:#f97316;--g-err:#ef4444;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;--tab-h:68px;
  --shadow-sm:0 2px 8px rgba(45,74,45,.08);
  --shadow-md:0 4px 20px rgba(45,74,45,.12);
  --shadow-lg:0 8px 40px rgba(45,74,45,.18);
  --shadow-gold:0 4px 20px rgba(213,178,84,.25);
  font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--light);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;position:relative;overflow:hidden;}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;}

/* ── RIPPLE ── */
.ripple-fx{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);pointer-events:none;animation:ripple .55s ease-out forwards;}

/* ── GOLD SHIMMER TEXT ── */
.gold-shimmer{
  background:linear-gradient(90deg,var(--gold2) 0%,#f5d98a 35%,var(--gold2) 55%,#f5d98a 80%,var(--gold2) 100%);
  background-size:250% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmerGold 3.5s linear infinite;
}

/* ── TOAST ── */
#toast{position:fixed;top:calc(env(safe-area-inset-top)+14px);right:12px;left:12px;max-width:400px;margin:0 auto;z-index:999;padding:13px 18px;border-radius:14px;font-size:13px;font-weight:700;transform:translateY(-90px) scale(.95);opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;text-align:center;backdrop-filter:blur(10px);}
#toast.show{transform:translateY(0) scale(1);opacity:1;}
#toast.ok{background:rgba(45,74,45,.95);color:#fff;box-shadow:var(--shadow-md);}
#toast.err{background:rgba(185,28,28,.93);color:#fff;box-shadow:0 4px 20px rgba(185,28,28,.3);}
#toast.info{background:rgba(77,112,76,.95);color:#fff;box-shadow:var(--shadow-md);}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-ov.open{display:flex;animation:fadeIn .2s ease;}
.modal-box{background:#fff;width:100%;max-width:440px;border-radius:28px 28px 0 0;padding:28px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -12px 60px rgba(0,0,0,.2);animation:fadeUp .3s cubic-bezier(.4,0,.2,1);}
.modal-box h3{font-size:17px;font-weight:800;margin-bottom:6px;color:var(--green2);}
.modal-box p{font-size:12px;color:var(--sub);margin-bottom:18px;line-height:1.6;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:14px;border-radius:var(--radius-sm);font-weight:800;font-size:14px;transition:transform .15s,opacity .15s;}
.modal-btns button:active{transform:scale(.97);opacity:.9;}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 16px rgba(220,38,38,.3);}
.btn-navy{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;box-shadow:var(--shadow-md);}
.btn-cancel{background:var(--light);color:var(--sub);border:1.5px solid var(--border);}
.m-inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;margin-bottom:10px;font-family:inherit;transition:border-color .2s,box-shadow .2s;background:#fafcfa;}
.m-inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(77,112,76,.12);background:#fff;}
.m-lbl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;display:block;letter-spacing:.3px;}
#share-box{max-height:80vh;display:flex;flex-direction:column;}
#share-text{flex:1;min-height:180px;max-height:300px;overflow-y:auto;background:var(--light);border-radius:var(--radius-sm);padding:12px;font-size:12px;line-height:1.8;direction:rtl;white-space:pre-wrap;border:1px solid var(--border);font-family:inherit;}

/* ── HEADER ── */
#header{
  background:linear-gradient(150deg,var(--green4) 0%,var(--green2) 50%,#4a6e48 100%);
  color:#fff;
  padding:calc(env(safe-area-inset-top)+16px) 16px 18px;
  position:relative;overflow:hidden;
}
/* floating orbs */
#header::before{
  content:'';position:absolute;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(213,178,84,.18) 0%,transparent 70%);
  top:-80px;left:-60px;
  animation:orbDrift 12s ease-in-out infinite;
  pointer-events:none;
}
#header::after{
  content:'';position:absolute;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);
  bottom:-50px;right:-40px;
  animation:orbDrift 9s ease-in-out infinite reverse;
  pointer-events:none;
}
.h-emblem-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:1;}
.h-emblem{width:46px;height:46px;flex-shrink:0;animation:floatY 4s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));}
.h-brand{flex:1;min-width:0;}
.h-univ{font-size:9px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.8px;margin-bottom:2px;}
.h-proj{font-size:12px;font-weight:800;line-height:1.3;
  background:linear-gradient(90deg,var(--gold2) 0%,#f5d98a 40%,var(--gold2) 60%,#f5d98a 100%);
  background-size:250% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmerGold 4s linear infinite;
}
.h-share-btn{
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);
  border-radius:12px;padding:8px 13px;
  font-size:12px;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:5px;
  backdrop-filter:blur(8px);
  transition:background .2s,transform .15s;
  flex-shrink:0;
}
.h-share-btn:active{background:rgba(255,255,255,.22);transform:scale(.96);}
.h-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;z-index:1;}
.h-title{font-size:15px;font-weight:800;letter-spacing:.2px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;position:relative;z-index:1;}
.stat-box{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.16);
  border-radius:14px;padding:11px 8px;text-align:center;
  backdrop-filter:blur(8px);
  transition:transform .2s;
  animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both;
}
.stat-box:nth-child(1){animation-delay:.1s}
.stat-box:nth-child(2){animation-delay:.18s}
.stat-box:nth-child(3){animation-delay:.26s}
.stat-box .s-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:4px;font-weight:600;}
.stat-box .s-val{font-size:14px;font-weight:800;animation:numberIn .5s cubic-bezier(.4,0,.2,1) both .3s;}
.stat-box .s-sub{font-size:9px;color:rgba(255,255,255,.45);margin-top:2px;}
.bar-wrap{position:relative;z-index:1;}
.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.55);margin-bottom:5px;font-weight:500;}
.bar-track{height:10px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;animation:progressReveal .9s cubic-bezier(.4,0,.2,1) .4s both;}
.fill-ok{background:linear-gradient(90deg,#16a34a,#4ade80);}
.fill-warn{background:linear-gradient(90deg,var(--gold2),var(--gold),#f5d98a);}
.fill-hi{background:linear-gradient(90deg,#c2410c,#f97316);}
.fill-err{background:linear-gradient(90deg,#b91c1c,#ef4444);}

/* ── ALERTS ── */
#alerts{padding:0;}
.alert{display:flex;gap:9px;align-items:flex-start;padding:10px 13px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:11.5px;font-weight:600;border-width:1.5px;border-style:solid;animation:slideInTab .3s ease;}
.alert-warn{background:#fefce8;border-color:#fde68a;color:#78350f;}
.alert-hi{background:#fff7ed;border-color:#fed7aa;color:#9a3412;}
.alert-err{background:#fef2f2;border-color:#fecaca;color:#991b1b;}

/* ── TABS ── */
#tab-bar{
  position:fixed;bottom:0;right:0;left:0;z-index:50;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(180,200,178,.5);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -4px 30px rgba(45,74,45,.1);
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 2px;gap:3px;font-size:9px;font-weight:700;
  color:var(--muted);border-top:2.5px solid transparent;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.tab-btn .tab-icon{font-size:18px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.tab-btn.active{color:var(--green2);border-top-color:var(--gold);}
.tab-btn.active .tab-icon{transform:scale(1.15) translateY(-1px);}

/* ── CONTENT ── */
#content{padding:10px 12px calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px);}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fadeIn .25s ease;}

/* ── SECTION TITLE ── */
.section-ttl{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin:14px 0 8px;padding-right:4px;display:flex;align-items:center;gap:6px;}
.section-ttl::before{content:'';display:block;width:3px;height:13px;background:var(--gold);border-radius:2px;}

/* ── PROJECT IDENTITY ── */
.proj-identity{
  background:linear-gradient(135deg,var(--green4) 0%,var(--green2) 100%);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;
}
.proj-emblem{width:54px;height:54px;flex-shrink:0;}
.proj-info{flex:1;min-width:0;}
.proj-tag{font-size:8px;color:rgba(255,255,255,.55);font-weight:800;letter-spacing:1px;margin-bottom:3px;}
.proj-name{font-size:13px;font-weight:800;color:#fff;line-height:1.35;}
.proj-budget{
  font-size:12px;font-weight:800;margin-top:4px;
  background:linear-gradient(90deg,var(--gold2),#f5d98a,var(--gold2));
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmerGold 3s linear infinite;
}

/* ── DONUT CARD ── */
.donut-card{
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--border);padding:16px;margin-bottom:12px;
  box-shadow:var(--shadow-md);
  animation:fadeUp .45s cubic-bezier(.4,0,.2,1) .08s both;
}
.donut-title{font-size:12px;font-weight:800;color:var(--green2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.donut-title::after{content:'';display:block;height:2px;width:32px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;}
.donut-wrap{display:flex;align-items:center;gap:16px;}
.donut-svg-wrap{flex-shrink:0;position:relative;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.donut-center-pct{font-size:18px;font-weight:900;color:var(--green2);}
.donut-center-lbl{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:.4px;}
.donut-legend{flex:1;min-width:0;}
.dl-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--light);}
.dl-row:last-child{border-bottom:none;}
.dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dl-name{font-size:10px;color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dl-pct{font-size:10px;font-weight:800;color:var(--text);}

/* ── OVERVIEW BARS ── */
.overview-card{
  background:linear-gradient(135deg,var(--green2) 0%,#4a6e48 100%);
  color:#fff;border-radius:var(--radius);padding:14px;margin-bottom:12px;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .12s both;
}
.ov-title{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:12px;font-weight:700;letter-spacing:.3px;}
.ov-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.ov-phase{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:8px 3px;text-align:center;cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.ov-phase:active{opacity:.8;transform:scale(.93);}
.ov-num{font-size:11px;font-weight:800;margin-bottom:5px;}
.ov-bar-w{height:40px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;display:flex;align-items:flex-end;}
.ov-bar-f{width:100%;border-radius:5px;animation:heightReveal .8s cubic-bezier(.4,0,.2,1) both;}
.ov-pct{font-size:9px;color:rgba(255,255,255,.55);margin-top:4px;font-weight:600;}

/* ── CUSTODIAN CARDS ── */
.cust-card{
  background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);
  margin-bottom:14px;overflow:hidden;
  box-shadow:var(--shadow-md);
  transition:box-shadow .25s,transform .2s;
  animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both;
}
.cust-card:nth-child(1){animation-delay:.05s}
.cust-card:nth-child(2){animation-delay:.1s}
.cust-card:nth-child(3){animation-delay:.15s}
.cust-card:nth-child(4){animation-delay:.2s}
.cust-card:nth-child(5){animation-delay:.25s}
.cust-card:nth-child(6){animation-delay:.3s}
.cust-card:nth-child(7){animation-delay:.35s}
.cust-head{padding:16px;}
.cust-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.cust-badge{
  width:44px;height:44px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;flex-shrink:0;
  box-shadow:var(--shadow-sm);
}
.cust-info{flex:1;min-width:0;}
.cust-phase-lbl{font-size:9px;font-weight:800;letter-spacing:.7px;margin-bottom:3px;text-transform:uppercase;}
.cust-name{font-size:15px;font-weight:900;color:var(--text);line-height:1.2;}
.cust-scope{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.45;}
.cust-contract{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;}
.cust-edit-btn{
  font-size:11px;padding:6px 12px;border-radius:99px;
  border:1.5px solid var(--border);color:var(--green);
  background:var(--light);white-space:nowrap;flex-shrink:0;
  font-weight:700;transition:all .15s;
}
.cust-edit-btn:active{background:var(--green);color:#fff;border-color:var(--green);}
.cust-warn-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:99px;margin-bottom:12px;display:inline-block;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.cust-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.cust-amounts .ca-item{
  background:var(--light);border-radius:var(--radius-xs);
  padding:8px 6px;text-align:center;border:1px solid var(--border);
}
.cust-amounts .ca-lbl{color:var(--muted);margin-bottom:3px;font-size:9px;font-weight:700;letter-spacing:.3px;}
.cust-amounts .ca-val{font-weight:900;font-size:14px;animation:numberIn .4s ease both;}
.cust-bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.cust-bar-fill{height:100%;border-radius:99px;animation:progressReveal .9s cubic-bezier(.4,0,.2,1) .2s both;}
.cust-foot{display:flex;justify-content:space-between;align-items:center;}
.cust-pct{font-size:11px;color:var(--sub);font-weight:600;}
.cust-exp-btn{
  font-size:11px;color:var(--green);font-weight:800;
  padding:5px 12px;border-radius:99px;
  background:rgba(77,112,76,.08);border:1.5px solid rgba(77,112,76,.2);
  transition:all .15s;
}
.cust-exp-btn:active{background:var(--green);color:#fff;}

/* ── TRANSACTIONS ── */
.cust-txns{border-top:1px solid var(--border);}
.cust-txn{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--light);animation:slideInTab .3s ease both;}
.cust-txn:last-child{border-bottom:none;}
.cust-txn-info{flex:1;min-width:0;}
.cust-txn-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cust-txn-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.cust-txn-right{text-align:left;flex-shrink:0;}
.cust-txn-amt{font-size:13px;font-weight:800;}
.cust-txn-del{font-size:10px;color:#ef4444;display:block;margin-top:3px;text-align:left;font-weight:700;}
.cust-empty{padding:20px;font-size:12px;color:var(--muted);text-align:center;font-style:italic;}

/* ── PAY BADGES ── */
.pay-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;display:inline-block;margin-right:4px;letter-spacing:.2px;}
.pay-mq{background:#dbeafe;color:#1e40af;}
.pay-ms{background:#ccfbf1;color:#0f766e;}
.pay-nh{background:#dcfce7;color:#15803d;}
.pay-vat{background:var(--gold-light);color:#92400e;}
.pay-ot{background:#f1f5f9;color:#475569;}

/* ── ADD FORM ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm);animation:fadeUp .4s ease both;}
.card-body{padding:18px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:800;color:var(--sub);margin-bottom:7px;letter-spacing:.3px;text-transform:uppercase;}
.form-label span{color:#ef4444;}
.form-input{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;background:#fafcfa;
  transition:border-color .2s,box-shadow .2s,background .2s;
}

function safeJSON(s,f){try{const v=JSON.parse(s);return v!=null?v:f;}catch(e){return f;}}
function sanitizeExp(arr){
  if(!Array.isArray(arr))return[];
  return arr.filter(e=>e&&typeof e.id==='string'&&/^[\w-]{1,30}$/.test(e.id)&&
    CUSTODIANS.some(c=>c.id===e.custId)&&PAY_TYPES.some(p=>p.id===e.payType)&&
    typeof e.item==='string'&&typeof e.supplier==='string'&&
    typeof e.amount==='number'&&e.amount>=0&&
    typeof e.date==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(e.date));
}
function sanitizeMeta(o){
  if(!o||typeof o!=='object'||Array.isArray(o))return{};
  const r={};
  CUSTODIANS.forEach(c=>{
    if(o[c.id]&&typeof o[c.id]==='object'){
      r[c.id]={
        name:typeof o[c.id].name==='string'?o[c.id].name.slice(0,60):'',
        contract:typeof o[c.id].contract==='string'?o[c.id].contract.slice(0,40):''
      };
    }
  });
  return r;
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tm); t._tm=setTimeout(()=>{t.className='';},2800);
}

function escH(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── DONUT CHART ────────────────────────────────────────────────────────
function buildDonut(){
  const R=44, cx=56, cy=56, stroke=14;
  const circumference=2*Math.PI*R;
  const totalBudget=TOTAL_BUDGET;
  let offset=0;
  const segments=CUSTODIANS.map(c=>{
    const share=c.custody/totalBudget;
    const dash=share*circumference;
    const seg=`<circle cx="${cx}" cy="${cy}" r="${R}"
      fill="none" stroke="${c.color}" stroke-width="${stroke}"
      stroke-dasharray="${dash-1} ${circumference-(dash-1)}"
      stroke-dashoffset="${-offset+circumference/4}"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray .6s"/>`;
    offset+=dash;
    return seg;
  }).join('');

  const spent=totalSpent();
  const spentP=pct(spent,TOTAL_BUDGET);

  const legend=CUSTODIANS.map(c=>{
    const s=custSpent(c.id);
    const p=pct(s,totalBudget);
    return `<div class="dl-row">
      <div class="dl-dot" style="background:${c.color}"></div>
      <div class="dl-name">${c.phase}</div>
      <div class="dl-pct">${fmtN(c.custody)}</div>
    </div>`;
  }).join('');

  return `<div class="donut-card">
    <div class="donut-title">
      <span>توزيع الميزانية على التخصصات</span>
      <span style="color:var(--green);font-size:11px">${fmtN(TOTAL_BUDGET)} ر.س</span>
    </div>
    <div class="donut-wrap">
      <div class="donut-svg-wrap">
        <svg width="112" height="112" viewBox="0 0 112 112">${segments}
          <circle cx="${cx}" cy="${cy}" r="${R-stroke/2-2}" fill="white"/>
        </svg>
        <div class="donut-center">
          <div class="donut-center-pct">${spentP}%</div>
          <div class="donut-center-lbl">مصروف</div>
        </div>
      </div>
      <div class="donut-legend">${legend}</div>
    </div>
  </div>`;
}

function checkAmtWarn(){
  const amt=parseFloat(document.getElementById('inp-amt').value)||0;
  const hint=document.getElementById('amt-hint');
  const vat=document.getElementById('vat-calc');
  if(!amt){if(hint)hint.textContent='';if(vat)vat.style.display='none';return;}
  // VAT calculator
  if(vat){
    const amtEx=amt, amtInc=Math.round(amt*1.15);
    vat.style.display='block';
    vat.innerHTML=`حاسبة الضريبة: المبلغ بدون ضريبة <strong>${fmtN(amtEx)}</strong> ر.س | مع ضريبة 15% = <strong>${fmtN(amtInc)}</strong> ر.س`;
  }
  if(!hint)return;
  const c=custById(formState.custId);
  const after=pct(custSpent(c.id)+amt,c.custody);
  if(after>100){hint.className='amt-hint amt-err';hint.textContent='🚨 سيتجاوز عهدة هذا التخصص!';}
  else if(after>90){hint.className='amt-hint amt-hi';hint.textContent=`⚠️ سيصل إلى ${after}% من العهدة`;}
  else if(after>75){hint.className='amt-hint amt-warn';hint.textContent=`🔔 سيصل إلى ${after}% من العهدة`;}
  else{hint.textContent='';}
}

function submitExpense(){
  const item=(document.getElementById('inp-item').value||formState.item).trim();
  const sup=document.getElementById('inp-sup').value.trim();
  const amt=parseFloat(document.getElementById('inp-amt').value);
  const date=document.getElementById('inp-date').value;

  const notes=document.getElementById('inp-notes').value.trim();
  if(!item){showToast('أدخل اسم البند أو العمل','err');return;}
  if(!sup){showToast('أدخل اسم المورد','err');return;}

  expenses.unshift({id:Date.now().toString(),custId:formState.custId,payType:formState.payType,item,supplier:sup,amount:amt,date,ref,notes});
  save(); renderAll(); showToast('✅ تم تسجيل الصرف بنجاح');
  formState.item=''; formState.selItem='';

}

// ── HISTORY ─────────────────────────────────────────────────────────────
function renderHist(){
  const filterAll=histFilter==='all';
  const q=histSearch.trim().toLowerCase();
  const filteredExp=expenses
    .filter(e=>filterAll||e.custId===histFilter)
    .filter(e=>!q||e.item.toLowerCase().includes(q)||e.supplier.toLowerCase().includes(q)||(e.ref&&e.ref.toLowerCase().includes(q))||(e.notes&&e.notes.toLowerCase().includes(q)));
  const spent=filteredExp.reduce((s,e)=>s+e.amount,0);

  let filterHtml=`<span class="filter-chip ${filterAll?'sel':''}" onclick="setHistFilter('all')">الكل</span>`;
  CUSTODIANS.forEach(c=>{
    const isSel=histFilter===c.id;
    filterHtml+=`<span class="filter-chip ${isSel?'sel':''}" style="${isSel?`border-color:${c.color};background:${c.color};color:#fff`:''}" onclick="setHistFilter('${c.id}')">${c.num}</span>`;
  });

  let sumHtml='';
  const showC=filterAll?CUSTODIANS:CUSTODIANS.filter(c=>c.id===histFilter);
  showC.forEach(c=>{
    const s=custSpent(c.id); if(s===0&&filterAll)return;
    const p=pct(s,c.custody);
    sumHtml+=`<div class="summary-row">
      <div class="sr-dot" style="background:${c.color}"></div>
      <span class="sr-name">${escH(custName(c.id))} (${c.num})</span>
      <div class="sr-bar"><div class="sr-bar-fill" style="width:${p}%;background:${c.color}"></div></div>
      <span class="sr-amt">${fmtN(s)} ر.س</span>
    </div>`;
  });

  let html=`<div class="filter-bar">${filterHtml}</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" placeholder="بحث عن بند أو مورد أو مرجع…" value="${escH(histSearch)}" oninput="setHistSearch(this.value)">
  </div>`;
  if(spent>0){
    html+=`<div class="summary-card">
      <div class="summary-title">ملخص المصروفات</div>
      ${sumHtml}
      <div class="summary-total"><span>الإجمالي</span><span>${fmtN(spent)} ر.س</span></div>
    </div>`;
  }

  if(filteredExp.length===0){
    html+=`<div class="empty-state"><div class="empty-icon">🧾</div><div class="empty-text">لا توجد مصروفات${filterAll?'':' لهذا التخصص'}</div><div class="empty-hint">اضغط "إضافة" لتسجيل أول دفعة</div></div>`;
  } else {
    html+=filteredExp.map(e=>{
      const c=custById(e.custId)||{color:'#64748b',bg:'#f1f5f9',tc:'#475569',num:'?'};
      const pt=payById(e.payType);
      return `<div class="exp-card">
        <div class="exp-top">
          <div class="exp-info">
            <div class="exp-name">${escH(e.item)}</div>
            <div class="exp-badges">
              <span class="exp-badge" style="background:${c.bg};color:${c.tc}">${c.num} — ${escH(custName(c.id))}</span>
              <span class="pay-badge ${pt.badge}">${pt.icon} ${pt.label}</span>
            </div>
            <div class="exp-meta">
              👤 ${escH(e.supplier)}${e.ref?`<br>🧾 ${escH(e.ref)}`:''}${e.notes?`<br>📝 ${escH(e.notes)}`:''}
              <br>📅 ${escH(e.date)}
            </div>
          </div>
          <div class="exp-right">
            <div class="exp-amt" style="color:${c.color}">${fmtN(e.amount)}</div>
            <div class="exp-sar">ر.س</div>
            <button class="exp-del" onclick="openEdit('${escH(e.id)}')">✏️</button>
            <button class="exp-del" onclick="openDel('${escH(e.id)}')">🗑️ حذف</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('tab-hist').innerHTML=html;
}

// ── CHECKLIST (3-state) ──────────────────────────────────────────────────
function renderCk(){
  const filterAll=ckFilter==='all';
  let filterHtml=`<span class="filter-chip ${filterAll?'sel':''}" onclick="setCkFilter('all')">الكل</span>`;
  CUSTODIANS.forEach(c=>{
    const isSel=ckFilter===c.id;
    filterHtml+=`<span class="filter-chip ${isSel?'sel':''}" style="${isSel?`border-color:${c.color};background:${c.color};color:#fff`:''}" onclick="setCkFilter('${c.id}')">${c.num}</span>`;
  });

  let html=`
    <div class="ck-intro">
      <strong>📋 خطة بنود التنفيذ — المراحل الرسمية</strong>
      اضغط مرة: جاري التنفيذ ▶ · اضغط مرتين: مكتمل ✓ · اضغط ثلاثاً: إعادة تعيين
    </div>
    <div class="ck-filter">${filterHtml}</div>`;

  const showC=filterAll?CUSTODIANS:CUSTODIANS.filter(c=>c.id===ckFilter);
  showC.forEach(c=>{
    const states=c.items.map(it=>ckState[`${c.id}::${it.num}`]||0);
    const done=states.filter(s=>s===2).length;
    const inProg=states.filter(s=>s===1).length;
    const total=c.items.length;
    const p=total>0?Math.round(done/total*100):0;

    html+=`<div class="ck-card">
      <div class="phase-header" style="background:${c.bg}">
        <div class="phase-dot" style="background:${c.color};color:#fff">${c.num}</div>
        <div style="flex:1;min-width:0">
          <div class="phase-name" style="color:${c.tc}">${c.phase} — ${escH(custName(c.id))}</div>
          <div class="phase-scope">${c.scope}</div>
        </div>
        <div class="phase-prog" style="color:${c.tc}">${done}/${total}</div>
      </div>
      <div class="ck-head">
        <div style="display:flex;gap:8px;font-size:10px;color:var(--sub);margin-bottom:6px">
          <span>✓ مكتمل: ${done}</span>
          <span>▶ جاري: ${inProg}</span>
          <span>○ لم يبدأ: ${total-done-inProg}</span>
        </div>
        <div class="ck-bar"><div class="ck-bar-fill" style="width:${p}%;background:${p===100?'var(--g-ok)':c.color}"></div></div>
        <div class="ck-pct">${p}% مكتمل</div>
      </div>`;

    c.items.forEach(it=>{
      const key=`${c.id}::${it.num}`;
      const rawSt=ckState[key]; const st=(rawSt===1||rawSt===2)?rawSt:0;
      const stClass=st===0?'':st===1?'s1':'s2';
      const badge=st===0?'':`<span class="ck-status-badge ck-st${st}">${st===1?'▶ جاري':'✓ مكتمل'}</span>`;
      html+=`<div class="ck-item ${stClass}" onclick="toggleCkItem('${c.id}','${it.num}')">
        <div class="ck-box ${stClass}"></div>
        <div class="ck-item-content">
          <div class="ck-item-num">${it.num}</div>
          <div class="ck-text">${escH(it.text)}</div>
        </div>
        ${badge}
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="tips-card">
    <div class="tips-title">💡 تذكيرات إدارة العهدة الحكومية</div>
    ${[
      'لا تدفع أكثر من 50% مقدماً لأي مورد — الباقي عند التسليم',
      'احتفظ بفاتورة + محضر استلام لكل دفعة قبل إغلاق العهدة',
      'افحص الجودة بشكل مستقل قبل الدفعة الأخيرة',
      'وثّق كل صرف برقم أمر الشراء والفاتورة',
      'سوّ كل عهدة وأقفلها قبل فتح التالية',
      'المبالغ مشمولة الضريبة 15% — تأكد من الفاتورة الضريبية',
    ].map((t,i)=>`<div class="tip-row"><span class="tip-n">${'①②③④⑤⑥'[i]}</span><span>${t}</span></div>`).join('')}
  </div>`;
  document.getElementById('tab-ck').innerHTML=html;
}
function setCkFilter(f){ckFilter=f;renderCk();}
function toggleCkItem(custId,num){
  const key=`${custId}::${num}`;
  ckState[key]=((ckState[key]||0)+1)%3;
  saveCk(); renderCk();
}

// ── SHARE / REPORT ────────────────────────────────────────────────────────
function openShare(){
  const today=new Date().toLocaleDateString('ar-SA-u-nu-latn',{year:'numeric',month:'long',day:'numeric'});
  const spent=totalSpent(); const left=TOTAL_BUDGET-spent;
  let lines=[];
  lines.push(`📋 تقرير عهدة مشروع تأهيل مقر سيسد`);
  lines.push(`📅 ${today}`);
  lines.push(`${'─'.repeat(36)}`);
  lines.push(`💰 الإجمالي المصروف: ${fmtN(spent)} من ${fmtN(TOTAL_BUDGET)} ر.س`);
  lines.push(`✅ المتبقي: ${fmtN(Math.max(0,left))} ر.س`);
  lines.push(`${'─'.repeat(36)}`);
  CUSTODIANS.forEach(c=>{
    const s=custSpent(c.id); const p=pct(s,c.custody); const left2=c.custody-s;
    const name=custName(c.id); const contract=custContract(c.id);
    const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));
    lines.push(`\n${c.num}. ${c.phase}`);
    if(name!==c.phase)lines.push(`   👤 ${name}`);
    if(contract)lines.push(`   🗂️ ${contract}`);
    lines.push(`   ${bar} ${p}%`);
    lines.push(`   مصروف: ${fmtN(s)} | متبقٍ: ${fmtN(Math.max(0,left2))} من ${fmtN(c.custody)} ر.س`);
    // last 3 expenses
    const exps=expenses.filter(e=>e.custId===c.id).slice(0,3);
    if(exps.length>0){
      lines.push(`   آخر الدفعات:`);
      exps.forEach(e=>{
        const pt=payById(e.payType);
        lines.push(`   • ${e.item} — ${fmtN(e.amount)} ر.س (${pt.label}) — ${e.date}`);
      });
    }
  });
  lines.push(`\n${'─'.repeat(36)}`);
  lines.push(`🔢 إجمالي الدفعات المسجّلة: ${expenses.length}`);
  const report=lines.join('\n');
  document.getElementById('share-text').textContent=report;
  document.getElementById('share-ov').classList.add('open');
}

function copyReport(){
  const text=document.getElementById('share-text').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('✅ تم نسخ التقرير'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ تم نسخ التقرير');
  }
}

function exportJSON(){
  const data={expenses,ckState,custMeta,exportedAt:new Date().toISOString(),v:1};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`sisd-backup-${getToday()}.json`;
  a.click(); URL.revokeObjectURL(url); showToast('📥 تم تنزيل ملف النسخة الاحتياطية');
}
function importJSON(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=ev=>{
    const file=ev.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(!Array.isArray(d.expenses)){showToast('ملف غير صحيح','err');return;}
        expenses=sanitizeExp(d.expenses);
        ckState=(d.ckState&&typeof d.ckState==='object')?d.ckState:{};
        custMeta=sanitizeMeta(d.custMeta||{});
        save(); saveCk(); saveMeta(); renderAll();
        if(curTab==='hist')renderHist(); if(curTab==='ck')renderCk();
        showToast(`✅ تم استيراد ${expenses.length} دفعة`);
      }catch(err){showToast('خطأ في قراءة الملف','err');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function exportCSV(){
  const rows=[['رقم','التخصص','البند','المورد','النوع','المبلغ','التاريخ','المرجع','ملاحظات']];
  expenses.forEach((e,i)=>{
    const c=custById(e.custId); const pt=payById(e.payType);
    rows.push([i+1,c?c.phase:e.custId,e.item,e.supplier,pt.label,e.amount,e.date,e.ref||'',e.notes||'']);
  });
  const csv=rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`sisd-expenses-${getToday()}.csv`;
  a.click(); URL.revokeObjectURL(url); showToast('📊 تم تنزيل ملف Excel');
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function initFirebase(){
  clearTimeout(fbRetryTimer);
  fbLastErr=''; fbSyncing=true; updateSyncBadge();
  try{
    await loadScript('https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js');
    if(!window.firebase)throw new Error('تعذّر تحميل Firebase SDK');
    if(!firebase.apps.length)firebase.initializeApp(FB_CFG);
    if(!fbDb){
      fbDb=firebase.firestore();
      // SDK v12: ForceLongPolling removed — use AutoDetect (handles GCC network blocks)
      fbDb.settings({experimentalAutoDetectLongPolling:true});
      // enable offline persistence — await so cache is ready before first read
      await fbDb.enablePersistence({synchronizeTabs:true}).catch(()=>{});
      listenCloud();
    }
    await loadFromCloud();
    fbSyncing=false; fbSyncOk=true; fbRetryCount=0; updateSyncBadge();
  }catch(e){
    fbSyncing=false; fbSyncOk=false;
    fbLastErr=e.code?`${e.code}: ${e.message}`:e.message||String(e);
    updateSyncBadge();
    console.error('Firebase error:',e);
    // exponential backoff retry: 10s, 20s, 30s max
    fbRetryCount++;
    const delay=Math.min(30,fbRetryCount*10)*1000;
    fbRetryTimer=setTimeout(()=>{ if(!fbSyncOk) initFirebase(); }, delay);
  }
}

async function loadFromCloud(){
  if(!fbDb)return;
  let snap;
  try{
    // try server first with 10s timeout
    const p=fbDb.collection('sisd').doc('data').get();
    const timeout=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),10000));
    snap=await Promise.race([p,timeout]);
  }catch(serverErr){
    // fall back to local cache if server unreachable
    try{
      snap=await fbDb.collection('sisd').doc('data').get({source:'cache'});
      if(snap.exists)showToast('📦 تم التحميل من الكاش المحلي','info');
    }catch(cacheErr){throw serverErr;}
  }
  if(!snap||!snap.exists)return;
  const d=snap.data();
  if(d.expenses)expenses=sanitizeExp(d.expenses);
  if(d.ckState)ckState=d.ckState;
  if(d.custMeta)custMeta=sanitizeMeta(d.custMeta);
  localStorage.setItem('sisd-exp',JSON.stringify(expenses));
  localStorage.setItem('sisd-ck',JSON.stringify(ckState));
  localStorage.setItem('sisd-meta',JSON.stringify(custMeta));
  renderAll(); if(curTab==='hist')renderHist(); if(curTab==='ck')renderCk();
}

function listenCloud(){
  if(!fbDb)return;
  fbDb.collection('sisd').doc('data').onSnapshot(snap=>{
    if(!snap.exists)return;
    const d=snap.data();
    const incoming=sanitizeExp(d.expenses||[]);
    if(JSON.stringify(incoming)!==JSON.stringify(expenses)){
      expenses=incoming;
      if(d.ckState)ckState=d.ckState;
      if(d.custMeta)custMeta=sanitizeMeta(d.custMeta);
      localStorage.setItem('sisd-exp',JSON.stringify(expenses));
      localStorage.setItem('sisd-ck',JSON.stringify(ckState));
      localStorage.setItem('sisd-meta',JSON.stringify(custMeta));
      renderAll(); if(curTab==='hist')renderHist(); if(curTab==='ck')renderCk();
      showToast('🔄 تمت المزامنة','info');
    }
    fbSyncOk=true; fbRetryCount=0; updateSyncBadge();
  },()=>{fbSyncOk=false; updateSyncBadge();});
}

function pushToCloud(){
  if(!fbDb)return;
  clearTimeout(fbPushTimer);
  fbPushTimer=setTimeout(async()=>{
    try{
      fbSyncing=true; updateSyncBadge();
      await fbDb.collection('sisd').doc('data').set({
        expenses,ckState,custMeta,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      fbSyncing=false; fbSyncOk=true; updateSyncBadge();
    }catch(e){
      fbSyncing=false; fbSyncOk=false; updateSyncBadge();
      // retry push after reconnect
      if(!fbRetryTimer) fbRetryTimer=setTimeout(()=>{ if(!fbSyncOk) initFirebase(); },10000);
    }
  },1500);
}

// auto-reconnect when network comes back online
window.addEventListener('online',()=>{ if(!fbSyncOk&&!fbSyncing){ fbRetryCount=0; initFirebase(); } });

// ── RIPPLE EFFECT ─────────────────────────────────────────────────────
document.addEventListener('click',function(e){
  const btn=e.target.closest('button');
  if(!btn)return;
  const r=document.createElement('span');
  r.className='ripple-fx';
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height)*2;
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(),600);
},{passive:true});
