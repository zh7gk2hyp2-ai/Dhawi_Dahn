<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عهدة سيسد">
<meta name="theme-color" content="#4d704c">
<title>إدارة عهدة مشروع تأهيل سيسد — جامعة الطائف</title>
<style>
:root{
  --green:#4d704c;--green2:#3d5c3c;--green3:#6c926a;--green4:#2a3f2a;
  --gold:#d5b254;--gold2:#be9647;--gold-light:#fdf6e3;--gold-pale:#f5e9c4;
  --white:#fff;--light:#f3f6f2;--border:#d4e0d2;
  --muted:#7a9478;--text:#1a2d1a;--sub:#4a6848;
  --g-ok:#22c55e;--g-warn:#d5b254;--g-hi:#f97316;--g-err:#ef4444;
  --radius:16px;--radius-sm:10px;--tab-h:64px;
  font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--light);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;}

/* TOAST */
#toast{position:fixed;top:calc(env(safe-area-inset-top)+12px);right:12px;left:12px;max-width:400px;margin:0 auto;z-index:999;padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transform:translateY(-80px);opacity:0;transition:all .3s ease;pointer-events:none;text-align:center;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.ok{background:var(--green2);color:#fff;}
#toast.err{background:#dc2626;color:#fff;}
#toast.info{background:var(--green);color:#fff;}

/* MODAL base */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:90;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal-ov.open{display:flex;}
.modal-box{background:#fff;width:100%;max-width:440px;border-radius:24px 24px 0 0;padding:24px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(0,0,0,.18);}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--green2);}
.modal-box p{font-size:12px;color:var(--sub);margin-bottom:16px;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:13px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-navy{background:var(--green);color:#fff;}
.btn-cancel{background:var(--light);color:var(--text);}

/* modal form */
.m-inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;margin-bottom:10px;font-family:inherit;}
.m-inp:focus{border-color:var(--green);outline:none;}
.m-lbl{font-size:11px;font-weight:600;color:var(--sub);margin-bottom:4px;display:block;}

/* Share modal */
#share-box{max-height:80vh;display:flex;flex-direction:column;}
#share-text{flex:1;min-height:180px;max-height:300px;overflow-y:auto;background:var(--light);border-radius:var(--radius-sm);padding:12px;font-size:12px;line-height:1.8;direction:rtl;white-space:pre-wrap;border:1px solid var(--border);font-family:inherit;}

/* HEADER */
#header{background:linear-gradient(160deg,var(--green4) 0%,var(--green2) 55%,var(--green) 100%);color:#fff;padding:calc(env(safe-area-inset-top)+14px) 16px 16px;position:relative;overflow:hidden;}
#header::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
.h-emblem-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;}
.h-emblem{width:44px;height:44px;flex-shrink:0;}
.h-brand{flex:1;min-width:0;}
.h-univ{font-size:9px;color:rgba(255,255,255,.65);font-weight:600;letter-spacing:.5px;margin-bottom:1px;}
.h-proj{font-size:12px;font-weight:800;color:var(--gold);line-height:1.2;}
.h-share-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px;backdrop-filter:blur(4px);}
.h-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative;}
.h-title{font-size:15px;font-weight:800;letter-spacing:.2px;color:#fff;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;position:relative;}
.stat-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 8px;text-align:center;backdrop-filter:blur(4px);}
.stat-box .s-lbl{font-size:10px;color:rgba(255,255,255,.65);margin-bottom:3px;}
.stat-box .s-val{font-size:13px;font-weight:800;}
.stat-box .s-sub{font-size:9px;color:rgba(255,255,255,.5);margin-top:2px;}
.bar-wrap{margin-top:2px;position:relative;}
.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.6);margin-bottom:5px;}
.bar-track{height:10px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.fill-ok{background:linear-gradient(90deg,#22c55e,#4ade80);}
.fill-warn{background:linear-gradient(90deg,var(--gold2),var(--gold));}
.fill-hi{background:linear-gradient(90deg,#f97316,#fb923c);}
.fill-err{background:linear-gradient(90deg,#ef4444,#f87171);}

/* ALERTS */
#alerts{padding:0;}
.alert{display:flex;gap:8px;align-items:flex-start;padding:9px 12px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:11.5px;font-weight:500;border-width:1px;border-style:solid;}
.alert-warn{background:#fefce8;border-color:#fde68a;color:#92400e;}
.alert-hi{background:#fff7ed;border-color:#fed7aa;color:#9a3412;}
.alert-err{background:#fef2f2;border-color:#fecaca;color:#991b1b;}

/* TABS */
#tab-bar{position:fixed;bottom:0;right:0;left:0;z-index:50;background:#fff;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 24px rgba(77,112,76,.12);}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;gap:2px;font-size:9px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;transition:all .2s;}
.tab-btn .tab-icon{font-size:17px;line-height:1;}
.tab-btn.active{color:var(--green);border-color:var(--gold);}

/* SETTINGS */
.cfg-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(77,112,76,.06);}
.cfg-card-danger{border-color:#fecaca;}
.cfg-title{font-size:14px;font-weight:800;margin-bottom:4px;color:var(--green2);}
.cfg-sub{font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.5;}
.cfg-url{font-size:11px;background:var(--light);border:1px solid var(--border);border-radius:8px;padding:8px 12px;word-break:break-all;color:var(--sub);margin-bottom:4px;}
.cfg-btn{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;text-decoration:none;}
.cfg-btn-wa{background:#dcfce7;border-color:#86efac;color:#15803d;}
.cfg-btn-danger{background:#fee2e2;border-color:#fca5a5;color:#dc2626;margin-top:4px;}
.cfg-steps{background:var(--light);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;}
.cfg-step{font-size:11px;color:var(--sub);padding:3px 0;line-height:1.6;}
.cfg-link{color:var(--green);font-weight:600;}
.fb-ok-badge{display:inline-block;background:#f0fdf4;border:1px solid #86efac;color:#15803d;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;margin-bottom:10px;}
.sync-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;margin-right:8px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:#fff;}
.search-input:focus{border-color:var(--green);outline:none;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}

/* EDIT btn in hist */
.exp-edit{font-size:11px;color:var(--green);display:block;margin-top:2px;text-align:left;}

/* CONTENT */
#content{padding:10px 12px calc(var(--tab-h) + env(safe-area-inset-bottom) + 12px);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* PROJECT IDENTITY CARD */
.proj-identity{background:linear-gradient(135deg,var(--green2) 0%,var(--green) 100%);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(77,112,76,.25);}
.proj-emblem{width:52px;height:52px;flex-shrink:0;}
.proj-info{flex:1;min-width:0;}
.proj-tag{font-size:9px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;}
.proj-name{font-size:13px;font-weight:800;color:#fff;line-height:1.3;}
.proj-budget{font-size:11px;color:var(--gold);font-weight:700;margin-top:3px;}

/* DONUT CHART */
.donut-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(77,112,76,.08);}
.donut-title{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.donut-wrap{display:flex;align-items:center;gap:16px;}
.donut-svg-wrap{flex-shrink:0;position:relative;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.donut-center-pct{font-size:17px;font-weight:800;color:var(--green2);}
.donut-center-lbl{font-size:8px;color:var(--muted);font-weight:600;}
.donut-legend{flex:1;min-width:0;}
.dl-row{display:flex;align-items:center;gap:7px;padding:3px 0;}
.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dl-name{font-size:10px;color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dl-pct{font-size:10px;font-weight:700;color:var(--text);}

/* OVERVIEW */
.overview-card{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 4px 16px rgba(77,112,76,.2);}
.ov-title{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:10px;font-weight:600;}
.ov-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.ov-phase{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .2s;}
.ov-phase:active{opacity:.8;transform:scale(.96);}
.ov-num{font-size:10px;font-weight:700;margin-bottom:4px;}
.ov-bar-w{height:36px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end;}
.ov-bar-f{width:100%;border-radius:4px;transition:height .6s cubic-bezier(.4,0,.2,1);}
.ov-pct{font-size:9px;color:rgba(255,255,255,.6);margin-top:3px;}

/* CUSTODIAN CARDS */
.cust-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 12px rgba(77,112,76,.07);transition:box-shadow .2s;}
.cust-head{padding:14px;}
.cust-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.cust-badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0;}
.cust-info{flex:1;min-width:0;}
.cust-phase-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:2px;}
.cust-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.2;}
.cust-scope{font-size:11px;color:var(--sub);margin-top:2px;line-height:1.4;}
.cust-contract{font-size:10px;color:var(--muted);margin-top:3px;}
.cust-edit-btn{font-size:11px;padding:5px 11px;border-radius:99px;border:1.5px solid var(--border);color:var(--green);background:var(--light);white-space:nowrap;flex-shrink:0;font-weight:600;}
.cust-warn-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;margin-bottom:10px;display:inline-block;}
.cust-amounts{display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px;}
.cust-amounts .ca-item{text-align:center;}
.cust-amounts .ca-lbl{color:var(--muted);margin-bottom:2px;font-size:10px;}
.cust-amounts .ca-val{font-weight:800;font-size:14px;}
.cust-bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.cust-bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.cust-foot{display:flex;justify-content:space-between;align-items:center;}
.cust-pct{font-size:11px;color:var(--sub);}
.cust-exp-btn{font-size:11px;color:var(--green);font-weight:700;padding:4px 10px;border-radius:99px;background:var(--light);border:1px solid var(--border);}

/* Expanded txns */
.cust-txns{border-top:1px solid var(--border);}
.cust-txn{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--light);}
.cust-txn:last-child{border-bottom:none;}
.cust-txn-info{flex:1;min-width:0;}
.cust-txn-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cust-txn-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.cust-txn-right{text-align:left;flex-shrink:0;}
.cust-txn-amt{font-size:13px;font-weight:700;}
.cust-txn-del{font-size:10px;color:#ef4444;display:block;margin-top:2px;text-align:left;}
.cust-empty{padding:14px;font-size:12px;color:var(--muted);text-align:center;}

/* pay type badge */
.pay-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;display:inline-block;margin-right:4px;}
.pay-mq{background:#eff6ff;color:#1d4ed8;}
.pay-ms{background:#f0fdfa;color:#0f766e;}
.pay-nh{background:#f0fdf4;color:#15803d;}
.pay-vat{background:var(--gold-light);color:#854d0e;}
.pay-ot{background:#f1f5f9;color:#475569;}

/* ADD FORM */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(77,112,76,.06);}
.card-body{padding:16px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;}
.form-label span{color:#dc2626;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(77,112,76,.1);}
textarea.form-input{resize:none;line-height:1.5;}

/* Custodian selector */
.cust-sel-grid{display:flex;flex-direction:column;gap:8px;}
.cust-sel-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;transition:all .15s;text-align:right;}
.cust-sel-btn.sel{border-width:2px;}
.cust-sel-dot{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.cust-sel-info{flex:1;min-width:0;}
.cust-sel-name{font-size:13px;font-weight:700;}
.cust-sel-scope{font-size:10px;color:var(--sub);}
.cust-sel-left{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0;}

/* pay type selector */
.pay-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.pt-btn{padding:9px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:600;color:var(--sub);transition:all .15s;text-align:center;}
.pt-btn.sel{background:var(--green);border-color:var(--green);color:#fff;}

/* Item chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.chip{font-size:11px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--light);color:var(--sub);transition:all .15s;}
.chip.sel{background:var(--green);border-color:var(--green);color:#fff;}

/* VAT hint */
.vat-calc{font-size:11px;color:var(--sub);margin-top:6px;background:var(--gold-light);border-radius:8px;padding:8px 12px;line-height:1.7;border:1px solid var(--gold-pale);}
.vat-calc strong{color:var(--green2);}

/* Amount hint */
.amt-hint{font-size:11px;margin-top:5px;font-weight:500;}
.amt-err{color:#dc2626;}
.amt-hi{color:#ea580c;}
.amt-warn{color:#ca8a04;}

.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;border-radius:var(--radius-sm);font-size:15px;font-weight:800;transition:opacity .15s,transform .1s;letter-spacing:.3px;box-shadow:0 4px 16px rgba(77,112,76,.3);}
.submit-btn:active{opacity:.9;transform:scale(.99);}

/* HISTORY */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.filter-chip{font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:#fff;color:var(--sub);transition:all .15s;}
.filter-chip.sel{border-color:var(--green);background:var(--green);color:#fff;}
.summary-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(77,112,76,.07);}
.summary-title{font-size:13px;font-weight:800;margin-bottom:10px;color:var(--green2);}
.summary-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--light);}
.summary-row:last-child{border-bottom:none;}
.sr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sr-name{font-size:12px;color:var(--sub);flex:1;margin-right:8px;}
.sr-bar{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin:0 10px;}
.sr-bar-fill{height:100%;border-radius:99px;}
.sr-amt{font-size:12px;font-weight:700;white-space:nowrap;}
.summary-total{display:flex;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:2px solid var(--border);}
.summary-total span{font-size:13px;font-weight:800;}
.exp-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;padding:12px 14px;box-shadow:0 1px 6px rgba(77,112,76,.06);}
.exp-top{display:flex;align-items:flex-start;gap:10px;}
.exp-info{flex:1;min-width:0;}
.exp-name{font-size:14px;font-weight:700;line-height:1.3;color:var(--text);}
.exp-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.exp-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;}
.exp-meta{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.8;}
.exp-right{text-align:left;flex-shrink:0;}
.exp-amt{font-size:16px;font-weight:800;}
.exp-sar{font-size:10px;color:var(--muted);}
.exp-del{font-size:11px;color:#ef4444;margin-top:8px;display:block;text-align:left;}

.ck-box{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;}
.ck-box.s1{background:#fff7ed;border-color:#f97316;}

.ck-item.s2 .ck-text{color:var(--muted);text-decoration:line-through;}
.ck-status-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.ck-st0{}
.ck-st1{background:#fff7ed;color:#c2410c;}
.ck-st2{background:#f0fdf4;color:var(--green2);}

/* gap note */
.gap-note{background:var(--gold-light);border:1px solid var(--gold-pale);border-radius:var(--radius-sm);padding:10px 12px;font-size:11.5px;color:#6b4b00;margin-bottom:10px;line-height:1.6;}

/* tips */

.tips-title{font-size:12px;font-weight:800;color:var(--gold2);margin-bottom:10px;}
.tip-row{font-size:11px;color:#5a3e00;padding:4px 0;line-height:1.5;display:flex;gap:8px;}
.tip-n{flex-shrink:0;font-weight:800;color:var(--gold2);}

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const TOTAL_BUDGET = 680000;

const CUSTODIANS = [
  {
    id:'c1', num:1,
    phase:'الصيانة العامة للمبنى',
    scope:'أعمال الهدم واللياسة والدهانات والعزل والأسقف',
    custody:150000, color:'#4d704c', bg:'#edf3ec', tc:'#3d5c3c',
    items:[
      {num:'1.1', text:'أعمال الهدم والإزالة والمباني'},
      {num:'1.2', text:'أعمال اللياسة الداخلية'},
      {num:'1.3', text:'أعمال الدهانات'},
      {num:'1.4', text:'أعمال العزل المائي'},
      {num:'1.5', text:'أعمال الأسقف المستعارة (جبس)'},
    ]
  },
  {

    phase:'صيانة وتطوير التجهيزات',

    custody:200000, color:'#6c926a', bg:'#eef4ed', tc:'#4d704c',
    items:[
      {num:'2.1', text:'أعمال الأبواب للمكاتب والحمامات ودورات المياه'},
      {num:'2.2', text:'الأعمال الزجاجية'},
      {num:'2.3', text:'أعمال الدواليب المطبخ'},
      {num:'2.4', text:'أعمال السيراميك'},

      {num:'2.8', text:'أعمال الديكورات الخشبية والورقية'},
      {num:'2.9', text:'أعمال اللوحات الإرشادية'},
    ]
  },
  {

    items:[

      {num:'3.2', text:'أحواض الغسيل المعلقة'},
      {num:'3.3', text:'مجموعات أحواض الكاونتر'},

      {num:'3.7', text:'مجاري هواء التكييف (duct)'},

    ]
  },
  {
    id:'c4', num:4,
    phase:'الأعمال الكهربائية وملحقاتها',
    scope:'الإنارة والإنذار والتوصيلات والشبكات',
    custody:200000, color:'#d5b254', bg:'#fdf6e3', tc:'#8a6b2a',
    items:[
      {num:'4.1', text:'نظام إنذار الحريق الكامل'},

      {num:'4.7', text:'كابينة التوزيع الكهربائية'},
      {num:'4.8', text:'نظام التحكم بالدخول (Access Control)'},

    ]
  },
  {
    id:'c5', num:5,
    phase:'الكاميرات وأنظمة المراقبة',
    scope:'كاميرات IP وجهاز التسجيل وشاشة المراقبة والتمديدات',
    custody:30000, color:'#3d5c3c', bg:'#e8f0e8', tc:'#2a3f2a',
    items:[
      {num:'5.1', text:'كاميرات IP (8 ميغابيكسل)'},
      {num:'5.2', text:'جهاز تسجيل NVR'},
      {num:'5.3', text:'شاشة المراقبة'},
      {num:'5.4', text:'الكابلات والتمديدات (UTP Cat6)'},
      {num:'5.5', text:'أقواس وحوامل الكاميرات'},
      {num:'5.6', text:'برمجة وضبط منظومة المراقبة'},
      {num:'5.7', text:'اختبار وتسليم النظام'},
    ]
  }
];

const PAY_TYPES = [
  {id:'mq',  label:'مقدمة',  badge:'pay-mq',  icon:'🔵'},
  {id:'ms',  label:'مستخلص', badge:'pay-ms',  icon:'🟢'},
  {id:'nh',  label:'نهائية', badge:'pay-nh',  icon:'✅'},
  {id:'vat', label:'ضريبة',  badge:'pay-vat', icon:'🧾'},
  {id:'ot',  label:'أخرى',   badge:'pay-ot',  icon:'📌'},
];

const THRESH = [
  {p:100,cls:'err',lbl:'تجاوز العهدة!'},
  {p:90, cls:'hi', lbl:'قريب جداً من الحد'},
  {p:75, cls:'warn',lbl:'تجاوز 75%'}
];

// ── STATE ──────────────────────────────────────────────────────────────
function safeJSON(s,f){try{const v=JSON.parse(s);return v!=null?v:f;}catch(e){return f;}}
function sanitizeExp(arr){
  if(!Array.isArray(arr))return[];
  return arr.filter(e=>e&&typeof e.id==='string'&&/^[\w-]{1,30}$/.test(e.id)&&
    CUSTODIANS.some(c=>c.id===e.custId)&&PAY_TYPES.some(p=>p.id===e.payType)&&
    typeof e.item==='string'&&typeof e.supplier==='string'&&
    typeof e.amount==='number'&&e.amount>=0&&
    typeof e.date==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(e.date));
}
function sanitizeMeta(o){
  if(!o||typeof o!=='object'||Array.isArray(o))return{};
  const r={};
  CUSTODIANS.forEach(c=>{
    if(o[c.id]&&typeof o[c.id]==='object'){
      r[c.id]={
        name:typeof o[c.id].name==='string'?o[c.id].name.slice(0,60):'',
        contract:typeof o[c.id].contract==='string'?o[c.id].contract.slice(0,40):''
      };
    }
  });
  return r;
}
let expenses  = sanitizeExp(safeJSON(localStorage.getItem('sisd-exp'), []));
let ckState   = safeJSON(localStorage.getItem('sisd-ck'),  {});
let custMeta  = sanitizeMeta(safeJSON(localStorage.getItem('sisd-meta'), {}));
let expanded  = {};
let delTarget = null, nameTarget = null;
let curTab    = 'dash', histFilter='all', ckFilter='all', histSearch='';
let formState = {custId:'c1', payType:'mq', item:'', selItem:''};

function save()    {localStorage.setItem('sisd-exp',  JSON.stringify(expenses)); pushToCloud();}
function saveCk()  {localStorage.setItem('sisd-ck',   JSON.stringify(ckState));  pushToCloud();}
function saveMeta(){localStorage.setItem('sisd-meta', JSON.stringify(custMeta)); pushToCloud();}

// ── UTILS ──────────────────────────────────────────────────────────────
const fmtN   = n => (+n||0).toLocaleString('en-US');
const pct    = (s,b)=> b===0?0:Math.min(100,Math.round(s/b*100));
const getToday = ()=>new Date().toISOString().split('T')[0];
const custById = id=>CUSTODIANS.find(c=>c.id===id);
const payById  = id=>PAY_TYPES.find(p=>p.id===id)||PAY_TYPES[4];
const custSpent= id=>expenses.filter(e=>e.custId===id).reduce((s,e)=>s+e.amount,0);
const totalSpent=()=>expenses.reduce((s,e)=>s+e.amount,0);
const barCls   = p=>p>=100?'fill-err':p>=90?'fill-hi':p>=75?'fill-warn':'fill-ok';
const warnInfo = p=>THRESH.find(t=>p>=t.p)||null;
const custName = id=>(custMeta[id]?.name)||custById(id)?.phase||id;
const custContract=id=>(custMeta[id]?.contract)||'';

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tm); t._tm=setTimeout(()=>{t.className='';},2800);
}

function escH(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('tbtn-'+id).classList.add('active');
  curTab=id;
  if(id==='add')  renderAdd();
  if(id==='hist') renderHist();
  if(id==='ck')   renderCk();
  if(id==='cfg')  renderCfg();
}

// ── MODALS ─────────────────────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('open');delTarget=null;nameTarget=null;}
document.querySelectorAll('.modal-ov').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');}));

// ── HEADER ─────────────────────────────────────────────────────────────
const EMBLEM_SVG=`<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="44" height="44" rx="10" fill="#2a3f2a"/>
  <rect x="1" y="1" width="42" height="42" rx="9" stroke="#d5b254" stroke-width="1.5"/>
  <!-- open book -->
  <path d="M11 16 C11 16 16 14 22 16 C22 16 22 28 22 28 C16 26 11 28 11 28 Z" fill="white" opacity="0.9"/>
  <path d="M33 16 C33 16 28 14 22 16 C22 16 22 28 22 28 C28 26 33 28 33 28 Z" fill="white" opacity="0.75"/>
  <line x1="22" y1="16" x2="22" y2="28" stroke="#d5b254" stroke-width="1"/>
  <!-- spine bottom -->
  <path d="M11 28 Q16 30 22 28 Q28 30 33 28" stroke="#d5b254" stroke-width="1" fill="none"/>
  <!-- stars / decorative dots -->
  <circle cx="22" cy="34" r="1.2" fill="#d5b254"/>
  <circle cx="18" cy="34" r="0.7" fill="#d5b254" opacity=".6"/>
  <circle cx="26" cy="34" r="0.7" fill="#d5b254" opacity=".6"/>
  <!-- arabic letter ط stylized at top -->
  <text x="22" y="13" text-anchor="middle" font-size="5" fill="#d5b254" font-weight="bold">ط</text>
</svg>`;

function renderHeader(){
  const spent=totalSpent(); const left=TOTAL_BUDGET-spent;
  const p=pct(spent,TOTAL_BUDGET); const bc=barCls(p);
  document.getElementById('header').innerHTML=`
    <div class="h-emblem-row">
      <div class="h-emblem">${EMBLEM_SVG}</div>
      <div class="h-brand">
        <div class="h-univ">جامعة الطائف — مركز البحوث والاستشارات</div>
        <div class="h-proj">مشروع تأهيل وصيانة مقر سيسد</div>
      </div>
      <button class="h-share-btn" onclick="openShare()">📤 تقرير</button>
    </div>
    <div class="h-title-row">
      <div class="h-title">إدارة العهدات الخمس <span id="sync-badge" class="sync-badge" style="display:none"></span></div>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="s-lbl">إجمالي العهدات</div>
        <div class="s-val" style="color:var(--gold)">${fmtN(TOTAL_BUDGET)}</div>
        <div class="s-sub">ريال سعودي</div>
      </div>
      <div class="stat-box">
        <div class="s-lbl">إجمالي مصروف</div>
        <div class="s-val" style="color:#86efac">${fmtN(spent)}</div>
        <div class="s-sub">${p}% من الإجمالي</div>
      </div>
      <div class="stat-box">
        <div class="s-lbl">المتبقي</div>
        <div class="s-val" style="color:${left<0?'#fca5a5':'var(--gold)'}">${fmtN(Math.abs(left))}</div>
        <div class="s-sub">${left<0?'🔴 تجاوز':'متاح للصرف'}</div>
      </div>
    </div>
    <div class="bar-wrap">
      <div class="bar-labels"><span>التقدم المالي الكلي</span><span>${fmtN(Math.max(0,left))} ر.س متبقٍ</span></div>
      <div class="bar-track"><div class="bar-fill ${bc}" style="width:${Math.min(100,p)}%"></div></div>
    </div>`;
}

// ── ALERTS ─────────────────────────────────────────────────────────────
function renderAlerts(){
  let html='';

// ── DONUT CHART ────────────────────────────────────────────────────────
function buildDonut(){
  const R=44, cx=56, cy=56, stroke=14;
  const circumference=2*Math.PI*R;
  const totalBudget=TOTAL_BUDGET;
  let offset=0;
  const segments=CUSTODIANS.map(c=>{
    const share=c.custody/totalBudget;
    const dash=share*circumference;
    const seg=`<circle cx="${cx}" cy="${cy}" r="${R}"
      fill="none" stroke="${c.color}" stroke-width="${stroke}"
      stroke-dasharray="${dash-1} ${circumference-(dash-1)}"
      stroke-dashoffset="${-offset+circumference/4}"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray .6s"/>`;
    offset+=dash;
    return seg;
  }).join('');

  const spent=totalSpent();
  const spentP=pct(spent,TOTAL_BUDGET);

  const legend=CUSTODIANS.map(c=>{
    const s=custSpent(c.id);
    const p=pct(s,totalBudget);
    return `<div class="dl-row">
      <div class="dl-dot" style="background:${c.color}"></div>
      <div class="dl-name">${c.phase}</div>
      <div class="dl-pct">${fmtN(c.custody)}</div>
    </div>`;
  }).join('');

  return `<div class="donut-card">
    <div class="donut-title">
      <span>توزيع الميزانية على التخصصات</span>
      <span style="color:var(--green);font-size:11px">${fmtN(TOTAL_BUDGET)} ر.س</span>
    </div>
    <div class="donut-wrap">
      <div class="donut-svg-wrap">
        <svg width="112" height="112" viewBox="0 0 112 112">${segments}
          <circle cx="${cx}" cy="${cy}" r="${R-stroke/2-2}" fill="white"/>
        </svg>
        <div class="donut-center">
          <div class="donut-center-pct">${spentP}%</div>
          <div class="donut-center-lbl">مصروف</div>
        </div>
      </div>
      <div class="donut-legend">${legend}</div>
    </div>
  </div>`;
}

function selCust(id){formState.custId=id;formState.selItem='';formState.item='';renderAdd();}
function selPay(id){formState.payType=id;renderAdd();}
function selChip(it){formState.selItem=it;formState.item=it;renderAdd();const inp=document.getElementById('inp-item');if(inp)inp.value=it;}

function checkAmtWarn(){
  const amt=parseFloat(document.getElementById('inp-amt').value)||0;
  const hint=document.getElementById('amt-hint');
  const vat=document.getElementById('vat-calc');
  if(!amt){if(hint)hint.textContent='';if(vat)vat.style.display='none';return;}
  // VAT calculator
  if(vat){
    const amtEx=amt, amtInc=Math.round(amt*1.15);
    vat.style.display='block';
    vat.innerHTML=`حاسبة الضريبة: المبلغ بدون ضريبة <strong>${fmtN(amtEx)}</strong> ر.س | مع ضريبة 15% = <strong>${fmtN(amtInc)}</strong> ر.س`;
  }
  if(!hint)return;
  const c=custById(formState.custId);
  const after=pct(custSpent(c.id)+amt,c.custody);
  if(after>100){hint.className='amt-hint amt-err';hint.textContent='🚨 سيتجاوز عهدة هذا التخصص!';}
  else if(after>90){hint.className='amt-hint amt-hi';hint.textContent=`⚠️ سيصل إلى ${after}% من العهدة`;}
  else if(after>75){hint.className='amt-hint amt-warn';hint.textContent=`🔔 سيصل إلى ${after}% من العهدة`;}
  else{hint.textContent='';}
}

function submitExpense(){
  const item=(document.getElementById('inp-item').value||formState.item).trim();
  const sup=document.getElementById('inp-sup').value.trim();
  const amt=parseFloat(document.getElementById('inp-amt').value);
  const date=document.getElementById('inp-date').value;
  const ref=document.getElementById('inp-ref').value.trim();
  const notes=document.getElementById('inp-notes').value.trim();
  if(!item){showToast('أدخل اسم البند أو العمل','err');return;}
  if(!sup){showToast('أدخل اسم المورد','err');return;}
  if(!amt||amt<=0){showToast('أدخل مبلغاً صحيحاً','err');return;}
  expenses.unshift({id:Date.now().toString(),custId:formState.custId,payType:formState.payType,item,supplier:sup,amount:amt,date,ref,notes});
  save(); renderAll(); showToast('✅ تم تسجيل الصرف بنجاح');
  formState.item=''; formState.selItem='';
  setTimeout(()=>switchTab('dash'),1800);
}

// ── HISTORY ─────────────────────────────────────────────────────────────
function renderHist(){
  const filterAll=histFilter==='all';
  const q=histSearch.trim().toLowerCase();
  const filteredExp=expenses
    .filter(e=>filterAll||e.custId===histFilter)
    .filter(e=>!q||e.item.toLowerCase().includes(q)||e.supplier.toLowerCase().includes(q)||(e.ref&&e.ref.toLowerCase().includes(q))||(e.notes&&e.notes.toLowerCase().includes(q)));
  const spent=filteredExp.reduce((s,e)=>s+e.amount,0);

  let filterHtml=`<span class="filter-chip ${filterAll?'sel':''}" onclick="setHistFilter('all')">الكل</span>`;
  CUSTODIANS.forEach(c=>{
    const isSel=histFilter===c.id;
    filterHtml+=`<span class="filter-chip ${isSel?'sel':''}" style="${isSel?`border-color:${c.color};background:${c.color};color:#fff`:''}" onclick="setHistFilter('${c.id}')">${c.num}</span>`;
  });

  let sumHtml='';
  const showC=filterAll?CUSTODIANS:CUSTODIANS.filter(c=>c.id===histFilter);
  showC.forEach(c=>{
    const s=custSpent(c.id); if(s===0&&filterAll)return;
    const p=pct(s,c.custody);
    sumHtml+=`<div class="summary-row">
      <div class="sr-dot" style="background:${c.color}"></div>
      <span class="sr-name">${escH(custName(c.id))} (${c.num})</span>
      <div class="sr-bar"><div class="sr-bar-fill" style="width:${p}%;background:${c.color}"></div></div>
      <span class="sr-amt">${fmtN(s)} ر.س</span>
    </div>`;
  });

  let html=`<div class="filter-bar">${filterHtml}</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" placeholder="بحث عن بند أو مورد أو مرجع…" value="${escH(histSearch)}" oninput="setHistSearch(this.value)">
  </div>`;
  if(spent>0){
    html+=`<div class="summary-card">
      <div class="summary-title">ملخص المصروفات</div>
      ${sumHtml}
      <div class="summary-total"><span>الإجمالي</span><span>${fmtN(spent)} ر.س</span></div>
    </div>`;
  }

  if(filteredExp.length===0){
    html+=`<div class="empty-state"><div class="empty-icon">🧾</div><div class="empty-text">لا توجد مصروفات${filterAll?'':' لهذا التخصص'}</div><div class="empty-hint">اضغط "إضافة" لتسجيل أول دفعة</div></div>`;
  } else {
    html+=filteredExp.map(e=>{
      const c=custById(e.custId)||{color:'#64748b',bg:'#f1f5f9',tc:'#475569',num:'?'};
      const pt=payById(e.payType);
      return `<div class="exp-card">
        <div class="exp-top">
          <div class="exp-info">
            <div class="exp-name">${escH(e.item)}</div>
            <div class="exp-badges">
              <span class="exp-badge" style="background:${c.bg};color:${c.tc}">${c.num} — ${escH(custName(c.id))}</span>
              <span class="pay-badge ${pt.badge}">${pt.icon} ${pt.label}</span>
            </div>
            <div class="exp-meta">
              👤 ${escH(e.supplier)}${e.ref?`<br>🧾 ${escH(e.ref)}`:''}${e.notes?`<br>📝 ${escH(e.notes)}`:''}
              <br>📅 ${escH(e.date)}

          </div>
          <div class="exp-right">
            <div class="exp-amt" style="color:${c.color}">${fmtN(e.amount)}</div>
            <div class="exp-sar">ر.س</div>
            <button class="exp-del" onclick="openEdit('${escH(e.id)}')">✏️</button>

    }).join('');
  }
  document.getElementById('tab-hist').innerHTML=html;

// ── CHECKLIST (3-state) ──────────────────────────────────────────────────
function renderCk(){
  const filterAll=ckFilter==='all';
  let filterHtml=`<span class="filter-chip ${filterAll?'sel':''}" onclick="setCkFilter('all')">الكل</span>`;
  CUSTODIANS.forEach(c=>{
    const isSel=ckFilter===c.id;
    filterHtml+=`<span class="filter-chip ${isSel?'sel':''}" style="${isSel?`border-color:${c.color};background:${c.color};color:#fff`:''}" onclick="setCkFilter('${c.id}')">${c.num}</span>`;
  });

  let html=`
    <div class="ck-intro">
      <strong>📋 خطة بنود التنفيذ — المراحل الرسمية</strong>
      اضغط مرة: جاري التنفيذ ▶ · اضغط مرتين: مكتمل ✓ · اضغط ثلاثاً: إعادة تعيين
    </div>
    <div class="ck-filter">${filterHtml}</div>`;

  const showC=filterAll?CUSTODIANS:CUSTODIANS.filter(c=>c.id===ckFilter);
  showC.forEach(c=>{
    const states=c.items.map(it=>ckState[`${c.id}::${it.num}`]||0);
    const done=states.filter(s=>s===2).length;
    const inProg=states.filter(s=>s===1).length;
    const total=c.items.length;
    const p=total>0?Math.round(done/total*100):0;

    html+=`<div class="ck-card">
      <div class="phase-header" style="background:${c.bg}">
        <div class="phase-dot" style="background:${c.color};color:#fff">${c.num}</div>
        <div style="flex:1;min-width:0">
          <div class="phase-name" style="color:${c.tc}">${c.phase} — ${escH(custName(c.id))}</div>
          <div class="phase-scope">${c.scope}</div>
        </div>
        <div class="phase-prog" style="color:${c.tc}">${done}/${total}</div>
      </div>
      <div class="ck-head">
        <div style="display:flex;gap:8px;font-size:10px;color:var(--sub);margin-bottom:6px">
          <span>✓ مكتمل: ${done}</span>
          <span>▶ جاري: ${inProg}</span>
          <span>○ لم يبدأ: ${total-done-inProg}</span>
        </div>
        <div class="ck-bar"><div class="ck-bar-fill" style="width:${p}%;background:${p===100?'var(--g-ok)':c.color}"></div></div>
        <div class="ck-pct">${p}% مكتمل</div>
      </div>`;

    c.items.forEach(it=>{
      const key=`${c.id}::${it.num}`;
      const rawSt=ckState[key]; const st=(rawSt===1||rawSt===2)?rawSt:0;
      const stClass=st===0?'':st===1?'s1':'s2';
      const badge=st===0?'':`<span class="ck-status-badge ck-st${st}">${st===1?'▶ جاري':'✓ مكتمل'}</span>`;
      html+=`<div class="ck-item ${stClass}" onclick="toggleCkItem('${c.id}','${it.num}')">
        <div class="ck-box ${stClass}"></div>
        <div class="ck-item-content">
          <div class="ck-item-num">${it.num}</div>
          <div class="ck-text">${escH(it.text)}</div>
        </div>
        ${badge}
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="tips-card">
    <div class="tips-title">💡 تذكيرات إدارة العهدة الحكومية</div>
    ${[
      'لا تدفع أكثر من 50% مقدماً لأي مورد — الباقي عند التسليم',
      'احتفظ بفاتورة + محضر استلام لكل دفعة قبل إغلاق العهدة',
      'افحص الجودة بشكل مستقل قبل الدفعة الأخيرة',
      'وثّق كل صرف برقم أمر الشراء والفاتورة',
      'سوّ كل عهدة وأقفلها قبل فتح التالية',
      'المبالغ مشمولة الضريبة 15% — تأكد من الفاتورة الضريبية',
    ].map((t,i)=>`<div class="tip-row"><span class="tip-n">${'①②③④⑤⑥'[i]}</span><span>${t}</span></div>`).join('')}
  </div>`;
  document.getElementById('tab-ck').innerHTML=html;
}
function setCkFilter(f){ckFilter=f;renderCk();}
function toggleCkItem(custId,num){

// ── SHARE / REPORT ────────────────────────────────────────────────────────
function openShare(){
  const today=new Date().toLocaleDateString('ar-SA-u-nu-latn',{year:'numeric',month:'long',day:'numeric'});
  const spent=totalSpent(); const left=TOTAL_BUDGET-spent;
  let lines=[];
  lines.push(`📋 تقرير عهدة مشروع تأهيل مقر سيسد`);
  lines.push(`📅 ${today}`);
  lines.push(`${'─'.repeat(36)}`);
  lines.push(`💰 الإجمالي المصروف: ${fmtN(spent)} من ${fmtN(TOTAL_BUDGET)} ر.س`);
  lines.push(`✅ المتبقي: ${fmtN(Math.max(0,left))} ر.س`);
  lines.push(`${'─'.repeat(36)}`);
  CUSTODIANS.forEach(c=>{
    const s=custSpent(c.id); const p=pct(s,c.custody); const left2=c.custody-s;
    const name=custName(c.id); const contract=custContract(c.id);
    const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));
    lines.push(`\n${c.num}. ${c.phase}`);
    if(name!==c.phase)lines.push(`   👤 ${name}`);
    if(contract)lines.push(`   🗂️ ${contract}`);
    lines.push(`   ${bar} ${p}%`);
    lines.push(`   مصروف: ${fmtN(s)} | متبقٍ: ${fmtN(Math.max(0,left2))} من ${fmtN(c.custody)} ر.س`);
    // last 3 expenses
    const exps=expenses.filter(e=>e.custId===c.id).slice(0,3);
    if(exps.length>0){
      lines.push(`   آخر الدفعات:`);
      exps.forEach(e=>{
        const pt=payById(e.payType);
        lines.push(`   • ${e.item} — ${fmtN(e.amount)} ر.س (${pt.label}) — ${e.date}`);
      });
    }
  });
  lines.push(`\n${'─'.repeat(36)}`);
  lines.push(`🔢 إجمالي الدفعات المسجّلة: ${expenses.length}`);
  const report=lines.join('\n');
  document.getElementById('share-text').textContent=report;
  document.getElementById('share-ov').classList.add('open');
}

function copyReport(){
  const text=document.getElementById('share-text').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('✅ تم نسخ التقرير'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ تم نسخ التقرير');
  }
}

// ── EXPORT / IMPORT ────────────────────────────────────────────────────────
function exportJSON(){
  const data={expenses,ckState,custMeta,exportedAt:new Date().toISOString(),v:1};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`sisd-backup-${getToday()}.json`;
  a.click(); URL.revokeObjectURL(url); showToast('📥 تم تنزيل ملف النسخة الاحتياطية');
}
function importJSON(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=ev=>{
    const file=ev.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(!Array.isArray(d.expenses)){showToast('ملف غير صحيح','err');return;}
        expenses=sanitizeExp(d.expenses);
        ckState=(d.ckState&&typeof d.ckState==='object')?d.ckState:{};
        custMeta=sanitizeMeta(d.custMeta||{});
        save(); saveCk(); saveMeta(); renderAll();
        if(curTab==='hist')renderHist(); if(curTab==='ck')renderCk();
        showToast(`✅ تم استيراد ${expenses.length} دفعة`);
      }catch(err){showToast('خطأ في قراءة الملف','err');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function exportCSV(){
  const rows=[['رقم','التخصص','البند','المورد','النوع','المبلغ','التاريخ','المرجع','ملاحظات']];
  expenses.forEach((e,i)=>{
    const c=custById(e.custId); const pt=payById(e.payType);
    rows.push([i+1,c?c.phase:e.custId,e.item,e.supplier,pt.label,e.amount,e.date,e.ref||'',e.notes||'']);
  });
  const csv=rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`sisd-expenses-${getToday()}.csv`;
  a.click(); URL.revokeObjectURL(url); showToast('📊 تم تنزيل ملف Excel');
}

let fbDb=null, fbSyncOk=false, fbSyncing=false, fbPushTimer=null, fbLastErr='';

function updateSyncBadge(){
  const el=document.getElementById('sync-badge'); if(!el)return;
  el.style.display='inline-block';
  if(fbSyncing){el.textContent='🔄';el.style.color='#fbbf24';}
  else if(fbSyncOk){el.textContent='🟢';el.style.color='#22c55e';}

    cs.style.background='#fef2f2';cs.style.color='#991b1b';
  }
}
function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}
async function initFirebase(){
  fbLastErr=''; fbSyncing=true; updateSyncBadge();
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');
    if(!window.firebase)throw new Error('تعذّر تحميل Firebase SDK');
    if(!firebase.apps.length)firebase.initializeApp(FB_CFG);
    if(!fbDb){
      fbDb=firebase.firestore();
      fbDb.settings({experimentalForceLongPolling:true,merge:true});
      listenCloud();
    }
    await loadFromCloud();
    fbSyncing=false; fbSyncOk=true; updateSyncBadge();
  }catch(e){
    fbSyncing=false; fbSyncOk=false;
    fbLastErr=e.code?`${e.code}: ${e.message}`:e.message||String(e);
    updateSyncBadge();
    console.error('Firebase error:',e);
  }
}
async function loadFromCloud(){
  if(!fbDb)return;
  const snap=await fbDb.collection('sisd').doc('data').get();
  if(!snap.exists)return;
  const d=snap.data();
  if(d.expenses)expenses=sanitizeExp(d.expenses);
  if(d.ckState)ckState=d.ckState;
  if(d.custMeta)custMeta=sanitizeMeta(d.custMeta);
  localStorage.setItem('sisd-exp',JSON.stringify(expenses));
  localStorage.setItem('sisd-ck',JSON.stringify(ckState));
  localStorage.setItem('sisd-meta',JSON.stringify(custMeta));
  renderAll(); if(curTab==='hist')renderHist(); if(curTab==='ck')renderCk();
}
function listenCloud(){
  if(!fbDb)return;
  fbDb.collection('sisd').doc('data').onSnapshot(snap=>{
    if(!snap.exists)return;
    const d=snap.data();
    const incoming=sanitizeExp(d.expenses||[]);
    if(JSON.stringify(incoming)!==JSON.stringify(expenses)){
      expenses=incoming;
      if(d.ckState)ckState=d.ckState;
      if(d.custMeta)custMeta=sanitizeMeta(d.custMeta);
      localStorage.setItem('sisd-exp',JSON.stringify(expenses));
      localStorage.setItem('sisd-ck',JSON.stringify(ckState));
      localStorage.setItem('sisd-meta',JSON.stringify(custMeta));
      renderAll(); if(curTab==='hist')renderHist(); if(curTab==='ck')renderCk();
      showToast('🔄 تمت المزامنة','info');
    }
    fbSyncOk=true; updateSyncBadge();
  },()=>{fbSyncOk=false; updateSyncBadge();});
}
function pushToCloud(){
  if(!fbDb)return;
  clearTimeout(fbPushTimer);
  fbPushTimer=setTimeout(async()=>{
    try{
      fbSyncing=true; updateSyncBadge();
      await fbDb.collection('sisd').doc('data').set({
        expenses,ckState,custMeta,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      fbSyncing=false; fbSyncOk=true; updateSyncBadge();
    }catch(e){fbSyncing=false; fbSyncOk=false; updateSyncBadge();}
  },1500);
}
