<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#06040C"/>
<title>أتيلييه ضاوي — متجر العطور الفاخرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:'Alexandria',sans-serif;background:#06040C;color:#EDE0C8;overflow-x:hidden}
body{background-image:radial-gradient(ellipse 120% 50% at 50% -8%,rgba(180,110,18,0.10) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 110%,rgba(90,45,8,0.07) 0%,transparent 55%)}
.site-header{position:sticky;top:0;z-index:100;background:rgba(6,4,12,0.90);backdrop-filter:blur(18px);border-bottom:1px solid rgba(201,168,76,0.12);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between}
.brand-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.5rem;color:#C9A84C;line-height:1}
.brand-sub{font-family:'IBM Plex Mono',monospace;font-size:0.42rem;color:rgba(201,168,76,0.38);letter-spacing:0.5em;text-transform:uppercase;margin-top:2px}
.cart-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;border:1px solid rgba(201,168,76,0.25);background:rgba(201,168,76,0.06);color:#C9A84C;font-family:'Alexandria',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;position:relative}
.cart-btn:hover{border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.12)}
.cart-count{position:absolute;top:-7px;right:-7px;background:#C9A84C;color:#06040C;border-radius:50%;width:19px;height:19px;font-size:0.58rem;font-weight:900;display:none;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace}
.hero{text-align:center;padding:56px 24px 40px}
.hero-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:rgba(201,168,76,0.40);letter-spacing:0.55em;text-transform:uppercase;margin-bottom:14px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,7vw,3.4rem);color:#F0E6D0;line-height:1.1;margin-bottom:10px}
.hero-title em{color:#C9A84C;font-style:italic}
.hero-desc{font-size:0.85rem;color:rgba(237,224,200,0.38);max-width:360px;margin:0 auto 22px;line-height:1.75}
.divider{width:72px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.45),transparent);margin:0 auto}
.filters{padding:0 16px 14px;max-width:860px;margin:0 auto}
.search-box{position:relative;margin-bottom:11px}
.search-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.35;width:16px;height:16px;color:#C9A84C}
.search-inp{width:100%;padding:10px 40px 10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:#EDE0C8;font-family:'Alexandria',sans-serif;font-size:0.82rem;outline:none;direction:rtl;transition:border-color 0.2s}
.search-inp:focus{border-color:rgba(201,168,76,0.35)}
.search-inp::placeholder{color:rgba(255,255,255,0.22)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.chip{padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.38);font-size:0.70rem;cursor:pointer;transition:all 0.18s;font-family:'Alexandria',sans-serif;white-space:nowrap}
.chip:hover{border-color:rgba(255,255,255,0.20);color:rgba(255,255,255,0.60)}
.chip.ag{border-color:rgba(201,168,76,0.55);background:rgba(201,168,76,0.10);color:#E8C870;font-weight:700}
.chip.ap{border-color:rgba(160,120,220,0.55);background:rgba(160,120,220,0.10);color:#c8a0f0;font-weight:700}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:13px;padding:4px 16px 110px;max-width:860px;margin:0 auto}
.pcard{background:linear-gradient(155deg,rgba(28,18,6,0.96),rgba(16,8,2,0.99));border:1px solid rgba(201,168,76,0.09);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform 0.38s cubic-bezier(0.22,1,0.36,1),box-shadow 0.38s,border-color 0.2s;position:relative;user-select:none}
.pcard:hover{transform:perspective(600px) rotateY(8deg) rotateX(-4deg) translateY(-6px);box-shadow:16px 12px 48px rgba(0,0,0,0.72),0 0 0 1px rgba(201,168,76,0.20);border-color:rgba(201,168,76,0.22)}
.pcard-bar{height:5px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.52),transparent)}
.pcard-body{padding:13px 11px 11px;text-align:center}
.pcard-badge{position:absolute;top:15px;right:11px;font-size:0.46rem;padding:2px 6px;border-radius:6px;background:rgba(201,168,76,0.09);border:1px solid rgba(201,168,76,0.20);color:rgba(201,168,76,0.58);font-family:'IBM Plex Mono',monospace}
.pcard-icon{font-size:2.7rem;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.55));margin:6px 0 5px}
.pcard-brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.36rem;color:rgba(201,168,76,0.32);letter-spacing:0.4em;text-transform:uppercase;margin-bottom:4px}
.pcard-name{font-size:0.83rem;font-weight:800;color:#F0E6D0;line-height:1.2;margin-bottom:6px}
.lbar{display:flex;height:3px;border-radius:2px;overflow:hidden;gap:1px;margin-bottom:7px}
.lt{background:rgba(232,200,112,0.75);border-radius:2px 0 0 2px}
.lm{background:rgba(200,120,190,0.65)}
.lb{background:rgba(190,140,70,0.62);border-radius:0 2px 2px 0}
.pcard-meta{font-size:0.47rem;color:rgba(255,255,255,0.20);margin-bottom:9px}
.bcode{display:flex;align-items:flex-end;height:22px;justify-content:center;margin-bottom:6px}
.pcard-sep{height:1px;background:rgba(201,168,76,0.09);margin-bottom:9px}
.pcard-price{font-family:'IBM Plex Mono',monospace;font-size:1.18rem;font-weight:700;background:linear-gradient(135deg,#E8C870,#A07830);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:2px}
.pcard-vol{font-size:0.45rem;color:rgba(255,255,255,0.20);margin-bottom:8px}
.pcard-btn{width:100%;padding:7px 4px;border-radius:20px;cursor:pointer;font-size:0.67rem;font-weight:700;font-family:'Alexandria',sans-serif;transition:all 0.18s;border:1px solid rgba(201,168,76,0.20);background:rgba(201,168,76,0.07);color:rgba(201,168,76,0.62)}
.pcard-btn:hover,.pcard-btn.ic{border-color:rgba(201,168,76,0.52);background:rgba(201,168,76,0.18);color:#E8C870}
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.82);backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#08050F;border-top:1px solid rgba(201,168,76,0.18);border-radius:24px 24px 0 0;padding:18px 17px 44px;width:100%;max-width:480px;max-height:86vh;overflow-y:auto}
.handle{width:38px;height:4px;background:rgba(255,255,255,0.09);border-radius:2px;margin:0 auto 16px}
.sheet-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.sheet-title{font-size:1.05rem;font-weight:800;color:#D4AF37}
.sheet-sub{font-size:0.60rem;color:rgba(255,255,255,0.26);margin-top:2px}
.clr-btn{background:rgba(200,60,60,0.10);border:1px solid rgba(200,60,60,0.22);color:rgba(200,100,100,0.68);border-radius:8px;padding:4px 12px;font-size:0.68rem;cursor:pointer;font-family:'Alexandria',sans-serif}
.crow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.crow-ic{font-size:1.65rem;flex-shrink:0}
.crow-info{flex:1;min-width:0}
.crow-name{font-size:0.80rem;font-weight:700;color:#F0E6D0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow-meta{font-size:0.57rem;color:rgba(201,168,76,0.42);margin-top:2px}
.qty{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qbtn{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);color:#D4AF37;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.qbtn:hover{background:rgba(201,168,76,0.15)}
.qnum{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:#E8C870;min-width:16px;text-align:center}
.crow-pr{min-width:52px;text-align:left;flex-shrink:0}
.crow-total{font-family:'IBM Plex Mono',monospace;font-size:0.84rem;font-weight:700;color:#E8C870}
.crow-rm{background:none;border:none;color:rgba(200,100,100,0.48);cursor:pointer;font-size:0.63rem;padding:0;margin-top:2px;display:block;font-family:'Alexandria',sans-serif}
.totals-box{border-top:1px solid rgba(201,168,76,0.14);margin-top:13px;padding-top:13px}
.trow{display:flex;justify-content:space-between;margin-bottom:5px;font-size:0.70rem;color:rgba(255,255,255,0.32)}
.grand-box{display:flex;justify-content:space-between;align-items:baseline;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.18);border-radius:12px;padding:10px 14px;margin:10px 0 15px}
.grand-lbl{font-size:0.76rem;color:rgba(201,168,76,0.68)}
.grand-val{font-family:'IBM Plex Mono',monospace;font-size:1.22rem;font-weight:700;color:#E8C870}
.btn-g{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#C9A84C,#8B6914);color:#06040C;font-family:'Alexandria',sans-serif;font-size:0.88rem;font-weight:800;border:none;cursor:pointer;transition:opacity 0.2s}
.btn-g:hover{opacity:0.88}
.btn-gh{width:100%;padding:11px;border-radius:14px;background:transparent;border:1px solid rgba(255,255,255,0.09);color:rgba(255,255,255,0.40);font-family:'Alexandria',sans-serif;font-size:0.80rem;cursor:pointer;margin-top:7px;transition:border-color 0.18s}
.btn-gh:hover{border-color:rgba(255,255,255,0.22)}
.empty-cart{text-align:center;padding:38px;color:rgba(255,255,255,0.20);font-size:0.88rem}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(28,18,6,0.96);border:1px solid rgba(201,168,76,0.35);border-radius:12px;padding:9px 18px;font-size:0.76rem;color:#E8C870;white-space:nowrap;opacity:0;transition:all 0.28s;z-index:500;pointer-events:none}
.toast.s{opacity:1;transform:translateX(-50%) translateY(0)}
.no-results{text-align:center;padding:60px 24px;color:rgba(255,255,255,0.18)}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="brand-name">Atelier Dhawi</div>
    <div class="brand-sub">Private Oud Collection</div>
  </div>
  <button class="cart-btn" id="cartBtn" onclick="openCart()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.836l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
    السلة
    <span class="cart-count" id="cc">0</span>
  </button>
</header>

<section class="hero">
  <p class="hero-eyebrow">— Collection Exclusive —</p>
  <h1 class="hero-title">كوليكشن <em>ضاوي</em></h1>
  <p class="hero-desc">تركيبات عطرية فاخرة من أجود مواد العود العربي والشرقي — لكل لحظة حكاية.</p>
  <div class="divider"></div>
</section>

<div class="filters">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
    <input class="search-inp" id="si" placeholder="ابحث عن عطر..." oninput="render()"/>
  </div>
  <div class="chips" id="sc"></div>
  <div class="chips" id="gc"></div>
</div>

<div class="pgrid" id="grid"></div>
<div class="no-results" id="nr" style="display:none">🔍<br><br>لا توجد عطور مطابقة</div>

<div class="overlay" id="ov" onclick="if(event.target===this)closeCart()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-hdr">
      <div><div class="sheet-title">🛒 السلة</div><div class="sheet-sub" id="csub">0 منتج</div></div>
      <button class="clr-btn" onclick="clearCart()">مسح الكل</button>
    </div>
    <div id="ci"></div>
    <div id="ct"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const P=[
  {id:'layali',name:'ليالي الرياض',icon:'🌙',season:'شتاء',gender:'للجنسين',price:185,top:18,mid:52,base:30,stab:'طويل الأمد'},
  {id:'taif',name:'سر الطائف',icon:'🌹',season:'ربيع',gender:'نسائي',price:145,top:28,mid:45,base:27,stab:'متوسط'},
  {id:'malaki',name:'الملكي الفاخر',icon:'❄️',season:'شتاء',gender:'رجالي',price:220,top:12,mid:38,base:50,stab:'طويل جداً'},
  {id:'khashab',name:'خشب الليل',icon:'🌿',season:'خريف',gender:'رجالي',price:195,top:10,mid:42,base:48,stab:'طويل الأمد'},
  {id:'ward',name:'ورد الصفاء',icon:'🌸',season:'ربيع',gender:'نسائي',price:155,top:35,mid:48,base:17,stab:'متوسط'},
  {id:'amber',name:'عنبر السلطان',icon:'✨',season:'مناسبات',gender:'للجنسين',price:250,top:15,mid:40,base:45,stab:'طويل جداً'},
  {id:'bkhoor',name:'بخور الليالي',icon:'🕌',season:'مناسبات',gender:'للجنسين',price:170,top:20,mid:45,base:35,stab:'طويل الأمد'},
  {id:'nakheel',name:'نخيل الذهب',icon:'🌴',season:'صيف',gender:'للجنسين',price:135,top:40,mid:38,base:22,stab:'خفيف'},
  {id:'fajr',name:'فجر الرياض',icon:'🌅',season:'صيف',gender:'رجالي',price:160,top:30,mid:42,base:28,stab:'متوسط'},
  {id:'yasmin',name:'ليلة الياسمين',icon:'🌺',season:'ربيع',gender:'نسائي',price:140,top:42,mid:43,base:15,stab:'خفيف'},
];

let cart=[],sf='الكل',gf='الكل';
const SI=['الكل','صيف','شتاء','ربيع','خريف','مناسبات'];
const GI=['الكل','رجالي','نسائي','للجنسين'];
const SE={صيف:'🌞',شتاء:'❄️',ربيع:'🌸',خريف:'🍂',مناسبات:'✨',الكل:'🔎'};
const GE={'رجالي':'👔','نسائي':'💐','للجنسين':'🤝','الكل':'👥'};

function bc(seed){
  const h=n=>{let x=n;x=((x>>16)^x)*0x45d9f3b;x=((x>>16)^x)*0x45d9f3b;return((x>>16)^x)>>>0;};
  return Array.from({length:36},(_,i)=>{const v=h(seed*37+i);return{w:(v%3)+1,d:!!(v&4)};});
}

function chips(){
  document.getElementById('sc').innerHTML=SI.map(s=>`<button class="chip${sf===s?' ag':''}" onclick="sf='${s}';chips();render()">${SE[s]} ${s}</button>`).join('');
  document.getElementById('gc').innerHTML=GI.map(g=>`<button class="chip${gf===g?' ap':''}" onclick="gf='${g}';chips();render()">${GE[g]} ${g}</button>`).join('');
}

function render(){
  const q=(document.getElementById('si').value||'').trim().toLowerCase();
  const f=P.filter(p=>(sf==='الكل'||p.season===sf)&&(gf==='الكل'||p.gender===gf)&&(!q||p.name.includes(q)));
  const g=document.getElementById('grid');
  const nr=document.getElementById('nr');
  if(!f.length){g.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  g.innerHTML=f.map(p=>{
    const ic=cart.find(i=>i.id===p.id);
    const s=p.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const bars=bc(s).map(b=>`<div style="width:${b.w}px;height:${b.d?'100%':'55%'};background:${b.d?'rgba(201,168,76,0.80)':'transparent'};align-self:flex-end"></div>`).join('');
    return`<div class="pcard" onclick="add('${p.id}')">
<div class="pcard-bar"></div>
<div class="pcard-body">
<div class="pcard-badge">${p.season}</div>
<div class="pcard-icon">${p.icon}</div>
<div class="pcard-brand">ATELIER DHAWI</div>
<div class="pcard-name">${p.name}</div>
<div class="lbar"><div class="lt" style="flex:${p.top||0.1}"></div><div class="lm" style="flex:${p.mid||0.1}"></div><div class="lb" style="flex:${p.base||0.1}"></div></div>
<div class="pcard-meta">${p.gender} · ${p.stab}</div>
<div class="bcode">${bars}</div>
<div class="pcard-sep"></div>
<div class="pcard-price">${p.price}<span style="font-size:0.56rem;opacity:0.6"> ر</span></div>
<div class="pcard-vol">50 مل · EDP</div>
<button class="pcard-btn${ic?' ic':''}" onclick="event.stopPropagation();add('${p.id}')">${ic?`✓ في السلة (${ic.qty})`:'+ أضف للسلة'}</button>
</div></div>`;
  }).join('');
}

function add(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const ex=cart.find(i=>i.id===id);
  if(ex)ex.qty++;else cart.push({id,name:p.name,icon:p.icon,price:p.price,season:p.season,gender:p.gender,qty:1});
  syncUI();render();toast(`🛒 ${p.name} أُضيف للسلة`);
}
function rm(id){cart=cart.filter(i=>i.id!==id);syncUI();render();renderSheet();}
function uqty(id,d){const i=cart.find(x=>x.id===id);if(i){i.qty=Math.max(1,i.qty+d);syncUI();renderSheet();}}
function clearCart(){cart=[];syncUI();render();renderSheet();}
function openCart(){document.getElementById('ov').classList.add('open');renderSheet();}
function closeCart(){document.getElementById('ov').classList.remove('open');}

function syncUI(){
  const n=cart.reduce((s,i)=>s+i.qty,0);
  const cc=document.getElementById('cc');
  cc.textContent=n;cc.style.display=n?'flex':'none';
  document.getElementById('csub').textContent=n+' منتج';
}

function renderSheet(){
  const ci=document.getElementById('ci'),ct=document.getElementById('ct');
  if(!cart.length){ci.innerHTML='<div class="empty-cart">🛒<br><br>السلة فارغة</div>';ct.innerHTML='';return;}
  ci.innerHTML=cart.map(i=>`<div class="crow">
<div class="crow-ic">${i.icon}</div>
<div class="crow-info"><div class="crow-name">${i.name}</div><div class="crow-meta">${i.season} · ${i.gender} · 50 مل</div></div>
<div class="qty"><button class="qbtn" onclick="uqty('${i.id}',-1)">−</button><span class="qnum">${i.qty}</span><button class="qbtn" onclick="uqty('${i.id}',1)">+</button></div>
<div class="crow-pr"><div class="crow-total">${i.price*i.qty}<span style="font-size:0.53rem;opacity:0.6"> ر</span></div><button class="crow-rm" onclick="rm('${i.id}')">✕ حذف</button></div>
</div>`).join('');
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const vat=Math.round(sub*0.15);
  const tot=sub+vat;
  ct.innerHTML=`<div class="totals-box">
<div class="trow"><span>المجموع</span><span style="font-family:'IBM Plex Mono',monospace">${sub} ر</span></div>
<div class="trow"><span>ضريبة القيمة المضافة 15%</span><span style="font-family:'IBM Plex Mono',monospace">${vat} ر</span></div>
<div class="grand-box"><span class="grand-lbl">الإجمالي شامل الضريبة</span><span class="grand-val">${tot}<span style="font-size:0.60rem;opacity:0.7"> ر</span></span></div>
<button class="btn-g" onclick="invoice()">🧾 طباعة الفاتورة</button>
<button class="btn-gh" onclick="closeCart()">متابعة التسوق</button>
</div>`;
}

function invoice(){
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const vat=Math.round(sub*0.15);
  const tot=sub+vat;
  const no='DW-'+Math.floor(100000+Math.random()*900000);
  const dt=new Date().toLocaleDateString('ar-SA');
  const rows=cart.map(i=>`<tr><td>${i.icon} ${i.name}</td><td align="center">${i.qty}</td><td align="left">${i.price}</td><td align="left" style="font-weight:700">${i.price*i.qty}</td></tr>`).join('');
  const w=window.open('','_blank','width=420,height=680');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Courier New',monospace;background:#fff;color:#111;padding:28px 22px;font-size:12px;max-width:360px;margin:0 auto}.h{text-align:center;border-bottom:2px dashed #333;padding-bottom:14px;margin-bottom:14px}.bn{font-size:20px;font-weight:900;letter-spacing:3px}.bs{font-size:9px;letter-spacing:6px;color:#666;margin-top:3px}table{width:100%;border-collapse:collapse;margin:10px 0}th{font-size:10px;border-bottom:1px dashed #ccc;padding:4px 0;text-align:right}td{padding:6px 0;font-size:11px;border-bottom:1px solid #f0f0f0;text-align:right}.tot{border-top:2px dashed #333;padding-top:10px;margin-top:4px}.tr{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}.grand{font-size:15px;font-weight:900;border-top:1px dashed #333;padding-top:8px;margin-top:4px}.ft{text-align:center;border-top:2px dashed #333;padding-top:12px;margin-top:14px;font-size:9px;color:#666;line-height:1.9}</style></head><body><div class="h"><div class="bn">ATELIER DHAWI</div><div class="bs">PRIVATE OUD LABORATORY</div><div style="margin-top:9px;font-size:10px">فاتورة رقم: ${no}</div><div style="font-size:10px">التاريخ: ${dt}</div><div style="font-size:9px;color:#888;margin-top:2px">الرقم الضريبي: 300XXXXXXXXX</div></div><table><thead><tr><th>المنتج</th><th align="center">الكمية</th><th align="left">السعر</th><th align="left">الإجمالي</th></tr></thead><tbody>${rows}</tbody></table><div class="tot"><div class="tr"><span>المجموع</span><span>${sub} ر.س</span></div><div class="tr"><span>ضريبة 15%</span><span>${vat} ر.س</span></div><div class="tr grand"><span>الإجمالي</span><span>${tot} ر.س</span></div></div><div class="ft">★ ★ ★ ★ ★<br>شكراً لتعاملكم معنا<br>Atelier Dhawi · Private Oud Lab</div><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2200);}

chips();render();
</script>
</body>
</html>
